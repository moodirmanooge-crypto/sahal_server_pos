<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Students Dashboard</title>

<style>
body { margin:0; font-family:Arial; background:#f5f6fa; }

.header {
    background:#1e3c72;
    color:white;
    padding:15px;
    text-align:center;
}

/* BUTTONS */
.fab, .fab2 {
    position:fixed;
    bottom:20px;
    width:60px;
    height:60px;
    border-radius:50%;
    border:none;
    color:white;
    font-size:22px;
}
.fab { right:20px; background:#28a745; }
.fab2 { right:90px; background:#007bff; }

/* ADD POPUP */
.modal {
    display:none;
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    z-index: 1000;
}

.popup {
    background:white;
    width:90%;
    max-width:400px;
    margin:5% auto;
    padding:20px;
    border-radius:10px;
    position:relative;
    cursor:move; /* DRAGGABLE POPUP */
}

.close {
    position:absolute;
    top:10px;
    right:15px;
    cursor:pointer;
}

/* BOTTOM SHEET */
.sheet {
    position:fixed;
    bottom:-100%;
    left:0;
    width:100%;
    height:80%;
    background:white;
    border-radius:20px 20px 0 0;
    transition:0.3s;
    overflow:auto;
    z-index: 1001;
}

.sheet.active {
    bottom:0;
}

.drag {
    width:50px;
    height:5px;
    background:#ccc;
    margin:10px auto;
    border-radius:5px;
}

/* CARD */
.card {
    background:#f9f9f9;
    margin:10px;
    padding:10px;
    border-radius:10px;
}

/* INPUT */
input, select {
    width:100%;
    padding:10px;
    margin-top:10px;
}

button {
    width:100%;
    padding:10px;
    margin-top:10px;
}

/* 🧠 NEW CSS ADDITIONS */
/* SEARCH */
.searchBox {
    padding:10px;
    margin:10px;
    width:90%;
    border-radius:8px;
    border:1px solid #ccc;
}

/* TABLE STYLE */
.table {
    width:100%;
    border-collapse:collapse;
}

.table th {
    background:#3498db;
    color:white;
    padding:10px;
}

.table td {
    padding:10px;
    border-bottom:1px solid #ddd;
}
</style>
</head>

<body>

<div class="header">
<h2>🎓 Students Dashboard</h2>
</div>

<button class="fab" onclick="openAdd()">+</button>
<button class="fab2" onclick="openSheet()">📋</button>

<div class="modal" id="addModal">
<div class="popup">

<div class="close" onclick="closeAll()">✖</div>

<h3>Add Student</h3>

<input id="student_id" placeholder="ID">
<input id="full_name" placeholder="Name">

<select id="gender">
<option>Male</option>
<option>Female</option>
</select>

<input id="mother_name" placeholder="Mother">
<input id="student_phone" placeholder="Phone">
<input type="file" id="photo">
<input id="mother_phone" placeholder="Mother Phone">
<input id="fee" placeholder="Fee">

<button onclick="saveStudent()">Save</button>

</div>
</div>

<div class="sheet" id="sheet">

<div class="drag"></div>

<input class="searchBox" id="searchID" placeholder="Search Student ID..." onkeyup="liveSearch()">

<table class="table">
<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Phone</th>
<th>Action</th>
</tr>
</thead>

<tbody id="studentsTable"></tbody>
</table>

</div>

<script>

let startY = 0;
let allStudents = [];

// OPEN ADD
function openAdd(){
    addModal.style.display="block";
}

// ⚙️ OPEN SHEET (UPDATED)
async function openSheet(){
    let sheet = document.getElementById("sheet");
    sheet.classList.add("active");

    let res = await fetch("/get_students");
    let data = await res.json();

    allStudents = data;

    renderTable(data);
}

// ⚙️ RENDER TABLE (NEW)
function renderTable(data){
    let box = document.getElementById("studentsTable");
    box.innerHTML="";

    data.forEach(s=>{
        box.innerHTML += `
        <tr>
            <td>${s.student_id}</td>
            <td>${s.full_name}</td>
            <td>${s.student_phone || '-'}</td>
            <td>
                <button onclick="edit('${s.student_id}')">Edit</button>
                <button onclick="del('${s.student_id}')" style="background:red;color:white;">Delete</button>
            </td>
        </tr>`;
    });
}

// 🔍 LIVE SEARCH (ID ONLY)
function liveSearch(){
    let val = document.getElementById("searchID").value;

    let filtered = allStudents.filter(s =>
        s.student_id.toString().includes(val)
    );

    renderTable(filtered);
}

// CLOSE
function closeAll(){
    addModal.style.display="none";
    document.getElementById("sheet").classList.remove("active");
}

// SAVE
async function saveStudent(){
    let fd = new FormData();

    fd.append("student_id", student_id.value);
    fd.append("full_name", full_name.value);
    fd.append("gender", gender.value);
    fd.append("mother_name", mother_name.value);
    fd.append("student_phone", student_phone.value);
    fd.append("mother_phone", mother_phone.value);
    fd.append("fee", fee.value);
    fd.append("photo", photo.files);

    await fetch("/add_student",{method:"POST", body:fd});

    closeAll();
}

// DELETE
async function del(id){
    let fd = new FormData();
    fd.append("student_id", id);

    await fetch("/delete_student",{method:"POST", body:fd});
    openSheet();
}

// EDIT (auto fill)
async function edit(id){
    let res = await fetch("/get_students");
    let data = await res.json();

    let s = data.find(x=>x.student_id==id);

    openAdd();

    student_id.value = s.student_id;
    full_name.value = s.full_name;
    gender.value = s.gender;
    mother_name.value = s.mother_name;
    student_phone.value = s.student_phone;
    mother_phone.value = s.mother_phone;
    fee.value = s.fee;
}

// DRAG CLOSE (MOBILE STYLE)
let sheetUI = document.getElementById("sheet");

sheetUI.addEventListener("touchstart", e=>{
    startY = e.touches.clientY;
});

sheetUI.addEventListener("touchmove", e=>{
    let move = e.touches.clientY;
    if(move - startY > 100){
        sheetUI.classList.remove("active");
    }
});

// 🖐️ DRAG FORM (POPUP LA DHAQAAJIN KARO)
let popup = document.querySelector(".popup");

let isDown = false;
let offsetX, offsetY;

popup.addEventListener("mousedown", (e)=>{
    isDown = true;
    offsetX = e.clientX - popup.offsetLeft;
    offsetY = e.clientY - popup.offsetTop;
});

document.addEventListener("mouseup", ()=> isDown=false);

document.addEventListener("mousemove", (e)=>{
    if(!isDown) return;

    popup.style.position = "absolute";
    popup.style.left = (e.clientX - offsetX) + "px";
    popup.style.top = (e.clientY - offsetY) + "px";
});

</script>

</body>
</html>
