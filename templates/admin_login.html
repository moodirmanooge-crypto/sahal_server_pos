<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login</title>

<style>

body{
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #0f2027, #2c5364);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* CARD */
.card{
    background:white;
    padding:30px;
    border-radius:15px;
    width:90%;
    max-width:350px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
    animation: fadeIn 0.5s ease;
}

/* TITLE */
h2{
    margin-bottom:20px;
}

/* INPUT */
input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ddd;
    border-radius:8px;
    font-size:14px;
    transition:0.3s;
}

input:focus{
    border-color:#0a7cff;
    outline:none;
}

/* BUTTON */
button{
    width:100%;
    padding:12px;
    background: linear-gradient(to right, #ff416c, #ff4b2b);
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
    font-weight:bold;
}

button:hover{
    opacity:0.9;
}

/* ERROR */
.error{
    background:#ffe5e5;
    color:red;
    padding:8px;
    border-radius:5px;
    margin-bottom:10px;
}

/* SMALL TEXT */
.footer{
    margin-top:15px;
    font-size:12px;
    color:#777;
}

/* ANIMATION */
@keyframes fadeIn{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}

</style>
</head>

<body>

<div class="card">

<h2>🔐 Admin Login</h2>

{% if error %}
<div class="error">{{error}}</div>
{% endif %}

<form method="POST">

<input 
name="password" 
type="password" 
placeholder="Enter Admin Password" 
required>

<button type="submit">Login</button>

</form>

<div class="footer">
Sahal Server System
</div>

</div>

</body>
</html>
