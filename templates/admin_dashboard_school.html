<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>

<style>
body{
font-family:Segoe UI;
background:#f4f6f9;
margin:0;
}

/* HEADER */
.header{
background:#2c3e50;
color:white;
padding:15px;
text-align:center;
position:relative;
}

.header a{
position:absolute;
right:20px;
top:18px;
color:white;
text-decoration:none;
background:#3498db;
padding:6px 12px;
border-radius:6px;
}

/* CONTAINER */
.container{
padding:20px;
}

/* SEARCH */
.search-box{
margin-bottom:15px;
display:flex;
gap:10px;
}

.search-box input{
padding:8px;
border-radius:6px;
border:1px solid #ddd;
width:200px;
}

.search-box button{
padding:8px 15px;
background:#3498db;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

/* STATS */
.stats{
display:flex;
gap:15px;
margin-bottom:20px;
flex-wrap:wrap;
}

.stat-card{
flex:1;
min-width:200px;
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
text-align:center;
}

.stat-card h3{
margin:0;
font-size:18px;
color:#555;
}

.stat-card p{
font-size:20px;
font-weight:bold;
margin-top:5px;
}

/* CARD */
.card{
background:white;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
overflow:hidden;
}

/* SCROLL */
.table-container{
overflow:auto;
max-height:450px;
}

/* TABLE */
.table{
width:100%;
min-width:1000px;
border-collapse:collapse;
}

.table th{
background:#34495e;
color:white;
padding:10px;
text-align:center;
}

.table td{
padding:10px;
border-bottom:1px solid #eee;
text-align:center;
vertical-align:middle;
}

/* IMAGE */
.std-img{
width:45px;
height:45px;
border-radius:50%;
object-fit:cover;
}

/* BADGE */
.badge{
padding:4px 10px;
border-radius:20px;
font-size:12px;
font-weight:bold;
}

.paid{
background:#d4edda;
color:#155724;
}

.unpaid{
background:#f8d7da;
color:#721c24;
}
</style>

</head>

<body>

<div class="header">
<h2>🎓 Admin - Students</h2>
<a href="/admin_attendance">📊 Attendance</a>
</div>

<div class="container">

<!-- 🔥 STATS -->
<div class="stats">
<div class="stat-card">
<h3>Total Fees</h3>
<p id="totalFees">$0</p>
</div>

<div class="stat-card">
<h3>Total Paid (Sales)</h3>
<p id="totalPaid">$0</p>
</div>

<div class="stat-card">
<h3>Remaining</h3>
<p id="totalRemaining">$0</p>
</div>
</div>

<!-- 🔍 SEARCH -->
<div class="search-box">
<input id="searchId" placeholder="Enter Student ID">
<button onclick="searchStudent()">Search</button>
<button onclick="loadAll()">Reset</button>
</div>

<div class="card">

<div class="table-container">
<table class="table">

<thead>
<tr>
<th>Photo</th>
<th>Name</th>
<th>ID</th>
<th>Class</th>
<th>Fee</th>
<th>Paid</th>
<th>Remaining</th>
<th>Student Phone</th>
<th>Parent Phone</th>
<th>Status</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>
</div>

</div>

</div>

<script>

// LOAD ALL STUDENTS
async function loadAll(){
let res = await fetch("/get_students");
let data = await res.json();

let table = document.getElementById("tableBody");

let totalFees = 0;
let totalPaid = 0;

table.innerHTML = "";

data.forEach(s=>{

let fee = s.fee || 0;
let paid = s.paid_amount || 0;
let remaining = fee - paid;

totalFees += fee;
totalPaid += paid;

let status = remaining <= 0 ? "paid" : "unpaid";

table.innerHTML += `
<tr>

<td>
<img class="std-img"
src="${s.photo ? '/static/uploads/'+s.photo : 'https://ui-avatars.com/api/?name='+s.full_name}"
onerror="this.src='https://ui-avatars.com/api/?name=${s.full_name}'">
</td>

<td>${s.full_name}</td>
<td>${s.student_id}</td>
<td>${s.class_name || '-'}</td>
<td>$${fee}</td>
<td>$${paid}</td>
<td>$${remaining}</td>
<td>${s.student_phone || '-'}</td>
<td>${s.mother_phone || '-'}</td>

<td>
<span class="badge ${status=='paid'?'paid':'unpaid'}">${status}</span>
</td>

</tr>
`;
});

// 🔥 UPDATE STATS
document.getElementById("totalFees").innerText = "$"+totalFees;
document.getElementById("totalPaid").innerText = "$"+totalPaid;
document.getElementById("totalRemaining").innerText = "$"+(totalFees-totalPaid);

}

// SEARCH
async function searchStudent(){

let id = document.getElementById("searchId").value.trim();

if(!id){
loadAll();
return;
}

let res = await fetch("/get_students");
let data = await res.json();

let filtered = data.filter(s => s.student_id == id);

if(filtered.length === 0){
alert("Not found");
return;
}

renderFiltered(filtered);
}

// RENDER SEARCH RESULT
function renderFiltered(data){

let table = document.getElementById("tableBody");

let totalFees = 0;
let totalPaid = 0;

table.innerHTML = "";

data.forEach(s=>{

let fee = s.fee || 0;
let paid = s.paid_amount || 0;
let remaining = fee - paid;

totalFees += fee;
totalPaid += paid;

let status = remaining <= 0 ? "paid" : "unpaid";

table.innerHTML += `
<tr>
<td><img class="std-img" src="${s.photo ? '/static/uploads/'+s.photo : 'https://ui-avatars.com/api/?name='+s.full_name}"></td>
<td>${s.full_name}</td>
<td>${s.student_id}</td>
<td>${s.class_name || '-'}</td>
<td>$${fee}</td>
<td>$${paid}</td>
<td>$${remaining}</td>
<td>${s.student_phone || '-'}</td>
<td>${s.mother_phone || '-'}</td>
<td><span class="badge ${status=='paid'?'paid':'unpaid'}">${status}</span></td>
</tr>
`;
});

// UPDATE STATS
document.getElementById("totalFees").innerText = "$"+totalFees;
document.getElementById("totalPaid").innerText = "$"+totalPaid;
document.getElementById("totalRemaining").innerText = "$"+(totalFees-totalPaid);
}

// INIT
window.onload = loadAll;

</script>

</body>
</html>
