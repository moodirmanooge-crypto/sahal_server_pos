<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Results</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#111827;
    color:white;
    padding:30px;
    margin:0;
}

.container{
    max-width:1000px;
    margin:auto;
}

h1,h2{
    text-align:center;
}

.timer-box{
    text-align:center;
    font-size:30px;
    font-weight:bold;
    margin:20px 0;
    color:#38bdf8;
}

.break-box{
    background:#1f2937;
    padding:30px;
    border-radius:15px;
    text-align:center;
    margin-bottom:30px;
}

.break-video{
    width:100%;
    border-radius:15px;
    margin-top:20px;
}

.candidate{
    background:#1f2937;
    padding:20px;
    border-radius:15px;
    margin-bottom:20px;
    display:flex;
    align-items:center;
    gap:20px;
}

.candidate img{
    width:100px;
    height:100px;
    border-radius:50%;
    object-fit:cover;
    border:2px solid white;
}

.progress{
    width:100%;
    height:20px;
    background:#374151;
    border-radius:10px;
    overflow:hidden;
    margin-top:10px;
}

.bar{
    height:100%;
    background:#0a7cff;
    width:0%;
    transition:1s;
}
</style>
</head>
<body>

<div class="container">

    <h1>📊 Live Election Results</h1>
    <h2>Round {{ current_round }}</h2>

    <div class="timer-box" id="timer">00:00:00</div>

    {% if break_mode %}
    <div class="break-box">
        <h2>⏳ Break Time / Ads Running</h2>
        <p>Next round starts soon...</p>

        <video class="break-video" controls autoplay muted loop>
            <source src="{{ url_for('static', filename='ads/ad1.mp4') }}" type="video/mp4">
        </video>
    </div>
    {% endif %}

    {% for c in candidates %}
    <div class="candidate">
        <img src="{{ url_for('static', filename='uploads/' + c[6]) }}" alt="candidate">

        <div style="width:100%">
            <h2>{{ c[1] }}</h2>
            <p>Votes: {{ c[4] }}</p>
            <p>Percentage: {{ c[5] }}%</p>

            <div class="progress">
                <div class="bar" data-percent="{{ c[5] }}"></div>
            </div>
        </div>
    </div>
    {% endfor %}
</div>

<script>
let totalSeconds = Number("{{ remaining_seconds | default(0) }}");

function updateTimer(){
    let hrs = Math.floor(totalSeconds / 3600);
    let mins = Math.floor((totalSeconds % 3600) / 60);
    let secs = totalSeconds % 60;

    document.getElementById("timer").innerHTML =
        String(hrs).padStart(2, "0") + ":" +
        String(mins).padStart(2, "0") + ":" +
        String(secs).padStart(2, "0");

    if(totalSeconds > 0){
        totalSeconds--;
    }
}

setInterval(updateTimer, 1000);
updateTimer();

document.querySelectorAll(".bar").forEach(function(bar){
    let percent = bar.getAttribute("data-percent");
    bar.style.width = percent + "%";
});

setTimeout(function(){
    location.reload();
}, 5000);
</script>

</body>
</html>
