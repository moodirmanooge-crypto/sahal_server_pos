<!DOCTYPE html>
<html>
<head>
<title>Attendance Admin</title>

<style>
body{
font-family:Segoe UI;
background:#f4f6f9;
margin:0;
}

/* HEADER */
.header{
background:#2c3e50;
color:white;
padding:15px;
text-align:center;
}

/* CONTAINER */
.container{
padding:20px;
}

/* CARD */
.card{
background:white;
margin-bottom:20px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
overflow:hidden;
}

/* TITLE */
.card h3{
margin:0;
padding:12px;
background:#1e3c72;
color:white;
}

/* TABLE */
.table{
width:100%;
border-collapse:collapse;
}

.table th{
background:#34495e;
color:white;
padding:10px;
text-align:center;
}

.table td{
padding:10px;
border-bottom:1px solid #eee;
text-align:center;
}

/* IMAGE */
.std-img{
width:45px;
height:45px;
border-radius:50%;
object-fit:cover;
}

/* FORM */
select{
padding:5px;
border-radius:5px;
}

button{
padding:6px 12px;
background:#3498db;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}
</style>

</head>

<body>

<div class="header">
<h2>📊 Attendance Control</h2>
</div>

<div class="container">

{% for cls, rows in data.items() %}

<div class="card">

<h3>📘 Class {{ cls }}</h3>

<table class="table">

<tr>
<th>Photo</th>
<th>Name</th>
<th>Teacher</th>
<th>Date</th>
<th>Status</th>
<th>Update</th>
</tr>

{% for a in rows %}
<tr>

<td>
<img class="std-img"
src="{% if a.photo %}/static/uploads/{{ a.photo }}{% else %}https://ui-avatars.com/api/?name={{ a.name }}{% endif %}">
</td>

<td>{{ a.name }}</td>
<td>{{ a.teacher }}</td>
<td>{{ a.date }}</td>

<td>
<select id="s-{{ a.student_id }}-{{ a.date }}">
<option value="present" {% if a.status=='present' %}selected{% endif %}>Present</option>
<option value="absent" {% if a.status=='absent' %}selected{% endif %}>Absent</option>
<option value="sick" {% if a.status=='sick' %}selected{% endif %}>Sick</option>
</select>
</td>

<td>
<button onclick="update('{{ a.student_id }}','{{ a.date }}')">Save</button>
</td>

</tr>
{% endfor %}

</table>

</div>

{% endfor %}

</div>

<script>

async function update(id,date){

let status=document.getElementById(`s-${id}-${date}`).value;

let fd=new FormData();
fd.append("student_id",id);
fd.append("date",date);
fd.append("status",status);

let res=await fetch("/admin_update_attendance",{method:"POST",body:fd});
let data=await res.json();

if(data.success){
alert("✅ Updated");
}else{
alert(data.error);
}

}

</script>

</body>
</html>
