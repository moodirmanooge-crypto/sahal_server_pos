<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eVote Admin Panel</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f4f7fb;
            padding:30px;
            margin:0;
        }

        .container{
            max-width:800px;
            margin:auto;
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0 0 15px rgba(0,0,0,0.1);
        }

        h1{
            text-align:center;
            margin-bottom:30px;
            color:#1f2937;
        }

        .card{
            margin-bottom:25px;
            padding:20px;
            border-radius:12px;
            background:#f9fafb;
            border:1px solid #ddd;
        }

        h2{
            margin-top:0;
            color:#111827;
        }

        input{
            padding:12px;
            width:100%;
            box-sizing:border-box;
            margin-bottom:10px;
            border:1px solid #ccc;
            border-radius:8px;
        }

        button{
            padding:12px 20px;
            border:none;
            border-radius:8px;
            cursor:pointer;
            font-weight:bold;
            color:white;
            margin:5px;
        }

        .blue{ background:#0a7cff; }
        .green{ background:#22c55e; }
        .red{ background:#ef4444; }
        .purple{ background:#8b5cf6; }

        .round-buttons{
            display:flex;
            justify-content:center;
            flex-wrap:wrap;
            gap:10px;
        }

        .info{
            font-size:18px;
            margin-top:10px;
        }

        a{
            text-decoration:none;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>⚙️ eVote Admin Panel</h1>

    <!-- TIMER -->
    <div class="card">
        <h2>⏰ Set Timer</h2>
        <form action="/set_timer" method="POST">
            <input type="number" name="minutes" placeholder="Enter minutes" required>
            <button class="blue" type="submit">Set Timer</button>
        </form>

        <div class="info">
            <p><strong>Current Timer:</strong> {{ current_timer }} minutes</p>
            <p><strong>End Time:</strong> {{ end_time }}</p>
        </div>
    </div>

    <!-- UPLOAD VIDEO -->
    <div class="card">
        <h2>🎥 Upload Break Advertisement</h2>
        <form action="/upload_ad" method="POST" enctype="multipart/form-data">
            <input type="file" name="ad_video" accept="video/mp4" required>
            <button class="purple" type="submit">Upload Video</button>
        </form>
    </div>

    <!-- ROUND CONTROL -->
    <div class="card">
        <h2>🔄 Round Management</h2>

        <div class="round-buttons">
            <a href="/back_round">
                <button class="red" type="button">⬅ Back Round</button>
            </a>

            <a href="/next_round">
                <button class="green" type="button">➡ Next Round</button>
            </a>
        </div>
    </div>

    <!-- LIVE RESULTS -->
    <div class="card">
        <h2>📊 Live Results</h2>

        <a href="/live_results" target="_blank">
            <button class="blue" type="button">Open Live Results</button>
        </a>
    </div>
</div>

</body>
</html>
