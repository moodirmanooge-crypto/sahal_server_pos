<!DOCTYPE html>
<html>
<head>
    <title>Student Registration</title>
    <style>
        body{
            font-family:Arial;
            background:#f4f6f9;
            padding:20px;
        }

        .container{
            max-width:500px;
            margin:auto;
            background:white;
            padding:25px;
            border-radius:15px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        h1{
            text-align:center;
            color:#0a7cff;
        }

        input,button{
            width:100%;
            padding:12px;
            margin-top:12px;
            border-radius:8px;
            border:1px solid #ddd;
            box-sizing:border-box;
        }

        button{
            background:#0a7cff;
            color:white;
            border:none;
            font-weight:bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🎓 Student Registration</h1>

    <form method="POST">
        <input name="student_id" placeholder="Student ID" required>
        <input name="full_name" placeholder="Full Name" required>
        <input name="phone_number" placeholder="Phone Number" required>
        <input name="department" placeholder="Department" required>
        <input name="semester" placeholder="Semester" required>

        <button type="submit">Register Student</button>
    </form>
</div>

</body>
</html>
