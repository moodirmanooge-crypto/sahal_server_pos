<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<script>
const socket = io();
const RID = "{{ rid }}";

let sound = document.getElementById("orderSound");

/* =========================
   VOICE CALL VARIABLES
========================= */
let peer;
let localStream;

/* join kitchen room */
socket.emit("join_kitchen_room", {
    rid: RID
});

/* unlock sound */
document.body.addEventListener("click", function(){
    sound.play().then(()=>{
        sound.pause();
        sound.currentTime = 0;
    }).catch(()=>{});
}, { once:true });

function playAlert(){
    sound.volume = 1.0;

    for(let i=0;i<5;i++){
        setTimeout(()=>{
            sound.currentTime = 0;
            sound.play().catch(()=>{});
        }, i*1000);
    }
}

function toggleNotify(){
    let box = document.getElementById("notifyList");
    box.style.display = box.style.display === "block" ? "none" : "block";
}

/* =========================
   INCOMING VOICE CALL
========================= */
socket.on("incoming_call", function(data){
    alert("📞 Incoming call from table " + data.table);
});

/* RECEIVE OFFER */
socket.on("offer", async function(offer){
    localStream = await navigator.mediaDevices.getUserMedia({
        audio: true
    });

    peer = new RTCPeerConnection();

    localStream.getTracks().forEach(track=>{
        peer.addTrack(track, localStream);
    });

    peer.onicecandidate = event=>{
        if(event.candidate){
            socket.emit("ice_candidate", event.candidate);
        }
    };

    peer.ontrack = event=>{
        let audio = new Audio();
        audio.srcObject = event.streams[0];
        audio.play();
    };

    await peer.setRemoteDescription(
        new RTCSessionDescription(offer)
    );

    const answer = await peer.createAnswer();
    await peer.setLocalDescription(answer);

    socket.emit("answer", answer);
});

/* RECEIVE ANSWER */
socket.on("answer", async function(answer){
    if(peer){
        await peer.setRemoteDescription(
            new RTCSessionDescription(answer)
        );
    }
});

/* RECEIVE ICE */
socket.on("ice_candidate", async function(candidate){
    if(peer){
        await peer.addIceCandidate(
            new RTCIceCandidate(candidate)
        );
    }
});

/* REAL NEW ORDER */
socket.on("new_order", function(data){
    playAlert();

    let container = document.getElementById("ordersContainer");

    let html = `
    <div class="order" id="order${data.id}">
        <h3>Order #${data.id}</h3>
        <p><b>Food:</b> ${data.food}</p>
        <p><b>Table:</b> ${data.table}</p>
        <p><b>Date:</b> ${data.date}</p>
        <p><b>Status:</b> <span id="status${data.id}">pending</span></p>

        <button class="preparing"
            onclick="updateStatus('${data.id}','preparing')">
            Preparing
        </button>

        <button class="ready"
            onclick="updateStatus('${data.id}','ready')">
            ✅ Ready
        </button>
    </div>
    `;

    container.insertAdjacentHTML("afterbegin", html);
});

/* REAL WAITER CALL */
socket.on("new_waiter_call", function(data){
    playAlert();

    let box = document.getElementById("notifyList");
    box.style.display = "block";

    box.insertAdjacentHTML("afterbegin", `
        <div class="notify-item">
            <b>Table ${data.table}</b><br>
            Calling waiter
            <br><br>
            <button class="done" onclick="confirmWaiter('${data.table}')">
                I am coming
            </button>
        </div>
    `);
});

function clearOrders(){
    if(confirm("Clear all orders?")){
        fetch("/clear_orders/" + RID)
        .then(()=>location.reload());
    }
}

function clearCalls(){
    if(confirm("Clear all calls?")){
        fetch("/clear_calls/" + RID)
        .then(()=>location.reload());
    }
}

function confirmWaiter(table){
    fetch("/waiter_done/" + RID,{
        method:"POST",
        headers:{
            "Content-Type":"application/x-www-form-urlencoded"
        },
        body:"table="+table
    })
    .then(()=>{
        socket.emit("waiter_response", {
            rid: RID,
            table: table,
            message: "Waiter is coming now 🧑‍🍳"
        });

        alert("Customer notified ✅");
        location.reload();
    });
}

function updateStatus(id,status){
    fetch("/update_status/" + id + "/" + status)
    .then(()=>{
        let statusBox = document.getElementById("status"+id);

        if(statusBox){
            statusBox.innerText = status;
        }

        socket.emit("status_update", {
            rid: RID,
            order_id: id,
            status: status
        });

        if(status === "ready"){
            playAlert();
        }

        alert("Status updated ✅");
    });
}
</script>
