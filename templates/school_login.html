<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>School Login</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(to right, #373B44, #4286f4);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.box {
    background: white;
    padding: 30px;
    border-radius: 10px;
    width: 350px;
}
input, button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
}
button {
    background: #4286f4;
    color: white;
    border: none;
}
.msg {
    margin-top: 10px;
    text-align: center;
}
</style>
</head>

<body>

<div class="box">
<h2>🔐 School Login</h2>

<form id="form">
<input name="school_code" placeholder="School Code" required>
<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>
</form>

<div id="msg" class="msg"></div>
</div>

<script>
document.getElementById("form").onsubmit = async (e) => {
    e.preventDefault();

    let res = await fetch("/school_login", {
        method: "POST",
        body: new FormData(e.target)
    });

    let data = await res.json();

    if(data.error === "expired"){
        document.getElementById("msg").innerHTML =
            "<span style='color:red'>" + data.message + "</span>";
    }
    else if(data.error){
        document.getElementById("msg").innerHTML =
            "<span style='color:red'>" + data.error + "</span>";
    }
    else{
        window.location.href = data.redirect;
    }
}
</script>

</body>
</html>
