<!DOCTYPE html>
<html>

<head>
<title>Menu</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#f5f5f5;
padding:10px;
}

/* TABS */
.tabs{
display:flex;
gap:10px;
margin-bottom:15px;
}

.tab{
flex:1;
padding:10px;
background:#ddd;
text-align:center;
cursor:pointer;
border-radius:10px;
font-weight:bold;
}

.active{
background:#0a7cff;
color:white;
}

/* SECTIONS */
.section{
display:none;
}

/* GRID MENU */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
margin-top:15px;
}

/* CARD */
.card{
background:white;
padding:10px;
border-radius:12px;
box-shadow:0 0 6px rgba(0,0,0,0.1);
text-align:center;
transition:0.3s;
}

.card:hover{
transform:scale(1.02);
}

.card img{
width:100%;
height:120px;
border-radius:10px;
object-fit:cover;
margin-bottom:8px;
}

.price{
color:#0a7cff;
font-weight:bold;
margin:5px 0;
}

/* DELETE BUTTON */
.delete-btn{
background:red;
color:white;
padding:8px 10px;
border:none;
border-radius:6px;
cursor:pointer;
width:100%;
}

/* FORM */
form{
background:white;
padding:10px;
border-radius:10px;
margin-bottom:10px;
}

input,select{
padding:8px;
margin:5px 0;
width:100%;
box-sizing:border-box;
}

button{
padding:10px;
background:#0a7cff;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
width:100%;
}

</style>

</head>

<body>

<h1>🍽️ Menu</h1>

<!-- ADD MENU -->
<form method="post" enctype="multipart/form-data">

<input name="name" placeholder="Name" required>
<input name="price" placeholder="Price" required>

<select name="category" required>
<option value="">Select Category</option>
<option value="food">🍔 Food</option>
<option value="cold">🧃 Cold Drink</option>
<option value="hot">☕ Hot Drink</option>
</select>

<input type="file" name="image" required>

<button>Add Menu</button>

</form>

<hr>

<!-- TABS -->
<div class="tabs">
<div class="tab active" onclick="showTab(event,'food')">🍔 Food</div>
<div class="tab" onclick="showTab(event,'cold')">🧃 Drinks</div>
<div class="tab" onclick="showTab(event,'hot')">☕ Hot</div>
</div>

<!-- FOOD -->
<div id="food" class="section" style="display:block;">
<div class="grid">
{% for f in food %}
{% if f[5] == 'food' %}
<div class="card">
<img src="/static/uploads/{{f[4]}}">
<b>{{f[2]}}</b>
<div class="price">$ {{f[3]}}</div>

<a href="/delete_menu/{{f[0]}}/{{rid}}">
<button class="delete-btn">🗑 Delete</button>
</a>
</div>
{% endif %}
{% endfor %}
</div>
</div>

<!-- COLD -->
<div id="cold" class="section">
<div class="grid">
{% for f in food %}
{% if f[5] == 'cold' %}
<div class="card">
<img src="/static/uploads/{{f[4]}}">
<b>{{f[2]}}</b>
<div class="price">$ {{f[3]}}</div>

<a href="/delete_menu/{{f[0]}}/{{rid}}">
<button class="delete-btn">🗑 Delete</button>
</a>
</div>
{% endif %}
{% endfor %}
</div>
</div>

<!-- HOT -->
<div id="hot" class="section">
<div class="grid">
{% for f in food %}
{% if f[5] == 'hot' %}
<div class="card">
<img src="/static/uploads/{{f[4]}}">
<b>{{f[2]}}</b>
<div class="price">$ {{f[3]}}</div>

<a href="/delete_menu/{{f[0]}}/{{rid}}">
<button class="delete-btn">🗑 Delete</button>
</a>
</div>
{% endif %}
{% endfor %}
</div>
</div>

<script>

function showTab(e,type){

document.querySelectorAll(".section").forEach(s=>s.style.display="none")
document.getElementById(type).style.display="block"

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"))
e.target.classList.add("active")

}

</script>

</body>
</html>
