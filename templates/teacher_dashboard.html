<!DOCTYPE html>
<html lang="so">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Teacher Dashboard</title>

<style>
body {font-family:'Segoe UI';background:#f4f6f9;margin:0;}

.header{
background:linear-gradient(135deg,#1e3c72,#2a5298);
color:white;padding:20px;text-align:center;
}

.container{
max-width:1100px;
margin:20px auto;
background:white;
padding:25px;
border-radius:12px;
}

.class-tabs{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;}
.tab{padding:10px 15px;background:#eee;border-radius:8px;text-decoration:none;font-weight:bold;}
.tab.active{background:#3498db;color:white;}

.info{display:flex;justify-content:space-between;margin-bottom:15px;font-weight:bold;}

table{width:100%;border-collapse:collapse;}
th{background:#2c3e50;color:white;padding:10px;}
td{padding:10px;border:1px solid #eee;}

.std-img{width:45px;height:45px;border-radius:50%;}

.btn-group{display:flex;gap:5px;}

.btn{
flex:1;padding:8px;border:none;border-radius:6px;
cursor:pointer;font-weight:bold;
}

.present{background:#d4edda;}
.absent{background:#f8d7da;}

.active-p{background:#28a745;color:white;}
.active-a{background:#dc3545;color:white;}

.locked{opacity:0.4;pointer-events:none;}

.save-btn{
width:100%;padding:15px;background:#2c3e50;
color:white;border:none;margin-top:20px;
border-radius:8px;font-size:16px;
}

.lang-btn{
margin-top:10px;padding:6px 12px;
background:#555;color:white;border:none;
border-radius:6px;
}

.success{
background:#d4edda;
padding:10px;
margin-top:10px;
border-radius:8px;
text-align:center;
display:none;
}

.timer{
margin-top:10px;
padding:10px;
background:#fff3cd;
border-radius:8px;
text-align:center;
display:none;
}
</style>
</head>

<body>

<div class="header">
<h2>👨‍🏫 {{ teacher_name }}</h2>
<p>{{ subject }}</p>
<button onclick="toggleLang()" class="lang-btn">🌐 Language</button>
</div>

<div class="container">

<div class="class-tabs">
{% for cls in classes %}
<a href="?class={{ cls }}" class="tab {% if selected_class == cls %}active{% endif %}">
{{ cls }}
</a>
{% endfor %}
</div>

<div class="info">
<div id="clsText">📚 Fasal: {{ selected_class }}</div>
<div id="stdText">👥 Arday: {{ students|length }}</div>
</div>

<table>
<thead>
<tr>
<th>#</th>
<th>Sawir</th>
<th>ID</th>
<th>Magac</th>
<th id="attText">Xaadirin</th>
</tr>
</thead>

<tbody>
{% for std in students %}
<tr>

<td>{{ loop.index }}</td>

<td>
<img src="/static/uploads/{{ std.photo if std.photo else 'default.png' }}"
class="std-img"
onerror="this.src='https://ui-avatars.com/api/?name={{ std.full_name }}'">
</td>

<td><b>{{ std.student_id }}</b></td>
<td>{{ std.full_name }}</td>

<td>
<div class="btn-group">
<button id="p-{{ std.student_id }}" class="btn present"
onclick="mark('{{ std.student_id }}','present')">Jooga</button>

<button id="a-{{ std.student_id }}" class="btn absent"
onclick="mark('{{ std.student_id }}','absent')">Maqan</button>
</div>
</td>

</tr>
{% endfor %}
</tbody>
</table>

<button onclick="saveAttendance()" class="save-btn" id="saveBtn">
💾 Save Attendance
</button>

<div id="successBox" class="success">✅ Waa la keydiyay</div>
<div id="timerBox" class="timer"></div>

</div>

<script>

let attendance = {};
let saved = false;
let isEnglish = false;

// MARK
function mark(id,status){

if(saved) return;

let p = document.getElementById("p-"+id);
let a = document.getElementById("a-"+id);

p.classList.remove("active-p","locked");
a.classList.remove("active-a","locked");

if(status==="present"){
    p.classList.add("active-p");
    a.classList.add("locked");
}else{
    a.classList.add("active-a");
    p.classList.add("locked");
}

attendance[id]=status;
}

// SAVE
async function saveAttendance(){

if(saved) return;

let list = Object.keys(attendance).map(id=>({
    student_id:id,
    status:attendance[id]
}));

let total = { studentslength };  // ✅ FIXED

if(list.length===0){
    alert(isEnglish ? "Select students!" : "Dooro arday!");
    return;
}

if(list.length < total){
    if(!confirm(isEnglish ? "Some missing, continue?" : "Qaar lama dooran, sii wad?")) return;
}

let btn = document.getElementById("saveBtn");
btn.disabled=true;

let res = await fetch("/submit_attendance",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({attendance:list})
});

let data = await res.json();

if(data.success){

saved = true;

document.getElementById("successBox").style.display="block";

// LOCK ALL
document.querySelectorAll(".btn").forEach(b=>b.classList.add("locked"));

// TIMER 24H
startTimer(86400);

}else{
alert(data.error);
btn.disabled=false;
}
}

// TIMER
function startTimer(sec){

let box=document.getElementById("timerBox");
box.style.display="block";

let t=setInterval(()=>{
sec--;

let h=Math.floor(sec/3600);
let m=Math.floor((sec%3600)/60);
let s=sec%60;

box.innerText = `⏳ ${h}h ${m}m ${s}s`;

if(sec<=0){
clearInterval(t);
location.reload();
}

},1000);
}

// LANGUAGE
function toggleLang(){

isEnglish=!isEnglish;

document.getElementById("attText").innerText = isEnglish?"Attendance":"Xaadirin";
document.getElementById("clsText").innerText = isEnglish?"Class: {{ selected_class }}":"📚 Fasal: {{ selected_class }}";
document.getElementById("stdText").innerText = isEnglish?"Students: {{ students|length }}":"👥 Arday: {{ students|length }}";

document.querySelectorAll(".present").forEach(b=>{
b.innerText=isEnglish?"Present":"Jooga";
});
document.querySelectorAll(".absent").forEach(b=>{
b.innerText=isEnglish?"Absent":"Maqan";
});

document.getElementById("saveBtn").innerText =
isEnglish?"Save Attendance":"💾 Save Attendance";
}

</script>

</body>
</html>
