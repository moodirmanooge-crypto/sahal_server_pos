<!DOCTYPE html>
<html>
<head>
<title>Attendance</title>

<style>
body{font-family:Segoe UI;background:#f5f6fa;margin:0;}

.header{
background:#2f4f6f;
color:white;
padding:15px;
text-align:center;
}

.container{padding:20px;}

.card{
background:white;
padding:15px;
margin-bottom:20px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.table{
width:100%;
border-collapse:collapse;
}

.table th{
background:#1e3c72;
color:white;
}

.table td,.table th{
padding:10px;
text-align:center;
border-bottom:1px solid #eee;
}

.std-img{
width:45px;
height:45px;
border-radius:50%;
object-fit:cover;
}
</style>
</head>

<body>

<div class="header">
<h2>📊 Attendance Control</h2>
</div>

<div class="container">

{% for cls, rows in data.items() %}

<div class="card">

<h3>📘 Class: {{ cls }}</h3>

<table class="table">
<thead>
<tr>
<th>Photo</th>
<th>Name</th>
<th>Teacher</th>
<th>Date</th>
<th>Status</th>
</tr>
</thead>

<tbody>

{% for r in rows %}

<tr>
<td>
<img class="std-img"
src="{% if r.photo %}/static/uploads/{{ r.photo }}{% else %}https://ui-avatars.com/api/?name={{ r.name }}{% endif %}">
</td>

<td>{{ r.name }}</td>
<td>{{ r.teacher }}</td>
<td>{{ r.date }}</td>
<td>{{ r.status }}</td>
</tr>

{% endfor %}

</tbody>
</table>

</div>

{% endfor %}

</div>

</body>
</html>
