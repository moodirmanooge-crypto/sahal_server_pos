<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Future Leader Academy (Registration)</title>

    <style>
        body{
            font-family:Arial, sans-serif;
            background:#f4f6f9;
            padding:20px;
            margin:0;
        }

        .container{
            max-width:500px;
            margin:auto;
            background:white;
            padding:25px;
            border-radius:15px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
            margin-top:40px;
        }

        h1{
            text-align:center;
            color:#0a7cff;
            margin-bottom:25px;
            font-size:34px;
        }

        input, select, button{
            width:100%;
            padding:12px;
            margin-top:12px;
            border-radius:8px;
            border:1px solid #ddd;
            box-sizing:border-box;
            font-size:16px;
        }

        input[readonly]{
            background:#f1f1f1;
        }

        button{
            background:#0a7cff;
            color:white;
            border:none;
            font-weight:bold;
            cursor:pointer;
        }

        .payment-box{
            margin-top:20px;
            padding:15px;
            background:#fff8e1;
            border-radius:10px;
            border:1px solid #ffe082;
            display:none;
        }

        .receipt{
            margin-top:20px;
            padding:20px;
            background:#e8f5e9;
            border-radius:12px;
            text-align:center;
            display:none;
        }

        .ussd{
            font-size:22px;
            font-weight:bold;
            color:green;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🎓 Future Leader Academy (Registration)</h1>

    <form method="POST" id="registerForm">
        <!-- 4 digits only -->
        <input
            name="student_id"
            id="student_id"
            placeholder="Student ID (4 digits)"
            maxlength="4"
            pattern="[0-9]{4}"
            required
        >

        <!-- 3 names letters only -->
        <input
            name="full_name"
            id="full_name"
            placeholder="Full Name (3 names)"
            pattern="[A-Za-z ]+"
            required
        >

        <input
            name="phone_number"
            placeholder="Phone Number"
            required
        >

        <input
            name="department"
            value="SNTVITY-SUPLEMMENT"
            readonly
        >

        <!-- dropdown class -->
        <select name="student_class" required>
            <option value="">Select Class</option>
            <option value="G8">G8</option>
            <option value="F1">F1</option>
            <option value="F2">F2</option>
            <option value="F3">F3</option>
            <option value="F4">F4</option>
        </select>

        <button type="button" onclick="showPayment()">
            Register Student
        </button>

        <div class="payment-box" id="paymentBox">
            <h3>💳 Fadlan lacagta registration-ka dir</h3>
            <p class="ussd">*712*617412929*2#</p>

            <button type="submit">
                ✅ Submit Payment
            </button>
        </div>
    </form>

    {% if student %}
    <div class="receipt" style="display:block;">
        <h2>✅ Payment Confirmed</h2>
        <p><b>ID:</b> {{ student.student_id }}</p>
        <p><b>Name:</b> {{ student.full_name }}</p>
        <p><b>Status:</b> Registration Completed</p>
    </div>
    {% endif %}
</div>

<script>
function showPayment(){
    let id = document.getElementById("student_id").value.trim();
    let name = document.getElementById("full_name").value.trim();

    if(!/^\d{4}$/.test(id)){
        alert("Student ID must be exactly 4 digits ❌");
        return;
    }

    let words = name.split(" ").filter(word => word !== "");

    if(words.length !== 3){
        alert("Full name must be exactly 3 names ❌");
        return;
    }

    document.getElementById("paymentBox").style.display = "block";
}
</script>

</body>
</html>
