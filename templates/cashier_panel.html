<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cashier Panel</title>
    <style>
        body { font-family: 'Segoe UI'; background: #f5f6fa; margin: 0; padding: 20px; }
        .cashier-box { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 1000px; margin: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 20px; }
        .search-area { margin-bottom: 20px; display: flex; gap: 10px; }
        input[type="text"] { padding: 10px; border: 1px solid #ddd; border-radius: 5px; width: 300px; }
        .table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .table th { background: #2f4f6f; color: white; padding: 12px; text-align: left; }
        .table td { padding: 12px; border-bottom: 1px solid #eee; }
        .pay-input { width: 80px; padding: 5px; border: 1px solid #00b894; border-radius: 4px; }
        .btn-pay { background: #00b894; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; }
        .btn-pay:hover { background: #00967a; }
    </style>
</head>
<body>

<div class="cashier-box">
    <div class="header">
        <h2>💰 Cashier Panel</h2>
        <button onclick="window.location='/'" style="cursor:pointer">Back to Dashboard</button>
    </div>

    <div class="search-area">
        <input type="text" id="cashierSearch" placeholder="Search by Student ID or Name..." onkeyup="searchCashier()">
    </div>

    <table class="table">
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Fee</th>
                <th>Paid</th>
                <th>Remaining</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="cashierTableBody">
            </tbody>
    </table>
</div>

<script>
    let students = [];

    async function loadCashierData() {
        let res = await fetch("/get_students");
        students = await res.json();
        renderCashier(students);
    }

    function renderCashier(data) {
        let tbody = document.getElementById("cashierTableBody");
        tbody.innerHTML = "";
        data.forEach(s => {
            let remaining = (s.fee || 0) - (s.paid || 0);
            tbody.innerHTML += `
                <tr>
                    <td>${s.student_id}</td>
                    <td>${s.full_name}</td>
                    <td>$${s.fee}</td>
                    <td><input type="number" class="pay-input" id="amt_${s.student_id}" placeholder="Pay"></td>
                    <td style="color: red; font-weight: bold;">$${remaining}</td>
                    <td><button class="btn-pay" onclick="processPayment('${s.student_id}')">Pay Now</button></td>
                </tr>`;
        });
    }

    function searchCashier() {
        let val = document.getElementById("cashierSearch").value.toLowerCase();
        let filtered = students.filter(s => 
            s.student_id.includes(val) || s.full_name.toLowerCase().includes(val)
        );
        renderCashier(filtered);
    }

    async function processPayment(id) {
        let amount = document.getElementById("amt_" + id).value;
        if(!amount || amount <= 0) return alert("Enter valid amount");

        let fd = new FormData();
        fd.append("student_id", id);
        fd.append("amount", amount);

        let res = await fetch("/process_payment", { method: "POST", body: fd });
        let data = await res.json();
        
        if(data.success) {
            alert("✅ Payment Success!");
            loadCashierData(); // Refresh list
        } else {
            alert("❌ Error: " + data.error);
        }
    }

    window.onload = loadCashierData;
</script>

</body>
</html>
