<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vote Now</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#eef3f8;
            padding:30px;
            margin:0;
        }

        .container{
            max-width:900px;
            margin:auto;
        }

        h1{
            text-align:center;
            color:#0a7cff;
            margin-bottom:30px;
        }

        input[type="text"]{
            width:100%;
            padding:14px;
            border:1px solid #ddd;
            border-radius:8px;
            margin-bottom:20px;
            box-sizing:border-box;
        }

        .candidate-card{
            background:white;
            border-radius:15px;
            padding:20px;
            margin-bottom:20px;
            box-shadow:0 0 10px rgba(0,0,0,0.08);
            display:flex;
            align-items:center;
            gap:20px;
        }

        .candidate-card img{
            width:100px;
            height:100px;
            border-radius:50%;
            object-fit:cover;
            border:2px solid #ddd;
        }

        .candidate-info h3{
            margin:0 0 10px 0;
        }

        button{
            padding:12px 20px;
            background:#28a745;
            color:white;
            border:none;
            border-radius:8px;
            font-weight:bold;
            cursor:pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🗳️ Vote Round {{ current_round }}</h1>

    <form method="POST">
        <input type="text" name="student_id" placeholder="Enter Vote Code" required>

        {% for c in candidates %}
        <div class="candidate-card">
            <img src="{{ url_for('static', filename='uploads/' + c[3]) }}" alt="candidate">

            <div class="candidate-info">
                <h3>{{ c[1] }}</h3>
                <p>{{ c[2] }}</p>

                <label>
                    <input type="radio" name="candidate_id" value="{{ c[0] }}" required>
                    Select Candidate
                </label>
            </div>
        </div>
        {% endfor %}

        <button type="submit">Submit Vote</button>
    </form>
</div>

</body>
</html>
