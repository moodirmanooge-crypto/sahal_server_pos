<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register School</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #2193b0, #6dd5ed);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}
.box {
    background: white;
    padding: 30px;
    border-radius: 10px;
    width: 350px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
}
h2 {
    text-align: center;
    color: #1e3c72;
    margin-bottom: 20px;
}
input, button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    box-sizing: border-box;
    border: 1px solid #ddd;
    border-radius: 5px;
}
button {
    background: #2193b0;
    color: white;
    border: none;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}
button:hover {
    background: #1e3c72;
}
.msg {
    margin-top: 15px;
    text-align: center;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="box">
<h2>Register School</h2>

<form id="form">
    <input name="school_name" placeholder="School Name" required>
    <input name="phone" placeholder="Phone Number" required>
    <input type="password" name="password" placeholder="Password" required>
    <input name="fee" placeholder="Monthly Fee" required>
    
    <input name="school_code" placeholder="Create School Code (e.g. 5566)" required>

    <button type="submit">Register School</button>
</form>

<div class="msg" id="msg"></div>
</div>

<script>
document.getElementById("form").onsubmit = async (e) => {
    e.preventDefault();
    let msgDiv = document.getElementById("msg");
    msgDiv.innerHTML = "Processing...";

    try {
        let res = await fetch("/register_school", {
            method: "POST",
            body: new FormData(e.target)
        });

        let data = await res.json();

        if(data.error){
            msgDiv.innerHTML = "<span style='color:red'>❌ " + data.error + "</span>";
        } else {
            msgDiv.innerHTML = "<span style='color:green'>✅ Registered! Code: " + data.school_code + "</span>";
            // Nadiifi foomka hadii lagu guulaysto
            e.target.reset();
        }
    } catch (err) {
        msgDiv.innerHTML = "<span style='color:red'>❌ Server error</span>";
    }
}
</script>

</body>
</html>
