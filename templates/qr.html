<!DOCTYPE html>
<html>
<head>
<title>QR Code</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
    font-family:Arial;
    text-align:center;
    background:#f4f4f4;
    padding:40px;
}

.card{
    background:white;
    padding:25px;
    border-radius:10px;
    display:inline-block;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

#qrimg{
    width:280px;
    height:280px;
    object-fit:contain;
    image-rendering:pixelated;
    margin-top:20px;
}

p{
    word-break:break-all;
    color:#444;
}

button{
    padding:10px 20px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    margin:10px;
    font-size:16px;
    color:white;
}

.download{ background:#0a7cff; }
.print{ background:green; }
.back{ background:#333; }
</style>
</head>

<body>

<div class="card">

<h2>QR Code Table {{table}}</h2>

<img id="qrimg" src="/static/qr/{{img}}">

<p>{{url}}</p>

<a href="/static/qr/{{img}}" download>
<button class="download">Download QR</button>
</a>

<button class="print" onclick="printQR()">Print QR</button>

<br><br>

<a href="/dashboard/{{rid}}">
<button class="back">Back Dashboard</button>
</a>

</div>

<script>
function printQR(){
    var img=document.getElementById("qrimg").src
    var w=window.open("")
    w.document.write("<img src='"+img+"' style='width:300px;height:300px'>")
    w.print()
}
</script>

</body>
</html>
