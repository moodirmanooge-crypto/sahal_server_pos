<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add New Student</title>

<style>
body{
font-family:'Segoe UI',sans-serif;
background:#f5f6fa;
margin:0;
padding:20px;
display:flex;
justify-content:center;
}

.form-container{
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
width:100%;
max-width:800px;
}

.header{
border-bottom:2px solid #eee;
margin-bottom:20px;
padding-bottom:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

.form-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

input,select{
padding:12px;
border:1px solid #ddd;
border-radius:6px;
width:100%;
font-size:14px;
}

.full-width{grid-column:span 2;}

label{
display:block;
margin-bottom:5px;
font-weight:bold;
font-size:13px;
}

.btn-save{
background:#28a745;
color:white;
border:none;
padding:15px;
border-radius:6px;
width:100%;
cursor:pointer;
font-size:16px;
font-weight:bold;
margin-top:20px;
}

.btn-save:hover{background:#218838;}

.back-link{
text-decoration:none;
color:#1e3c72;
font-weight:bold;
}

@media(max-width:600px){
.form-grid{grid-template-columns:1fr;}
.full-width{grid-column:span 1;}
}
</style>
</head>

<body>

<div class="form-container">

<div class="header">
<h2>📋 Register New Student</h2>
<a href="/" class="back-link">← Back</a>
</div>

<form id="studentForm" enctype="multipart/form-data">

<div class="form-grid">

<div>
<label>Student ID</label>
<input type="text" id="student_id" required>
</div>

<div>
<label>Full Name</label>
<input type="text" id="full_name" required>
</div>

<div>
<label>Class Name</label>
<select id="class_name" required>
<option value="">Select Class</option>
<option>G1</option><option>G2</option><option>G3</option>
<option>G4</option><option>G5</option><option>G6</option>
<option>G7</option><option>G8</option><option>F1</option>
<option>F2</option><option>F3</option><option>F4</option>
</select>
</div>

<div>
<label>Monthly Fee ($)</label>
<input type="number" id="fee" required>
</div>

<div>
<label>Parent Phone</label>
<input type="text" id="mother_phone" required>
</div>

<div>
<label>Student Phone</label>
<input type="text" id="student_phone">
</div>

<div>
<label>District</label>
<input type="text" id="district">
</div>

<div>
<label>Previous School</label>
<input type="text" id="previous_school">
</div>

<div>
<label>Orphan Status</label>
<select id="orphan_status">
<option value="No">No</option>
<option value="Yes">Yes</option>
</select>
</div>

<div>
<label>Parent Password</label>
<input type="text" id="parent_password" value="1234">
</div>

<div class="full-width">
<label>Student Photo</label>
<input type="file" id="student_photo" accept="image/*">
</div>

</div>

<button type="submit" id="submitBtn" class="btn-save">
🚀 Complete Registration
</button>

</form>
</div>

<script>

document.getElementById('studentForm').onsubmit = async (e)=>{
e.preventDefault();

const btn=document.getElementById('submitBtn');
btn.disabled=true;
btn.innerText="Processing...";

let fd=new FormData();

fd.append("student_id",student_id.value);
fd.append("full_name",full_name.value);
fd.append("class_name",class_name.value);
fd.append("fee",fee.value);
fd.append("mother_phone",mother_phone.value);
fd.append("student_phone",student_phone.value);
fd.append("district",district.value);
fd.append("previous_school",previous_school.value);
fd.append("orphan_status",orphan_status.value);
fd.append("parent_password",parent_password.value);

/* ✅ FIXED PHOTO */
let photoInput=document.getElementById("student_photo");
if(photoInput.files.length>0){
fd.append("photo",photoInput.files[0]);  // 🔥 muhiim
}

try{

let res=await fetch("/register_student",{
method:"POST",
body:fd
});

let data=await res.json();

if(data.success){
alert("✅ Student Registered Successfully!");
window.location.href="/school_dashboard";
}else{
alert("❌ "+data.error);
}

}catch(err){
console.error(err);
alert("❌ Server Error");
}

btn.disabled=false;
btn.innerText="🚀 Complete Registration";
}

</script>

</body>
</html>
