<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>School Login</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #373B44, #4286f4);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 350px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 15px;
            background: #4286f4;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #2c5fd5;
        }

        .msg {
            margin-top: 15px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>🔐 School Login</h2>

    <form id="loginForm">
        <input type="text" name="school_code" placeholder="School Code" required>
        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Login</button>
    </form>

    <div class="msg" id="msg"></div>
</div>

<script>
document.getElementById("loginForm").addEventListener("submit", function(e) {
    e.preventDefault();

    let formData = new FormData(this);

    fetch("/school_login", {
        method: "POST",
        body: formData
    })
    .then(res => res.json())
    .then(data => {
        if (data.error === "expired") {
            document.getElementById("msg").innerHTML =
                "<span style='color:red'>" + data.message + "</span>";
        } else if (data.error) {
            document.getElementById("msg").innerHTML =
                "<span style='color:red'>" + data.error + "</span>";
        } else {
            window.location.href = data.redirect;
        }
    })
    .catch(() => {
        document.getElementById("msg").innerHTML = "<span style='color:red'>Server error</span>";
    });
});
</script>

</body>
</html>
