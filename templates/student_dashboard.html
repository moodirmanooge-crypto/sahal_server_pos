<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Students Dashboard</title>

<style>
body {
    font-family: Arial;
    background:#f0f2f5;
    margin:0;
}

/* HEADER */
.header {
    background: linear-gradient(45deg,#1e3c72,#2a5298);
    color:white;
    padding:18px;
    text-align:center;
    font-size:20px;
}

/* GRID */
.grid {
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(230px,1fr));
    gap:15px;
    padding:15px;
}

/* CARD */
.card {
    background:white;
    padding:15px;
    border-radius:15px;
    text-align:center;
    cursor:pointer;
    transition:0.3s;
}
.card:hover {
    transform:scale(1.03);
}
.card img {
    width:80px;
    height:80px;
    border-radius:50%;
}

/* FLOAT BUTTONS */
.fab, .fab2 {
    position:fixed;
    bottom:20px;
    width:60px;
    height:60px;
    border-radius:50%;
    border:none;
    color:white;
    font-size:24px;
    box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

.fab { right:20px; background:#28a745; }
.fab2 { right:90px; background:#007bff; }

/* OVERLAY */
.overlay {
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
    display:none;
}

/* BOTTOM SHEET */
.sheet {
    position:fixed;
    bottom:-100%;
    left:0;
    width:100%;
    background:white;
    border-radius:20px 20px 0 0;
    padding:20px;
    transition:0.3s;
    max-height:90%;
    overflow:auto;
}

/* DRAG BAR */
.drag {
    width:50px;
    height:5px;
    background:#ccc;
    margin:0 auto 10px;
    border-radius:10px;
}

/* INPUT */
input, select {
    width:100%;
    padding:10px;
    margin-top:10px;
}

/* BUTTON */
button {
    padding:10px;
    margin-top:10px;
    width:100%;
}
</style>
</head>

<body>

<div class="header">🎓 Students Dashboard</div>

<div class="grid" id="students"></div>

<button class="fab" onclick="openSheet()">+</button>
<button class="fab2" onclick="showStudents()">📋</button>

<div class="overlay" id="overlay" onclick="closeSheet()"></div>

<!-- BOTTOM SHEET -->
<div class="sheet" id="sheet">

<div class="drag" id="dragBar"></div>

<h3>Student</h3>

<input id="student_id" placeholder="Student ID">
<input id="full_name" placeholder="Full Name">

<select id="gender">
<option>Male</option>
<option>Female</option>
</select>

<input id="mother_name" placeholder="Mother Name">
<input id="student_phone" placeholder="Phone">
<input type="file" id="photo">
<input id="mother_phone" placeholder="Mother Phone">
<input id="fee" placeholder="Fee">

<select id="status">
<option value="unpaid">Unpaid</option>
<option value="paid">Paid</option>
</select>

<button onclick="saveStudent()">Save</button>
<button onclick="updateStudent()">Update</button>
<button onclick="deleteStudent()" style="background:red;color:white;">Delete</button>

</div>

<script>

let startY = 0;
let sheet = document.getElementById("sheet");

/* OPEN */
function openSheet(){
    document.getElementById("overlay").style.display="block";
    sheet.style.bottom="0";
}

/* CLOSE */
function closeSheet(){
    sheet.style.bottom="-100%";
    document.getElementById("overlay").style.display="none";
}

/* DRAG */
document.getElementById("dragBar").addEventListener("touchstart", e=>{
    startY = e.touches[0].clientY;
});

document.getElementById("dragBar").addEventListener("touchmove", e=>{
    let move = e.touches[0].clientY - startY;

    if(move > 100){
        closeSheet();
    }
});

/* LOAD STUDENTS */
async function loadStudents(){
    let res = await fetch("/get_students");
    let data = await res.json();

    let box = document.getElementById("students");
    box.innerHTML="";

    data.forEach(s=>{
        box.innerHTML += `
        <div class="card" onclick="edit('${s.student_id}')">
            <img src="/static/uploads/${s.photo || 'default.png'}">
            <h3>${s.full_name}</h3>
            <p>ID: ${s.student_id}</p>
            <p>${s.gender}</p>
            <p>$${s.fee}</p>
            <p>${s.status}</p>
        </div>`;
    });
}

/* SHOW */
function showStudents(){
    loadStudents();
}

/* SAVE */
async function saveStudent(){
    let fd = new FormData();

    fd.append("student_id", student_id.value);
    fd.append("full_name", full_name.value);
    fd.append("gender", gender.value);
    fd.append("mother_name", mother_name.value);
    fd.append("student_phone", student_phone.value);
    fd.append("mother_phone", mother_phone.value);
    fd.append("fee", fee.value);
    fd.append("photo", photo.files[0]);

    await fetch("/add_student",{method:"POST", body:fd});

    loadStudents();
    closeSheet();
}

/* EDIT */
async function edit(id){
    let res = await fetch("/get_students");
    let data = await res.json();

    let s = data.find(x=>x.student_id==id);

    openSheet();

    student_id.value=s.student_id;
    full_name.value=s.full_name;
    gender.value=s.gender;
    mother_name.value=s.mother_name;
    student_phone.value=s.student_phone;
    mother_phone.value=s.mother_phone;
    fee.value=s.fee;
    status.value=s.status;
}

/* UPDATE */
async function updateStudent(){
    let fd = new FormData();

    fd.append("student_id", student_id.value);
    fd.append("full_name", full_name.value);
    fd.append("gender", gender.value);
    fd.append("mother_name", mother_name.value);
    fd.append("student_phone", student_phone.value);
    fd.append("mother_phone", mother_phone.value);
    fd.append("fee", fee.value);
    fd.append("status", status.value);

    await fetch("/edit_student",{method:"POST", body:fd});

    loadStudents();
    closeSheet();
}

/* DELETE */
async function deleteStudent(){
    let fd = new FormData();
    fd.append("student_id", student_id.value);

    await fetch("/delete_student",{method:"POST", body:fd});

    loadStudents();
    closeSheet();
}

loadStudents();

</script>

</body>
</html>
