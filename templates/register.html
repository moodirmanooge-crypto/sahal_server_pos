<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register Restaurant</title>

    <style>
        body{
            font-family: Arial;
            background: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card{
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
            width: 420px;
        }

        h2, h3{
            margin-bottom: 10px;
        }

        input{
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        button{
            width: 100%;
            padding: 12px;
            background: #0a7cff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover{
            background: #095fcc;
        }
    </style>
</head>

<body>

<div class="card">

    <h2>Register Restaurant</h2>

    <!-- ✅ IMPORTANT: Flask POST -->
    <form method="POST">

        <!-- Restaurant Info -->
        <input name="name" placeholder="Restaurant Name" required>
        <input name="phone" placeholder="Phone">
        <input name="username" placeholder="Username" required>
        <input name="password" placeholder="Password" type="password" required>

        <!-- Admin Info (optional - won't break backend) -->
        <h3>Restaurant Admin</h3>
        <input name="admin_name" placeholder="Admin Name">
        <input name="admin_email" placeholder="Admin Email">
        <input name="admin_password" placeholder="Admin Password" type="password">

        <!-- Subscription -->
        <h3>Subscription Price (Monthly)</h3>
        <input name="price" placeholder="e.g. 20" required>

        <!-- Payment -->
        <h3>Restaurant Payment USSD Code</h3>
        <input 
            name="payment" 
            placeholder="Example: *789*657090*$#" 
            required>

        <button type="submit">Create Restaurant</button>

    </form>

</div>

</body>
</html>
