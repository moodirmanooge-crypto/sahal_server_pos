<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ school.school_name }}</title>

<style>
body {margin:0;font-family:'Segoe UI';background:#f5f6fa;}

.header{
background:#1e3c72;
color:white;
padding:15px;
text-align:center;
position:relative;
}

.top-actions{
position:absolute;
right:15px;
top:10px;
display:flex;
gap:10px;
}

.btn{
border:none;
padding:8px 12px;
border-radius:6px;
cursor:pointer;
color:white;
font-weight:bold;
}

.admin-btn{background:#ff9800;}
.teacher-btn{background:#6f42c1;}
.cashier-btn{background:#00b894;}
.register-btn{background:#28a745;}

.container{padding:20px;}

.card{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.form-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.form-full{grid-column:span 2;}

input,select{
width:100%;
padding:8px;
border:1px solid #ddd;
border-radius:6px;
font-size:13px;
}

.btn-save{
background:#28a745;
color:white;
padding:6px 10px;
border:none;
border-radius:6px;
cursor:pointer;
}

.table{
width:100%;
border-collapse:collapse;
}

.table th{
background:#2f4f6f;
color:white;
}

.table td, .table th{
padding:10px;
border-bottom:1px solid #eee;
text-align:center;
}

.badge{
padding:5px 10px;
border-radius:10px;
font-size:12px;
}

.paid{background:#d4edda;color:#155724;}
.unpaid{background:#f8d7da;color:#721c24;}

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
z-index:999;
}

.popup{
background:white;
width:95%;
max-width:900px;
margin:5% auto;
padding:20px;
border-radius:10px;
position:relative;
}

.close{
position:absolute;
right:10px;
top:10px;
cursor:pointer;
color:red;
}
</style>
</head>

<body>

<div class="header">
<h2>🎓 {{ school.school_name }}</h2>
<small>ID: {{ school.school_code }}</small>

<div class="top-actions">
<button class="btn register-btn" onclick="openRegister()">➕ Register</button>
<button class="btn cashier-btn" onclick="openCashier()">💰 Cashier</button>
<button class="btn admin-btn" onclick="goAdmin()">⚙ Admin</button>
</div>
</div>

<div class="container">

<div class="card">
<h3>📊 Students</h3>

<table class="table">
<thead>
<tr>
<th>Name</th>
<th>ID</th>
<th>Fee</th>
<th>Status</th>
</tr>
</thead>
<tbody id="studentsTable"></tbody>
</table>

</div>

</div>

<!-- REGISTER MODAL -->
<div class="modal" id="registerModal">
<div class="popup">
<span class="close" onclick="closeAll()">✖</span>

<h3>📋 Student Registration</h3>

<div class="form-grid">

<input id="student_id" placeholder="Student ID">
<input id="full_name" placeholder="Full Name">

<select id="class_name">
<option value="">Class</option>
<option>G1</option><option>G2</option><option>G3</option>
<option>G4</option><option>G5</option><option>G6</option>
</select>

<input id="fee" placeholder="Monthly Fee">

<input id="mother_phone" placeholder="Parent Phone">
<input id="student_phone" placeholder="Student Phone">

<select id="orphan">
<option value="no">Not Orphan</option>
<option value="yes">Orphan</option>
</select>

<input id="previous_school" placeholder="Previous School">

<input id="district" placeholder="District">

<div class="form-full">
<input type="file" id="photo">
</div>

</div>

<button onclick="saveStudent()" class="btn-save">💾 Register Student</button>

</div>
</div>

<!-- CASHIER -->
<div class="modal" id="cashierModal">
<div class="popup">
<span class="close" onclick="closeAll()">✖</span>

<h3>💰 Cashier Panel</h3>

<!-- 🔍 SEARCH -->
<div style="margin-bottom:10px;">
<input id="searchInput" placeholder="Search Student ID">
<button onclick="searchCashier()" class="btn-save">Search</button>
<button onclick="loadCashier()" class="btn-save">Reset</button>
</div>

<table class="table">
<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Fee</th>
<th>Pay</th>
<th>Save</th>
<th>Remaining</th>
<th>Last Paid</th>
<th>Next Due</th>
</tr>
</thead>
<tbody id="cashierTable"></tbody>
</table>

</div>
</div>

<script>

function goAdmin(){
window.location.href="/admin_dashboard_school";
}

function openRegister(){
document.getElementById("registerModal").style.display="block";
}

function openCashier(){
document.getElementById("cashierModal").style.display="block";
loadCashier();
}

function closeAll(){
document.getElementById("registerModal").style.display="none";
document.getElementById("cashierModal").style.display="none";
}

window.onload = loadStudents;

// LOAD STUDENTS
async function loadStudents(){
let res = await fetch("/get_students");
let data = await res.json();

let box = document.getElementById("studentsTable");
box.innerHTML="";

data.forEach(s=>{
box.innerHTML+=`
<tr>
<td>${s.full_name}</td>
<td>${s.student_id}</td>
<td>$${s.fee || 0}</td>
<td><span class="badge ${s.status=='paid'?'paid':'unpaid'}">${s.status || 'unpaid'}</span></td>
</tr>
`;
});
}

// SAVE STUDENT
async function saveStudent(){
let fd=new FormData();

fd.append("student_id",student_id.value);
fd.append("full_name",full_name.value);
fd.append("class_name",class_name.value);
fd.append("fee",fee.value);
fd.append("mother_phone",mother_phone.value);
fd.append("student_phone",student_phone.value);
fd.append("orphan",orphan.value);
fd.append("previous_school",previous_school.value);
fd.append("district",district.value);

let file = photo.files[0];
if(file) fd.append("photo",file);

let res=await fetch("/add_student",{method:"POST",body:fd});
let data=await res.json();

if(data.success){
alert("✅ Registered");

// CLEAR FORM
document.querySelectorAll("#registerModal input").forEach(i=>i.value="");
document.getElementById("class_name").value="";
document.getElementById("orphan").value="no";

loadStudents();
}
}

// LOAD CASHIER
async function loadCashier(){
let res = await fetch("/get_students");
let data = await res.json();
renderCashier(data);
}

// RENDER CASHIER
function renderCashier(data){
let box = document.getElementById("cashierTable");
box.innerHTML="";

data.forEach(s=>{
let remaining = (s.fee || 0) - (s.paid_amount || 0);

box.innerHTML+=`
<tr>
<td>${s.student_id}</td>
<td>${s.full_name}</td>
<td>$${s.fee || 0}</td>

<td>
<input type="number" id="pay_${s.student_id}" placeholder="Amount">
</td>

<td>
<button onclick="pay('${s.student_id}')" class="btn-save">Save</button>
</td>

<td>$${remaining}</td>

<td>${s.last_paid ? new Date(s.last_paid).toLocaleDateString() : '-'}</td>
<td>${s.next_due ? new Date(s.next_due).toLocaleDateString() : '-'}</td>

</tr>
`;
});
}

// SEARCH
async function searchCashier(){
let id = document.getElementById("searchInput").value.trim();

if(!id){
loadCashier();
return;
}

let res = await fetch("/get_students");
let data = await res.json();

let filtered = data.filter(s => s.student_id == id);

if(filtered.length === 0){
alert("Not found");
return;
}

renderCashier(filtered);
}

// PAY BUTTON
async function pay(id){

let amount = document.getElementById("pay_"+id).value;

if(!amount){
alert("Enter amount");
return;
}

let fd=new FormData();
fd.append("student_id",id);
fd.append("amount",amount);

await fetch("/pay_fee",{method:"POST",body:fd});

loadCashier();
loadStudents();
}

</script>

</body>
</html>
