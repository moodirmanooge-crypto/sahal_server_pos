<!DOCTYPE html>
<html>
<head>
<title>School Admin Dashboard</title>

<style>
body{
font-family:Segoe UI;
background:#f4f6f9;
margin:0;
}

/* HEADER */
.header{
background:#2c3e50;
color:white;
padding:15px;
text-align:center;
position:relative;
}

.top-links{
position:absolute;
right:20px;
top:15px;
display:flex;
gap:10px;
}

.top-links a{
color:white;
text-decoration:none;
padding:6px 12px;
border-radius:6px;
font-size:13px;
}

.reg{background:#28a745;}
.teacher{background:#6f42c1;}
.cashier{background:#17a2b8;}
.admin{background:#ff9800;}

/* UPDATE BTN */
.update-btn{
position:absolute;
left:20px;
top:15px;
background:#007bff;
color:white;
padding:6px 12px;
border-radius:6px;
cursor:pointer;
font-size:13px;
}

/* POPUP */
.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:none;
align-items:center;
justify-content:center;
}

.popup-box{
background:white;
padding:20px;
border-radius:10px;
width:300px;
}

.popup-box input{
width:100%;
padding:8px;
margin:6px 0;
border:1px solid #ddd;
border-radius:6px;
}

.popup-box button{
width:100%;
padding:10px;
margin-top:10px;
border:none;
background:#28a745;
color:white;
border-radius:6px;
cursor:pointer;
}

/* CONTAINER */
.container{
padding:20px;
}

/* TABLE */
.table-container{
overflow:auto;
max-height:450px;
}

.table{
width:100%;
border-collapse:collapse;
}

.table th{
background:#34495e;
color:white;
padding:10px;
}

.table td{
padding:10px;
border-bottom:1px solid #eee;
text-align:center;
}

.badge{
padding:4px 10px;
border-radius:20px;
font-size:12px;
font-weight:bold;
}

.paid{
background:#d4edda;
color:#155724;
}

.unpaid{
background:#f8d7da;
color:#721c24;
}
</style>

</head>

<body>

<div class="header">

<h2>🎓 School Admin Panel</h2>

<div class="update-btn" onclick="openPopup()">⚙️ Update Password</div>

<div class="top-links">
    <!-- ✅ FIXED LINKS -->
    <a href="/school/student_register" class="reg">+ Register</a>
    <a href="/teacher_panel" class="teacher">Teacher</a>
    <a href="/cashier_panel" class="cashier">Cashier</a>
    <a href="/admin_dashboard_school" class="admin">Admin</a>
</div>

</div>

<div class="container">

<div class="table-container">
<table class="table">

<thead>
<tr>
<th>Name</th>
<th>ID</th>
<th>Class</th>
<th>Fee</th>
<th>Paid</th>
<th>Remaining</th>
<th>Status</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>
</div>

</div>

<!-- 🔥 POPUP -->
<div class="popup" id="popup">

<div class="popup-box">

<h3>🔐 Update Passwords</h3>

<input id="admin_pass" placeholder="Admin Password">
<input id="teacher_pass" placeholder="Teacher Password">
<input id="cashier_pass" placeholder="Cashier Password">

<button onclick="savePasswords()">Save</button>

<button onclick="closePopup()" style="background:#dc3545;">Close</button>

</div>

</div>

<script>

// LOAD STUDENTS
async function loadAll(){
let res = await fetch("/get_students");
let data = await res.json();

let table = document.getElementById("tableBody");
table.innerHTML="";

data.forEach(s=>{

let fee = s.fee || 0;
let paid = s.paid || 0;  // ✅ FIXED (was paid_amount)
let remaining = fee - paid;

let status = remaining <= 0 ? "paid" : "unpaid";

table.innerHTML += `
<tr>
<td>${s.full_name}</td>
<td>${s.student_id}</td>
<td>${s.class_name || '-'}</td>
<td>$${fee}</td>
<td>$${paid}</td>
<td>$${remaining}</td>
<td><span class="badge ${status}">${status}</span></td>
</tr>
`;
});

}

// POPUP CONTROL
function openPopup(){
document.getElementById("popup").style.display="flex";
}

function closePopup(){
document.getElementById("popup").style.display="none";
}

// SAVE PASSWORDS
async function savePasswords(){

let data = {
admin: document.getElementById("admin_pass").value,
teacher: document.getElementById("teacher_pass").value,
cashier: document.getElementById("cashier_pass").value
};

let res = await fetch("/update_school_passwords",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)
});

let result = await res.json();

if(result.success){
alert("✅ Passwords Updated");
closePopup();
}else{
alert("❌ Error saving passwords");
}

}

window.onload = loadAll;

</script>

</body>
</html>
