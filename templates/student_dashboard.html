<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Students Dashboard</title>

<style>
body { margin:0; font-family:Arial; background:#f5f6fa; }

.header {
    background:#1e3c72;
    color:white;
    padding:15px;
    text-align:center;
}

/* BUTTONS */
.fab, .fab2 {
    position:fixed;
    bottom:20px;
    width:60px;
    height:60px;
    border-radius:50%;
    border:none;
    color:white;
    font-size:22px;
}
.fab { right:20px; background:#28a745; }
.fab2 { right:90px; background:#007bff; }

/* ADD POPUP */
.modal {
    display:none;
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    z-index: 1000;
}

.popup {
    background:white;
    width:90%;
    max-width:400px;
    margin:5% auto;
    padding:20px;
    border-radius:10px;
    position:relative;
    cursor:move; /* DRAGGABLE POPUP */
}

.close {
    position:absolute;
    top:10px;
    right:15px;
    cursor:pointer;
    font-weight: bold;
    color: red;
}

/* BOTTOM SHEET */
.sheet {
    position:fixed;
    bottom:-100%;
    left:0;
    width:100%;
    height:90%;
    background:white;
    border-radius:20px 20px 0 0;
    transition:0.3s;
    overflow:auto;
    z-index: 1001;
    box-shadow: 0 -5px 15px rgba(0,0,0,0.2);
}

.sheet.active {
    bottom:0;
}

.sheet-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 20px;
    border-bottom: 1px solid #eee;
}

.btn-close-sheet {
    background: #ff4757;
    color: white;
    border: none;
    padding: 8px 15px;
    border-radius: 5px;
    cursor: pointer;
}

.drag {
    width:50px;
    height:5px;
    background:#ccc;
    margin:10px auto;
    border-radius:5px;
}

/* SEARCH */
.searchBox {
    padding:10px;
    margin:10px;
    width:90%;
    border-radius:8px;
    border:1px solid #ccc;
    display: block;
    margin-left: auto;
    margin-right: auto;
}

/* TABLE STYLE */
.table {
    width:100%;
    border-collapse:collapse;
    margin-top: 10px;
}

.table th {
    background:#3498db;
    color:white;
    padding:10px;
    font-size: 13px;
    text-align: left;
}

.table td {
    padding:10px;
    border-bottom:1px solid #ddd;
    font-size: 13px;
}

/* 🖼️ STUDENT IMAGE STYLE */
.std-img {
    width: 45px;
    height: 45px;
    border-radius: 50%;
    object-fit: cover;
    border: 1px solid #ddd;
    background: #f1f1f1;
}

/* INPUT */
input, select {
    width:100%;
    padding:10px;
    margin-top:10px;
    box-sizing: border-box;
}

button {
    width:100%;
    padding:10px;
    margin-top:10px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="header">
<h2>🎓 Students Dashboard</h2>
</div>

<button class="fab" onclick="openAdd()">+</button>
<button class="fab2" onclick="openSheet()">📋</button>

<div class="modal" id="addModal">
<div class="popup" id="draggablePopup">

<div class="close" onclick="closeAll()">✖</div>

<h3>Add Student</h3>

<input id="student_id" placeholder="Student ID">
<input id="full_name" placeholder="Student Name">

<select id="gender">
<option>Male</option>
<option>Female</option>
</select>

<input id="mother_name" placeholder="Mother Name">
<input id="student_phone" placeholder="Student Phone">
<label style="font-size: 12px; color: #666; margin-top: 10px; display: block;">Student Photo:</label>
<input type="file" id="photo" accept="image/*">
<input id="mother_phone" placeholder="Mother Phone">
<input id="fee" placeholder="Fee ($)">

<button onclick="saveStudent()" style="background: #28a745; color: white; border: none; font-weight: bold;">Save Student</button>

</div>
</div>

<div class="sheet" id="sheet">
    <div class="drag"></div>
    <div class="sheet-header">
        <h3 style="margin:0">Student List</h3>
        <button class="btn-close-sheet" onclick="closeAll()">Close ❌</button>
    </div>

    <input class="searchBox" id="searchID" placeholder="Search by ID or Name..." onkeyup="liveSearch()">

    <table class="table">
    <thead>
    <tr>
    <th>Photo</th>
    <th>ID</th>
    <th>Name</th>
    <th>Mother</th>
    <th>Phones</th>
    <th>Fee</th>
    <th>Action</th>
    </tr>
    </thead>

    <tbody id="studentsTable"></tbody>
    </table>
</div>

<script>

let startY = 0;
let allStudents = [];

// OPEN ADD MODAL
function openAdd(){
    addModal.style.display="block";
}

// CLOSE ALL (MODAL & SHEET)
function closeAll(){
    addModal.style.display="none";
    document.getElementById("sheet").classList.remove("active");
}

// OPEN SHEET AND FETCH DATA
async function openSheet(){
    let sheet = document.getElementById("sheet");
    sheet.classList.add("active");

    try {
        let res = await fetch("/get_students");
        let data = await res.json();
        allStudents = data;
        renderTable(data);
    } catch (e) {
        console.log("Error fetching data");
    }
}

// 🖼️ RENDER TABLE (IMAGE UPDATED)
function renderTable(data){
    let box = document.getElementById("studentsTable");
    box.innerHTML="";

    data.forEach(s=>{
        // Hubi sawirka: haduu jiro magaciisa static upload ku dar, hadii kale icon tus
        let imgPath = s.photo ? `/static/uploads/${s.photo}` : "";
        let imgTag = imgPath ? `<img src="${imgPath}" class="std-img" onerror="this.src='https://cdn-icons-png.flaticon.com/512/149/149071.png'">` : `<img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" class="std-img">`;
        
        box.innerHTML += `
        <tr>
            <td>${imgTag}</td>
            <td><b>${s.student_id}</b></td>
            <td>${s.full_name}</td>
            <td>${s.mother_name || '-'}</td>
            <td>
                <small>S: ${s.student_phone || '-'}</small><br>
                <small>M: ${s.mother_phone || '-'}</small>
            </td>
            <td>$${s.fee || '0'}</td>
            <td>
                <button onclick="edit('${s.student_id}')" style="width:auto; padding:5px 10px; background:#f1c40f; border:none; border-radius:4px">Edit</button>
                <button onclick="del('${s.student_id}')" style="width:auto; padding:5px 10px; background:red; color:white; border:none; border-radius:4px">Del</button>
            </td>
        </tr>`;
    });
}

// LIVE SEARCH (ID & NAME)
function liveSearch(){
    let val = document.getElementById("searchID").value.toLowerCase();

    let filtered = allStudents.filter(s =>
        s.student_id.toString().includes(val) || 
        s.full_name.toLowerCase().includes(val)
    );

    renderTable(filtered);
}

// SAVE STUDENT
async function saveStudent(){
    let fd = new FormData();

    fd.append("student_id", student_id.value);
    fd.append("full_name", full_name.value);
    fd.append("gender", gender.value);
    fd.append("mother_name", mother_name.value);
    fd.append("student_phone", student_phone.value);
    fd.append("mother_phone", mother_phone.value);
    fd.append("fee", fee.value);
    
    // 📸 Hubi in sawir la doortay
    if(photo.files) {
        fd.append("photo", photo.files);
    }

    try {
        let res = await fetch("/add_student",{method:"POST", body:fd});
        let result = await res.json();

        if(result.error) {
            alert("⚠️ " + result.error);
        } else {
            alert("✅ Student saved successfully!");
            closeAll();
            // Nadiifi meelaha wax laga qoro
            student_id.value = "";
            full_name.value = "";
            mother_name.value = "";
            student_phone.value = "";
            mother_phone.value = "";
            fee.value = "";
            photo.value = "";
        }
    } catch (e) {
        alert("Error saving student");
    }
}

// DELETE
async function del(id){
    if(confirm("Are you sure you want to delete this student?")){
        let fd = new FormData();
        fd.append("student_id", id);
        await fetch("/delete_student",{method:"POST", body:fd});
        openSheet();
    }
}

// EDIT
async function edit(id){
    let s = allStudents.find(x=>x.student_id==id);
    if(!s) return;

    openAdd();

    student_id.value = s.student_id;
    full_name.value = s.full_name;
    gender.value = s.gender;
    mother_name.value = s.mother_name;
    student_phone.value = s.student_phone;
    mother_phone.value = s.mother_phone;
    fee.value = s.fee;
}

// MOBILE SWIPE TO CLOSE SHEET
let sheetUI = document.getElementById("sheet");
sheetUI.addEventListener("touchstart", e=>{ startY = e.touches.clientY; });
sheetUI.addEventListener("touchmove", e=>{
    let move = e.touches.clientY;
    if(move - startY > 150){ sheetUI.classList.remove("active"); }
});

// DRAGGABLE POPUP LOGIC
let popup = document.getElementById("draggablePopup");
let isDown = false;
let offsetX, offsetY;

popup.addEventListener("mousedown", (e)=>{
    isDown = true;
    offsetX = e.clientX - popup.offsetLeft;
    offsetY = e.clientY - popup.offsetTop;
});

document.addEventListener("mouseup", ()=> isDown=false);
document.addEventListener("mousemove", (e)=>{
    if(!isDown) return;
    popup.style.position = "absolute";
    popup.style.margin = "0"; 
    popup.style.left = (e.clientX - offsetX) + "px";
    popup.style.top = (e.clientY - offsetY) + "px";
});

</script>

</body>
</html>
