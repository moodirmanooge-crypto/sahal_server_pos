<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>{{restaurant}} Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
    font-family:Arial, sans-serif;
    padding:20px;
    background:#f5f5f5;
    margin:0;
}

h1,h2{
    margin-top:20px;
}

.card{
    background:white;
    padding:15px;
    border-radius:10px;
    box-shadow:0 0 5px rgba(0,0,0,0.15);
}

input, button{
    padding:10px;
    margin:5px 0;
    border-radius:6px;
    border:1px solid #ddd;
}

button{
    background:red;
    color:white;
    border:none;
    cursor:pointer;
    font-weight:bold;
}

/* TOP BUTTONS */
.top-buttons{
    display:flex;
    justify-content:flex-end;
    gap:10px;
    margin-bottom:15px;
    flex-wrap:wrap;
}

.top-btn{
    color:white;
    padding:10px 15px;
    border-radius:6px;
    text-decoration:none;
    font-weight:bold;
}

.admin-btn{ background:#0a7cff; }
.kitchen-link-btn{ background:#28a745; }

/* MENU GRID */
.menu-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:15px;
    margin-top:15px;
}

.menu-card{
    background:white;
    border-radius:12px;
    padding:12px;
    box-shadow:0 0 6px rgba(0,0,0,0.12);
    text-align:center;
}

.menu-card img{
    width:100%;
    height:150px;
    object-fit:cover;
    border-radius:10px;
    margin-bottom:10px;
}

.delete-btn{
    background:red;
    color:white;
    padding:8px 12px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
}

/* FLOATING BUTTONS */
.fab{
    position:fixed;
    right:20px;
    width:60px;
    height:60px;
    border-radius:50%;
    color:white;
    font-size:22px;
    border:none;
    cursor:pointer;
    box-shadow:0 0 10px rgba(0,0,0,0.3);
    z-index:999;
}

.stats-btn{ bottom:20px; background:#0a7cff; }
.qr-btn{ bottom:90px; background:green; }
.staff-btn{ bottom:160px; background:#ff9800; }
.sales-btn{ bottom:230px; background:#673ab7; }
.kitchen-btn{ bottom:300px; background:#28a745; }

/* POPUP */
.popup{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    align-items:center;
    justify-content:center;
    z-index:1000;
}

.popup-box{
    background:white;
    padding:20px;
    border-radius:10px;
    width:350px;
    max-height:80vh;
    overflow:auto;
    text-align:center;
}

@media(max-width:700px){
    .menu-grid{
        grid-template-columns:repeat(2,1fr);
    }
}
</style>
</head>

<body>

<h1>{{restaurant}} Dashboard</h1>

<div class="top-buttons">
    <a href="/restaurant_admin/{{ rid }}" class="top-btn admin-btn">
        ⚙️ Admin Restaurant
    </a>

    <a href="/kitchen/{{ rid }}" target="_blank" class="top-btn kitchen-link-btn">
        👨‍🍳 Open Kitchen
    </a>

    <!-- 🧾 RECEIPT BUTTON -->
    <button onclick="openReceipt('1')" class="top-btn" style="background:#ff5722;">
        🧾 View Receipt
    </button>
</div>

<h2>Add Menu</h2>
<form action="/add_menu/{{rid}}" method="post" enctype="multipart/form-data">
    <input name="name" placeholder="Food name" required>
    <input name="price" placeholder="Price" required>
    <input type="file" name="image" required>
    <button type="submit">Add</button>
</form>

<hr>

<h2>Add Advertisement</h2>
<form action="/add_ad/{{rid}}" method="post" enctype="multipart/form-data">
    <input name="title" placeholder="Ad title" required>
    <input type="file" name="image" required>
    <button type="submit">Add Ad</button>
</form>

<hr>

<h2>🍽 Menu List</h2>

<div class="menu-grid">
{% for m in menu %}
    <div class="menu-card">
        <img src="/static/uploads/{{m.image}}" alt="{{m.name}}">
        <h3>{{m.name}}</h3>
        <p>$ {{m.price}}</p>

        <a href="/delete_menu/{{m.id}}/{{rid}}"
           onclick="return confirm('Delete item?')">
            <button class="delete-btn">🗑 Delete</button>
        </a>
    </div>
{% endfor %}
</div>

<!-- FLOATING BUTTONS -->
<button class="fab stats-btn" onclick="openStats()">📊</button>
<button class="fab qr-btn" onclick="openQR()">📷</button>
<button class="fab staff-btn" onclick="openStaff()">👨‍💼</button>
<button class="fab sales-btn" onclick="openSales()">💰</button>
<button class="fab kitchen-btn" onclick="openKitchen()">👨‍🍳</button>

<!-- POPUPS -->
<div class="popup" id="statsPopup">
    <div class="popup-box">
        <h3>Stats</h3>
        <p id="statsData">Loading...</p>
        <button onclick="closeStats()">Close</button>
    </div>
</div>

<div class="popup" id="salesPopup">
    <div class="popup-box">
        <h3>📊 Sales Dashboard</h3>

        <label>From:</label>
        <input type="date" id="fromDate"><br>

        <label>To:</label>
        <input type="date" id="toDate"><br><br>

        <button onclick="loadSales()">Load</button>

        <h3>Total: $<span id="totalSales">0</span></h3>
        <div id="salesData"></div>

        <button onclick="closeSales()">Close</button>
    </div>
</div>

<div class="popup" id="qrPopup">
    <div class="popup-box">
        <h3>Generate QR</h3>
        <input id="tableInput" placeholder="Table No" required>
        <br><br>
        <button onclick="generateQR()">Generate</button>
        <div id="qrResult"></div>
        <br>
        <button onclick="closeQR()">Close</button>
    </div>
</div>

<div class="popup" id="staffPopup">
    <div class="popup-box">
        <h3>Add Staff</h3>
        <input id="sname" placeholder="Name"><br>
        <input id="semail" placeholder="Email"><br>
        <input id="spass" placeholder="Password"><br><br>
        <button onclick="addStaff()">Add</button>
        <br><br>
        <button onclick="closeStaff()">Close</button>
    </div>
</div>

<div class="popup" id="kitchenPopup">
    <div class="popup-box">
        <h3>👨‍🍳 Kitchen Screen</h3>
        <a href="/kitchen/{{ rid }}" target="_blank" class="top-btn kitchen-link-btn">
            Open Kitchen Screen
        </a>
        <br><br>
        <button onclick="closeKitchen()">Close</button>
    </div>
</div>

<script>
const RID = "{{rid}}"

// 🧾 RECEIPT FUNCTION
function openReceipt(table){
    let rid = "{{ rid }}";
    window.open(`/receipt_view/${rid}/${table}`, "_blank");
}

function openStats(){
    document.getElementById("statsPopup").style.display="flex"
}
function closeStats(){
    document.getElementById("statsPopup").style.display="none"
}

function openSales(){
    document.getElementById("salesPopup").style.display="flex"
}
function closeSales(){
    document.getElementById("salesPopup").style.display="none"
}

function openQR(){
    document.getElementById("qrPopup").style.display="flex"
}
function closeQR(){
    document.getElementById("qrPopup").style.display="none"
}

function openStaff(){
    document.getElementById("staffPopup").style.display="flex"
}
function closeStaff(){
    document.getElementById("staffPopup").style.display="none"
}

function openKitchen(){
    document.getElementById("kitchenPopup").style.display="flex"
}
function closeKitchen(){
    document.getElementById("kitchenPopup").style.display="none"
}

function generateQR(){
    let table = document.getElementById("tableInput").value

    fetch("/generate_qr/" + RID,{
        method:"POST",
        headers:{
            "Content-Type":"application/x-www-form-urlencoded"
        },
        body:"table=" + encodeURIComponent(table)
    })
    .then(res=>res.text())
    .then(data=>{
        document.getElementById("qrResult").innerHTML=data
    })
}

function addStaff(){
    fetch("/add_staff/"+RID,{
        method:"POST",
        headers:{
            "Content-Type":"application/x-www-form-urlencoded"
        },
        body:"name="+document.getElementById("sname").value+
        "&email="+document.getElementById("semail").value+
        "&password="+document.getElementById("spass").value
    }).then(()=>alert("Staff Added ✅"))
}
</script>

</body>
</html>

<script>
let lastOrderId = 0;

setInterval(async () => {

    let rid = "{{ rid }}";

    let res = await fetch(`/check_new_order/${rid}`);
    let data = await res.json();

    if(data.new_order){
        printReceipt(data.table);
    }

}, 3000);

async function printReceipt(table){

    let rid = "{{ rid }}";

    let res = await fetch(`/receipt/${rid}/${table}`);
    let data = await res.json();

    let content = `
    <div style="font-family:monospace; width:280px">
        <h3>${data.restaurant_name}</h3>
        <p>Table: ${data.table}</p>
        <p>${data.time}</p>
        <hr>

        ${data.items.map(item => `
            <div>${item.food}</div>
            <div>${item.qty} x ${item.price} = ${item.total}</div>
        `).join("")}

        <hr>
        <h3>Total: $${data.total}</h3>
    </div>
    `;

    let win = window.open("", "", "width=300,height=600");
    win.document.write(content);
    win.document.close();

    win.print();
}
</script>
