<!DOCTYPE html>
<html>

<head>

<title>Staff Panel</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
padding:20px;
}

.box{
background:white;
padding:15px;
margin-bottom:20px;
border-radius:10px;
box-shadow:0 0 5px rgba(0,0,0,0.2);
}

.chat{
height:300px;
overflow:auto;
border:1px solid #ddd;
padding:10px;
margin-bottom:10px;
}

.message{
margin-bottom:8px;
}

input{
padding:10px;
width:80%;
}

button{
padding:10px;
}

</style>

</head>

<body>

<h2>Welcome {{name}}</h2>

<div class="box">

<h3>Restaurant News</h3>

{% for n in news %}

<div style="border-bottom:1px solid #eee;margin-bottom:10px">

<b>{{n[2]}}</b>

<p>{{n[3]}}</p>

<small>{{n[4]}}</small>

</div>

{% endfor %}

</div>


<div class="box">

<h3>Staff Chat</h3>

<div class="chat" id="chatBox"></div>

<input id="msg">

<button onclick="send()">Send</button>

</div>


<script>

function loadChat(){

fetch("/get_messages/{{rid}}")

.then(r=>r.json())

.then(data=>{

let html=""

data.forEach(m=>{

html+=`<div class="message"><b>${m.sender}</b>: ${m.message}</div>`

})

document.getElementById("chatBox").innerHTML=html

})

}

function send(){

let msg=document.getElementById("msg").value

fetch("/send_message/{{rid}}",{

method:"POST",

headers:{
"Content-Type":"application/x-www-form-urlencoded"
},

body:`sender={{name}}&message=${msg}`

}).then(()=>{

document.getElementById("msg").value=""

loadChat()

})

}

setInterval(loadChat,2000)

loadChat()

</script>

</body>

</html>
