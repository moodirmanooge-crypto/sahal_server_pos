<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Students Dashboard</title>

<style>
body {
    font-family: Arial;
    background:#f5f6fa;
    margin:0;
}

.header {
    background:#1e3c72;
    color:white;
    padding:15px;
    text-align:center;
}

/* GRID */
.grid {
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(230px,1fr));
    gap:15px;
    padding:15px;
}

/* CARD */
.card {
    background:white;
    padding:15px;
    border-radius:10px;
    text-align:center;
    cursor:pointer;
}

/* FLOAT BUTTONS */
.fab, .fab2 {
    position:fixed;
    bottom:20px;
    width:60px;
    height:60px;
    border-radius:50%;
    border:none;
    color:white;
    font-size:22px;
}

.fab { right:20px; background:#28a745; }
.fab2 { right:90px; background:#007bff; }

/* MODAL */
.modal {
    display:none;
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
}

/* POPUP */
.popup {
    background:white;
    width:90%;
    max-width:400px;
    margin:5% auto;
    padding:20px;
    border-radius:10px;
    position:relative;
}

/* CLOSE */
.close {
    position:absolute;
    top:10px;
    right:15px;
    cursor:pointer;
    font-size:20px;
}

/* INPUT */
input, select {
    width:100%;
    padding:10px;
    margin-top:10px;
}

button {
    margin-top:10px;
    padding:10px;
    width:100%;
}
</style>
</head>

<body>

<div class="header">
<h2>🎓 Students Dashboard</h2>
</div>

<div class="grid" id="students"></div>

<button class="fab" onclick="openAdd()">+</button>
<button class="fab2" onclick="openList()">📋</button>

<!-- ADD STUDENT -->
<div class="modal" id="addModal">
<div class="popup">

<div class="close" onclick="closeAll()">✖</div>

<h3>Add Student</h3>

<input id="student_id" placeholder="ID">
<input id="full_name" placeholder="Name">

<select id="gender">
<option>Male</option>
<option>Female</option>
</select>

<input id="mother_name" placeholder="Mother">
<input id="student_phone" placeholder="Phone">
<input type="file" id="photo">
<input id="mother_phone" placeholder="Mother Phone">
<input id="fee" placeholder="Fee">

<button onclick="saveStudent()">Save</button>

</div>
</div>

<!-- STUDENTS LIST -->
<div class="modal" id="listModal">
<div class="popup">

<div class="close" onclick="closeAll()">✖</div>

<h3>All Students</h3>

<div id="listBox"></div>

</div>
</div>

<script>

// OPEN ADD
function openAdd(){
    document.getElementById("addModal").style.display="block";
}

// OPEN LIST
async function openList(){
    document.getElementById("listModal").style.display="block";

    let res = await fetch("/get_students");
    let data = await res.json();

    let box = document.getElementById("listBox");
    box.innerHTML="";

    data.forEach(s=>{
        box.innerHTML += `
        <div class="card">
            <h3>${s.full_name}</h3>
            <p>ID: ${s.student_id}</p>
            <p>${s.gender}</p>
            <p>$${s.fee}</p>
            <p>${s.status}</p>
        </div>`;
    });
}

// CLOSE ALL
function closeAll(){
    document.getElementById("addModal").style.display="none";
    document.getElementById("listModal").style.display="none";
}

// SAVE
async function saveStudent(){
    let fd = new FormData();

    fd.append("student_id", student_id.value);
    fd.append("full_name", full_name.value);
    fd.append("gender", gender.value);
    fd.append("mother_name", mother_name.value);
    fd.append("student_phone", student_phone.value);
    fd.append("mother_phone", mother_phone.value);
    fd.append("fee", fee.value);
    fd.append("photo", photo.files[0]);

    await fetch("/add_student",{method:"POST", body:fd});

    closeAll();
}

</script>

</body>
</html>
