<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ school.school_name }}</title>

<style>
body {margin:0;font-family:'Segoe UI';background:#f5f6fa;}

.header{
background:#1e3c72;
color:white;
padding:15px;
text-align:center;
position:relative;
}

.top-actions{
position:absolute;
right:15px;
top:10px;
display:flex; gap:10px;
}

.btn{
border:none;
padding:8px 12px;
border-radius:6px;
cursor:pointer;
color:white;
font-weight:bold;
}

.admin-btn{background:#ff9800;}
.cashier-btn{background:#00b894;}
.register-btn{background:#28a745;}
.teacher-btn{background:#6f42c1;}

.container{padding:20px;}

.card{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.search-box{
margin-bottom:10px;
display:flex; gap:10px;
}

.table-container{
overflow:auto;
max-height:500px;
}

.table{
min-width:900px;
width:100%;
border-collapse:collapse;
}

.table th{
background:#2f4f6f;
color:white;
position: sticky;
top: 0;
}

.table td, .table th{
padding:10px;
border-bottom:1px solid #eee;
text-align:center;
}

.badge{
padding:5px 10px;
border-radius:10px;
font-size:12px;
}

.paid{background:#d4edda;color:#155724;}
.unpaid{background:#f8d7da;color:#721c24;}

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
z-index:999;
}

.popup{
background:white;
width:95%;
max-width:900px;
margin:3% auto;
padding:20px;
border-radius:10px;
position:relative;
}

.close{
position:absolute;
right:10px;
top:10px;
cursor:pointer;
color:red;
}

.form-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

input,select{
padding:10px;
border:1px solid #ddd;
border-radius:5px;
width:100%;
}

.full{grid-column:span 2;}

.btn-save{
background:#28a745;
color:white;
padding:12px;
border:none;
width:100%;
margin-top:10px;
cursor:pointer;
}

.student-img{
width:40px;height:40px;border-radius:50%;
}
</style>
</head>

<body>

<div class="header">
<h2>🎓 {{ school.school_name }}</h2>
<p id="todayDate"></p>
<small>School Code: {{ school.school_code }}</small>

<div class="top-actions">
<button class="btn register-btn" onclick="openRegister()">➕ Register</button>
<button class="btn teacher-btn" onclick="openTeacher()">👨‍🏫 Teacher</button>
<button class="btn cashier-btn" onclick="openCashier()">💰 Cashier</button>
<button class="btn admin-btn" onclick="goAdmin()">⚙ Admin</button>
</div>
</div>

<div class="container">
<div class="card">
<h3>📊 Students List</h3>

<div class="search-box">
<input type="text" id="searchStudent" placeholder="Search...">
<button class="btn" style="background:#1e3c72;" onclick="searchStudents()">Search</button>
<button class="btn" style="background:#6c757d;" onclick="loadStudents()">Reset</button>
</div>

<div class="table-container">
<table class="table">
<thead>
<tr>
<th>Photo</th>
<th>Name</th>
<th>ID</th>
<th>Class</th>
<th>Fee</th>
<th>Remaining</th>
<th>Status</th>
<th>Last Paid</th>
</tr>
</thead>
<tbody id="studentsTable"></tbody>
</table>
</div>
</div>
</div>

<div class="modal" id="registerModal">
<div class="popup">
<span class="close" onclick="closeModal()">✖</span>

<h3>📋 Student Registration</h3>

<div class="form-grid">

<input id="student_id" placeholder="Student ID">
<input id="full_name" placeholder="Full Name">

<select id="class_name">
<option value="">Select Class</option>
<option>G1</option><option>G2</option><option>G3</option>
<option>G4</option><option>G5</option><option>G6</option>
</select>

<input id="fee" placeholder="Monthly Fee">

<input id="mother_phone" placeholder="Parent Phone">
<input id="student_phone" placeholder="Student Phone">

<input id="district" placeholder="District">
<input id="previous_school" placeholder="Previous School">

<select id="orphan_status">
<option value="No">Is Orphan? (No)</option>
<option value="Yes">Is Orphan? (Yes)</option>
</select>

<div class="full">
<label>Student Photo:</label>
<input type="file" id="student_photo" accept="image/*">
</div>

<input id="parent_password" value="1234" class="full">

</div>

<button class="btn-save" onclick="saveStudent()">Register Student</button>

</div>
</div>

<div class="modal" id="teacherModal">
<div class="popup">
<span class="close" onclick="closeTeacher()">✖</span>

<h3>🧑‍🏫 Add Teacher</h3>

<div class="form-grid">
<input id="t_full_name" placeholder="Full Name">
<input id="t_phone" placeholder="Phone Number">

<input id="t_username" placeholder="Username">
<input id="t_password" placeholder="Password">

<input id="t_subject" placeholder="Teacher Subject (e.g Math)" class="full">
</div>

<label style="margin-top:10px;display:block;">Assign Classes:</label>

<div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;">
<label><input type="checkbox" value="G1"> G1</label>
<label><input type="checkbox" value="G2"> G2</label>
<label><input type="checkbox" value="G3"> G3</label>
<label><input type="checkbox" value="G4"> G4</label>
<label><input type="checkbox" value="G5"> G5</label>
<label><input type="checkbox" value="G6"> G6</label>
<label><input type="checkbox" value="G7"> G7</label>
<label><input type="checkbox" value="G8"> G8</label>
<label><input type="checkbox" value="F1"> F1</label>
<label><input type="checkbox" value="F2"> F2</label>
<label><input type="checkbox" value="F3"> F3</label>
<label><input type="checkbox" value="F4"> F4</label>
</div>

<button class="btn-save" onclick="saveTeacher()">💾 Save Teacher</button>

</div>
</div>

<script>

document.getElementById("todayDate").innerText=new Date().toLocaleDateString();

let allStudents=[];
window.onload=loadStudents;

async function loadStudents(){
let res=await fetch("/get_students");
allStudents=await res.json();
renderStudents(allStudents);
}

function renderStudents(data){
let box=document.getElementById("studentsTable");
box.innerHTML="";

data.forEach(s=>{
let fee=s.fee||0;
let paid=s.paid||0;
let remaining=fee-paid;
let status=remaining<=0?"paid":"unpaid";

box.innerHTML+=`
<tr>
<td><img src="${s.photo?'/static/uploads/'+s.photo:'https://ui-avatars.com/api/?name='+s.full_name}" class="student-img"></td>
<td>${s.full_name}</td>
<td>${s.student_id}</td>
<td>${s.class_name}</td>
<td>$${fee}</td>
<td>$${remaining}</td>
<td><span class="badge ${status}">${status}</span></td>
<td>${s.last_paid||'-'}</td>
</tr>`;
});
}

async function openRegister(){
if(await checkPass("admin")){
document.getElementById("registerModal").style.display="block";
}else{
alert("❌ Wrong Admin Password");
}
}

function closeModal(){
document.getElementById("registerModal").style.display="none";
}

async function saveStudent(){
let fd=new FormData();

fd.append("student_id",student_id.value);
fd.append("full_name",full_name.value);
fd.append("class_name",class_name.value);
fd.append("fee",fee.value);
fd.append("mother_phone",mother_phone.value);
fd.append("student_phone",student_phone.value);
fd.append("district",district.value);
fd.append("previous_school",previous_school.value);
fd.append("orphan_status",orphan_status.value); // New
fd.append("parent_password",parent_password.value);

// sawirka ridaaya
if(student_photo.files){
    fd.append("photo", student_photo.files);
}

let res=await fetch("/add_student",{method:"POST",body:fd});
let data=await res.json();

if(data.success){
alert("✅ Student Registered\nParent Password: "+parent_password.value);
closeModal();
loadStudents();
}else{
alert(data.error);
}
}

async function checkPass(type){
let pass=prompt("Enter "+type+" password");
if(!pass) return false;
let res=await fetch(`/check_panel_password?type=${type}&pass=${pass}`);
let data=await res.json();
return data.success;
}

function closeTeacher(){
document.getElementById("teacherModal").style.display="none";
}

async function openTeacher(){
if(await checkPass("teacher")){
document.getElementById("teacherModal").style.display="block";
}else{
alert("❌ Wrong Teacher Password");
}
}

async function saveTeacher(){
let fd=new FormData();
fd.append("full_name",t_full_name.value);
fd.append("phone",t_phone.value);
fd.append("username",t_username.value);
fd.append("password",t_password.value);
fd.append("subject",t_subject.value); // New

let classes=[];
document.querySelectorAll('#teacherModal input[type=checkbox]:checked')
.forEach(c=>classes.push(c.value));

fd.append("assigned_classes",JSON.stringify(classes));

let res=await fetch("/add_teacher",{method:"POST",body:fd});
let data=await res.json();

if(data.success){
alert("✅ Teacher Added");
closeTeacher();
}else{
alert(data.error);
}
}

// Cashier login logic update
async function openCashier(){
    // First, try to go directly if session exists, otherwise redirect to login page
    window.location.href = "/cashier_login"; 
}

async function goAdmin(){
if(await checkPass("admin")){
window.location="/admin_dashboard_school";
}else alert("Wrong Password");
}

function searchStudents(){
let q=document.getElementById("searchStudent").value.toLowerCase();
renderStudents(allStudents.filter(s=>s.full_name.toLowerCase().includes(q)||s.student_id.includes(q)));
}

</script>

</body>
</html>
