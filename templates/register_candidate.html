<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candidate Register</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            padding: 30px;
            margin: 0;
        }

        .box{
            max-width: 700px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 0 10px rgba(0,0,0,0.15);
        }

        h1, h2{
            margin-bottom: 20px;
        }

        input{
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
        }

        button{
            width: 100%;
            padding: 14px;
            background: #0a7cff;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
        }

        button:hover{
            background: #0866d6;
        }

        .candidate{
            margin-top: 20px;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .candidate img{
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 50%;
            border: 2px solid #ddd;
        }

        .candidate-info h3{
            margin: 0 0 8px 0;
        }

        .candidate-info p{
            margin: 0;
            color: #555;
        }

        hr{
            margin: 25px 0;
            border: 0;
            border-top: 1px solid #ddd;
        }
    </style>
</head>
<body>

<div class="box">
    <h1>🧑‍💼 Register Candidate</h1>

    <form method="POST" enctype="multipart/form-data">
        <input type="text" name="full_name" placeholder="Candidate Name" required>
        <input type="text" name="department" placeholder="Department / Faculty" required>
        <input type="file" name="image" required>
        <button type="submit">➕ Register Candidate</button>
    </form>

    <hr>

    <h2>Registered Candidates</h2>

    {% for c in candidates %}
    <div class="candidate">
        <img src="{{ url_for('static', filename='uploads/' + c[6]) }}" alt="Candidate Image">

        <div class="candidate-info">
            <h3>{{ c[1] }}</h3>
            <p>{{ c[2] }}</p>
        </div>
    </div>
    {% endfor %}
</div>

</body>
</html>
