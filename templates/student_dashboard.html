<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<style>
body {
    font-family: Arial;
    background: #f0f2f5;
    margin: 0;
}

/* HEADER */
.header {
    background: #2193b0;
    color: white;
    padding: 15px;
    text-align: center;
}

/* STUDENTS GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 15px;
    padding: 15px;
}

/* CARD */
.card {
    background: white;
    padding: 15px;
    border-radius: 10px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    text-align: center;
}

.card img {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    object-fit: cover;
}

/* FLOAT BUTTON */
.fab {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #28a745;
    color: white;
    border: none;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    font-size: 25px;
}

/* MODAL */
.modal {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
}

.modal-content {
    background: white;
    margin: 5% auto;
    padding: 20px;
    width: 90%;
    max-width: 400px;
    border-radius: 10px;
}

input, select {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
}

button {
    padding: 10px;
    width: 100%;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="header">
    <h2>🎓 Students Dashboard</h2>
</div>

<!-- STUDENTS -->
<div class="grid" id="students"></div>

<!-- FLOAT BUTTON -->
<button class="fab" onclick="openForm()">+</button>

<!-- MODAL FORM -->
<div class="modal" id="modal">
<div class="modal-content">

<h3>Add Student</h3>

<form id="form" enctype="multipart/form-data">
<input name="student_id" placeholder="Student ID" required>
<input name="full_name" placeholder="Full Name" required>

<select name="gender">
<option>Male</option>
<option>Female</option>
</select>

<input name="mother_name" placeholder="Mother Name">
<input name="student_phone" placeholder="Student Phone">
<input type="file" name="photo">
<input name="mother_phone" placeholder="Mother Phone">
<input name="fee" placeholder="Fee">

<button type="submit">Save</button>
<button type="button" onclick="closeForm()">Close</button>
</form>

<div id="msg"></div>

</div>
</div>

<script>

// 🔥 LOAD STUDENTS
async function loadStudents(){
    let res = await fetch("/get_students");
    let data = await res.json();

    let container = document.getElementById("students");
    container.innerHTML = "";

    data.forEach(s => {
        container.innerHTML += `
        <div class="card">
            <img src="/static/uploads/${s.photo || 'default.png'}">
            <h3>${s.full_name}</h3>
            <p>ID: ${s.student_id}</p>
            <p>Gender: ${s.gender}</p>
            <p>Fee: $${s.fee}</p>
            <p>Phone: ${s.student_phone}</p>
            <p>Mother: ${s.mother_name}</p>
        </div>
        `;
    });
}

loadStudents();

// MODAL
function openForm(){
    document.getElementById("modal").style.display = "block";
}
function closeForm(){
    document.getElementById("modal").style.display = "none";
}

// SAVE STUDENT
document.getElementById("form").onsubmit = async (e)=>{
    e.preventDefault();

    let res = await fetch("/add_student", {
        method:"POST",
        body:new FormData(e.target)
    });

    let data = await res.json();

    if(data.error){
        document.getElementById("msg").innerHTML = data.error;
    }else{
        document.getElementById("msg").innerHTML = "Saved ✔";
        loadStudents();
        e.target.reset();
    }
}

</script>

</body>
</html>
