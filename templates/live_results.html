<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Results</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#111827;
            color:white;
            padding:30px;
            margin:0;
        }

        .container{
            max-width:900px;
            margin:auto;
        }

        h1{
            text-align:center;
            margin-bottom:30px;
        }

        .candidate{
            background:#1f2937;
            padding:20px;
            border-radius:15px;
            margin-bottom:20px;
            display:flex;
            align-items:center;
            gap:20px;
        }

        .candidate img{
            width:100px;
            height:100px;
            border-radius:50%;
            object-fit:cover;
            border:2px solid white;
        }

        .progress{
            width:100%;
            height:20px;
            background:#374151;
            border-radius:10px;
            overflow:hidden;
            margin-top:10px;
        }

        .bar{
            height:100%;
            background:#0a7cff;
            width:0%;
            transition:1s;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📊 Live Election Results</h1>

    {% for c in candidates %}
    <div class="candidate">
        <img src="{{ url_for('static', filename='uploads/' + c[6]) }}">

        <div style="width:100%">
            <h2>{{ c[1] }}</h2>
            <p>Votes: {{ c[4] }}</p>
            <p>Percentage: {{ c[5] }}%</p>

            <div class="progress">
                <div class="bar" data-percent="{{ c[5] }}"></div>
            </div>
        </div>
    </div>
    {% endfor %}
</div>

<script>
document.querySelectorAll(".bar").forEach(bar=>{
    let percent = bar.getAttribute("data-percent");
    bar.style.width = percent + "%";
});

setTimeout(function(){
    location.reload();
}, 3000);
</script>

</body>
</html>
