<!DOCTYPE html>

<html>

<head>

<title>Staff List</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#f5f5f5;
padding:20px;
}

table{
width:100%;
background:white;
border-collapse:collapse;
border-radius:10px;
overflow:hidden;
box-shadow:0 0 5px rgba(0,0,0,0.2);
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
text-align:left;
}

th{
background:#0a7cff;
color:white;
}

</style>

</head>

<body>

<h2>Restaurant Staff</h2>

<table>

<tr>
<th>Name</th>
<th>Email</th>
</tr>

{% for s in staff %}

<tr>

<td>{{s[2]}}</td>

<td>{{s[3]}}</td>

</tr>

{% endfor %}

</table>

</body>

</html>
