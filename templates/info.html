<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>System Info</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#2c5364;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.popup{
    background:white;
    max-width:400px;
    width:90%;
    padding:20px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
    animation:fadeIn 0.3s ease;
}

h2{margin-top:0}

img,video{
    width:100%;
    border-radius:10px;
    margin-top:10px;
}

.btn{
    margin-top:15px;
    width:100%;
    padding:12px;
    background:red;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
}

@keyframes fadeIn{
    from{opacity:0; transform:scale(0.9);}
    to{opacity:1; transform:scale(1);}
}
</style>
</head>

<body>

<div class="popup">

<h2>🏫 {{ info.title or "System Information" }}</h2>

<p>{{ info.content }}</p>

{% if info.image %}
<img src="{{ url_for('static', filename='info/' + info.image) }}">
{% endif %}

{% if info.video %}
<video controls>
<source src="{{ url_for('static', filename='info/' + info.video) }}">
</video>
{% endif %}

<button class="btn" onclick="window.history.back()">Close</button>

</div>

</body>
</html>
