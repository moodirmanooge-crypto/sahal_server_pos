<!DOCTYPE html>
<html>
<head>
    <title>QR Code</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
    body{
        font-family:Arial, sans-serif;
        text-align:center;
        background:#f4f4f4;
        padding:40px 20px;
        margin:0;
    }

    .card{
        background:white;
        padding:25px;
        border-radius:12px;
        display:inline-block;
        box-shadow:0 0 10px rgba(0,0,0,0.15);
        max-width:420px;
        width:100%;
    }

    #qrimg{
        width:280px;
        height:280px;
        max-width:100%;
        object-fit:contain;
        image-rendering:pixelated;
    }

    .btn{
        padding:10px 20px;
        border:none;
        border-radius:6px;
        cursor:pointer;
        margin:10px 5px;
        font-size:16px;
        color:white;
        text-decoration:none;
        display:inline-block;
    }

    .download{ background:#28a745; }
    .print{ background:#ff9800; }
    .close{ background:#e91e63; }

    </style>
</head>

<body>

<div class="card">

    <h2>{{ restaurant }}</h2>
    <h3>Table {{ table }}</h3>

    <img id="qrimg"
         src="/static/qr/{{ img }}"
         alt="QR Code">

    <br><br>

    <a href="/static/qr/{{ img }}" download class="btn download">
        ⬇ Download QR
    </a>

    <button class="btn print" onclick="printQR()">
        🖨 Print QR
    </button>

    <button class="btn close" onclick="goBack()">
        Close
    </button>

</div>

<script>
function printQR(){
    const img = document.getElementById("qrimg").src;

    const w = window.open("", "_blank");

    w.document.write(`
        <html>
        <body style="text-align:center;padding:40px;">
            <img src="${img}" style="width:300px;height:300px;">
            <script>
                window.onload=function(){
                    window.print();
                    window.close();
                }
            <\/script>
        </body>
        </html>
    `);

    w.document.close();
}

function goBack(){
    window.location.href="/dashboard/{{ rid }}";
}
</script>

</body>
</html>
