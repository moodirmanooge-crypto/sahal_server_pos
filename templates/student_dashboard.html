<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>{{ school.school_name if school else 'Students Dashboard' }}</title>

<style>
body { margin:0; font-family:Arial; background:#f5f6fa; }

.header {
    background:#1e3c72;
    color:white;
    padding:15px;
    text-align:center;
}

/* BUTTONS */
.fab, .fab2 {
    position:fixed;
    bottom:20px;
    width:60px;
    height:60px;
    border-radius:50%;
    border:none;
    color:white;
    font-size:22px;
    z-index: 999;
    cursor: pointer;
}
.fab { right:20px; background:#28a745; }
.fab2 { right:90px; background:#007bff; }

/* ADD POPUP */
.modal {
    display:none;
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    z-index: 1000;
    top:0; left:0;
}

.popup {
    background:white;
    width:90%;
    max-width:400px;
    margin:2% auto;
    padding:20px;
    border-radius:10px;
    position:relative;
    max-height: 90vh;
    overflow-y: auto;
}

.close {
    position:absolute;
    top:10px;
    right:15px;
    cursor:pointer;
    font-weight: bold;
    color: red;
}

/* BOTTOM SHEET */
.sheet {
    position:fixed;
    bottom:-100%;
    left:0;
    width:100%;
    height:90%;
    background:white;
    border-radius:20px 20px 0 0;
    transition:0.3s;
    overflow:auto;
    z-index: 1001;
    box-shadow: 0 -5px 15px rgba(0,0,0,0.2);
}

.sheet.active { bottom:0; }

.sheet-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 20px;
    border-bottom: 1px solid #eee;
}

.btn-close-sheet {
    background: #ff4757;
    color: white;
    border: none;
    padding: 8px 15px;
    border-radius: 5px;
    cursor: pointer;
}

.drag { width:50px; height:5px; background:#ccc; margin:10px auto; border-radius:5px; }

/* TABLE STYLE */
.table { width:100%; border-collapse:collapse; margin-top: 10px; }
.table th { background:#3498db; color:white; padding:10px; font-size: 13px; text-align: left; }
.table td { padding:10px; border-bottom:1px solid #ddd; font-size: 13px; }

.std-img { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; border: 1px solid #ddd; }

input, select {
    width:100%;
    padding:10px;
    margin-top:10px;
    box-sizing: border-box;
    border: 1px solid #ddd;
    border-radius: 5px;
}

.update-section { margin-top: 20px; padding-top: 15px; border-top: 2px dashed #eee; }
.btn-save { background: #28a745; color: white; border: none; font-weight: bold; border-radius: 5px; width:100%; padding:10px; margin-top:10px; cursor:pointer;}
.btn-update { background: #6f42c1; color: white; border: none; font-weight: bold; border-radius: 5px; width:100%; padding:10px; margin-top:10px; cursor:pointer;}
</style>
</head>

<body>

<div class="header">
    <h2 id="schoolTitle">🎓 {{ school.school_name }} (Code: {{ school.school_code }})</h2>
</div>

<button class="fab" onclick="openAdd()">+</button>
<button class="fab2" onclick="openSheet()">📋</button>

<div class="modal" id="addModal">
    <div class="popup" id="draggablePopup">
        <div class="close" onclick="closeAll()">✖</div>
        <h3>Add / Edit Student</h3>

        <input id="student_id" placeholder="Student ID (Example: 8029)">
        <input id="full_name" placeholder="Student Name">

        <select id="gender">
            <option>Male</option>
            <option>Female</option>
        </select>

        <input id="mother_name" placeholder="Mother Name">
        <input id="student_phone" placeholder="Student Phone">
        <label style="font-size: 11px; color: #666; margin-top: 10px; display: block;">Student Photo:</label>
        <input type="file" id="photo" accept="image/*">
        <input id="mother_phone" placeholder="Mother Phone">
        <input id="fee" placeholder="Monthly Fee ($)">

        <button onclick="saveStudent()" class="btn-save">Save Student</button>

        <div class="update-section">
            <h4 style="margin:0; color:#1e3c72;">🔑 Parent View Security</h4>
            <input type="password" id="parent_password_input" placeholder="New Parent Password">
            <button onclick="updateParentPassword()" class="btn-update">Update Parent Password</button>
        </div>
    </div>
</div>

<div class="sheet" id="sheet">
    <div class="drag"></div>
    <div class="sheet-header">
        <h3 style="margin:0">Student List</h3>
        <button class="btn-close-sheet" onclick="closeAll()">Close ❌</button>
    </div>

    <input style="margin:10px; width:95%;" id="searchID" placeholder="Search by ID or Name..." onkeyup="liveSearch()">

    <table class="table">
        <thead>
            <tr>
                <th>Photo</th>
                <th>ID</th>
                <th>Name</th>
                <th>Fee</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="studentsTable"></tbody>
    </table>
</div>

<script>
let allStudents = [];
// 🔑 MUHIIM: Ka soo qaad School Code-ka Python-ka si toos ah
const CURRENT_SCHOOL_CODE = "{{ school.school_code }}";

function openAdd(){ document.getElementById("addModal").style.display="block"; }
function closeAll(){
    document.getElementById("addModal").style.display="none";
    document.getElementById("sheet").classList.remove("active");
}

async function openSheet(){
    document.getElementById("sheet").classList.add("active");
    try {
        let res = await fetch("/get_students");
        allStudents = await res.json();
        renderTable(allStudents);
    } catch (e) { console.log("Fetch Error"); }
}

function renderTable(data){
    let box = document.getElementById("studentsTable");
    box.innerHTML="";
    data.forEach(s=>{
        let img = s.photo ? `/static/uploads/${s.photo}` : "https://cdn-icons-png.flaticon.com/512/149/149071.png";
        box.innerHTML += `
        <tr>
            <td><img src="${img}" class="std-img" onerror="this.src='https://cdn-icons-png.flaticon.com/512/149/149071.png'"></td>
            <td><b>${s.student_id}</b></td>
            <td>${s.full_name}</td>
            <td>$${s.fee || '0'}</td>
            <td>
                <button onclick="edit('${s.student_id}')" style="background:#f1c40f; border:none; border-radius:4px; padding:5px;">Edit</button>
                <button onclick="del('${s.student_id}')" style="background:red; color:white; border:none; border-radius:4px; padding:5px;">Del</button>
            </td>
        </tr>`;
    });
}

function liveSearch(){
    let val = document.getElementById("searchID").value.toLowerCase();
    let filtered = allStudents.filter(s => s.student_id.toString().includes(val) || s.full_name.toLowerCase().includes(val));
    renderTable(filtered);
}

async function saveStudent(){
    let fd = new FormData();
    fd.append("student_id", document.getElementById("student_id").value);
    fd.append("full_name", document.getElementById("full_name").value);
    fd.append("gender", document.getElementById("gender").value);
    fd.append("mother_name", document.getElementById("mother_name").value);
    fd.append("student_phone", document.getElementById("student_phone").value);
    fd.append("mother_phone", document.getElementById("mother_phone").value);
    fd.append("fee", document.getElementById("fee").value);
    
    let photoInput = document.getElementById("photo");
    if(photoInput.files) fd.append("photo", photoInput.files);

    let res = await fetch("/add_student", {method:"POST", body:fd});
    let data = await res.json();
    if(data.error) alert(data.error);
    else { alert("Saved!"); location.reload(); }
}

async function updateParentPassword() {
    let newPass = document.getElementById("parent_password_input").value;
    if(!newPass) return alert("Gali password!");

    try {
        let res = await fetch("/update_parent_password", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ 
                password: newPass,
                school_code: CURRENT_SCHOOL_CODE 
            })
        });

        let data = await res.json();
        if(data.success) {
            alert("✅ Password-ka waa la bedelay!");
            document.getElementById("parent_password_input").value = "";
        } else {
            alert("❌ " + data.error);
        }
    } catch (e) { alert("Server Error"); }
}

async function del(id){
    if(confirm("Ma tirtirtaa?")){
        let fd = new FormData();
        fd.append("student_id", id);
        await fetch("/delete_student_api", {method:"POST", body:fd});
        openSheet();
    }
}

function edit(id){
    let s = allStudents.find(x=>x.student_id==id);
    if(!s) return;
    openAdd();
    document.getElementById("student_id").value = s.student_id;
    document.getElementById("full_name").value = s.full_name;
    document.getElementById("mother_name").value = s.mother_name;
    document.getElementById("fee").value = s.fee;
}
</script>
</body>
</html>
