<!DOCTYPE html>
<html>
<head>

<title>{{restaurant}} Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
padding:20px;
background:#f5f5f5;
}

.card{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:10px;
box-shadow:0 0 5px rgba(0,0,0,0.2);
}

img, video{
width:80px;
height:80px;
object-fit:cover;
border-radius:5px;
}

button{
padding:6px;
border:none;
background:red;
color:white;
border-radius:5px;
cursor:pointer;
}

input{
padding:6px;
margin:5px 0;
}

h2{
margin-top:20px;
}

/* FLOATING BUTTONS */
.fab{
position:fixed;
right:20px;
width:60px;
height:60px;
border-radius:50%;
color:white;
font-size:22px;
border:none;
cursor:pointer;
box-shadow:0 0 10px rgba(0,0,0,0.3);
user-select:none;
}

.stats-btn{ bottom:20px; background:#0a7cff; }
.qr-btn{ bottom:90px; background:green; }
.staff-btn{ bottom:160px; background:#ff9800; }

/* ADS PANEL */
.ads-panel{
position:fixed;
left:20px;
bottom:20px;
display:flex;
flex-direction:column;
gap:10px;
z-index:999;
}

/* 🔥 muhiim (drag) */
.ads-panel, .fab{
touch-action:none;
cursor:grab;
}

.ads-main{ background:#e91e63; }
.ads-sub{
background:#444;
width:50px;
height:50px;
font-size:16px;
}

/* POPUP */
.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
align-items:center;
justify-content:center;
}

.popup-box{
background:white;
padding:20px;
border-radius:10px;
width:350px;
max-height:80vh;
overflow:auto;
text-align:center;
}

</style>

</head>

<body>

<h1>{{restaurant}} Dashboard</h1>

<div style="text-align:right;margin-bottom:10px;">
<a href="/restaurant_admin/{{rid}}" style="
background:#0a7cff;
color:white;
padding:8px 15px;
border-radius:6px;
text-decoration:none;
">
⚙️ Admin Restaurant
</a>
</div>

<h2>Add Menu</h2>
<form action="/add_menu/{{rid}}" method="post" enctype="multipart/form-data">
<input name="name" placeholder="Food name" required>
<input name="price" placeholder="Price" required>
<input type="file" name="image" required>
<button>Add</button>
</form>

<hr>

<h2>Menu List</h2>
{% for m in menu %}
<div class="card">
<div style="display:flex; justify-content:space-between; align-items:center;">
<div style="display:flex; gap:10px; align-items:center;">
<img src="/static/uploads/{{m}}">
<div>
<h3>{{m}}</h3>
<p>$ {{m}}</p>
</div>
</div>

<a href="/delete_menu/{{m}}" onclick="return confirm('Delete item?')">
<button>🗑 Delete</button>
</a>

</div>
</div>
{% endfor %}

<hr>

<h2>Add Advertisement</h2>
<form action="/add_ad/{{rid}}" method="post" enctype="multipart/form-data">
<input name="title" placeholder="Ad title" required>
<input type="file" name="image" required>
<button>Add Ad</button>
</form>

<hr>

<h2>Menu List</h2>
{% for m in menu %}
<div class="card">
<div style="display:flex; justify-content:space-between; align-items:center;">
<div style="display:flex; gap:10px; align-items:center;">

<img src="/static/uploads/{{m[4]}}">

<div>
<h3>{{m[2]}}</h3>
<p>$ {{m[3]}}</p>
</div>

</div>

<a href="/delete_menu/{{m[0]}}" onclick="return confirm('Delete item?')">
<button>🗑 Delete</button>
</a>

</div>
</div>
{% endfor %}

<button class="fab stats-btn" onclick="openStats()">📊</button>
<button class="fab qr-btn" onclick="openQR()">📷</button>
<button class="fab staff-btn" onclick="openStaff()">👨‍💼</button>
<button class="fab" style="bottom:230px;background:#673ab7;" onclick="openSales()">💰</button>

<div class="ads-panel">
<button class="fab ads-sub" onclick="openAds()">➕</button>
<button class="fab ads-sub" onclick="scrollAds()">📺</button>
<button class="fab ads-sub">🎵</button>
<button class="fab ads-sub">📊</button>
<button class="fab ads-main" onclick="openAds()">🎬</button>
</div>

<div class="popup" id="statsPopup">
<div class="popup-box">
<h3>Stats</h3>
<p id="statsData">Loading...</p>
<button onclick="closeStats()">Close</button>
</div>
</div>

<div class="popup" id="salesPopup">
<div class="popup-box">

<h3>📊 Sales Dashboard</h3>

<label>From:</label>
<input type="date" id="fromDate"><br>

<label>To:</label>
<input type="date" id="toDate"><br><br>

<button onclick="loadSales()">Load</button>

<h3>Total: $<span id="totalSales">0</span></h3>

<div id="salesData" style="margin-top:10px;text-align:left;"></div>

<br>
<button onclick="closeSales()">Close</button>

</div>
</div>

<div class="popup" id="qrPopup">
<div class="popup-box">
<h3>Generate QR</h3>
<input id="tableInput" placeholder="Table No">
<br><br>
<button onclick="generateQR()">Generate</button>
<div id="qrResult"></div>
<br>
<button onclick="closeQR()">Close</button>
</div>
</div>

<div class="popup" id="staffPopup">
<div class="popup-box">
<h3>Add Staff</h3>
<input id="sname"><br>
<input id="semail"><br>
<input id="spass"><br><br>
<button onclick="addStaff()">Add</button>
<br><br>
<button onclick="closeStaff()">Close</button>
</div>
</div>

<script>

const RID="{{rid}}"

/* STATS */
function openStats(){
statsPopup.style.display="flex"
fetch("/stats/"+RID)
.then(r=>r.json())
.then(d=>{
statsData.innerText="Orders: "+d.orders+" | Revenue: $"+d.revenue
})
}
function closeStats(){ statsPopup.style.display="none" }

/* SALES */
function openSales(){ salesPopup.style.display="flex" }
function closeSales(){ salesPopup.style.display="none" }

/* 🔥 LOAD SALES (UPDATED) */
function loadSales(){

let from = document.getElementById("fromDate").value
let to = document.getElementById("toDate").value

document.getElementById("salesData").innerHTML="Loading..."

fetch(`/sales_data/${RID}?from=${from}&to=${to}`)
.then(r=>r.json())
.then(data=>{

let html=""

if(data.orders.length===0){
html="<p>No orders ❌</p>"
}else{

data.orders.forEach(o=>{

html+=`
<div class="card">
<b>Table:</b> ${o.table}<br>
<b>Food:</b> ${o.food}<br>
<b>Total:</b> $${o.total}<br>
<b>Date:</b> ${o.date}
</div>
`
})

}

document.getElementById("salesData").innerHTML=html
document.getElementById("totalSales").innerText = data.total

})
}

/* QR */
function openQR(){ qrPopup.style.display="flex" }
function closeQR(){ qrPopup.style.display="none" }

function generateQR(){
let t=tableInput.value
fetch("/generate_qr/"+RID,{
method:"POST",
headers:{"Content-Type":"application/x-www-form-urlencoded"},
body:"table="+t
})
.then(r=>r.text())
.then(html=> qrResult.innerHTML=html)
}

/* STAFF */
function openStaff(){ staffPopup.style.display="flex" }
function closeStaff(){ staffPopup.style.display="none" }

function addStaff(){
fetch("/add_staff/"+RID,{
method:"POST",
headers:{"Content-Type":"application/x-www-form-urlencoded"},
body:"name="+sname.value+"&email="+semail.value+"&password="+spass.value
})
.then(()=> alert("Staff Added ✅"))
}

/* ADS */
function openAds(){
window.scrollTo({top:document.body.scrollHeight,behavior:"smooth"})
}
function scrollAds(){
let adsSection=document.querySelectorAll("h2")
if(adsSection){ adsSection.scrollIntoView({behavior:"smooth"}) }
}

/* 🔥 DRAG SYSTEM */
function makeDraggable(el,key){
let isDragging=false,offsetX,offsetY

let saved=localStorage.getItem(key)
if(saved){
let pos=JSON.parse(saved)
el.style.left=pos.left
el.style.top=pos.top
el.style.right="auto"
el.style.bottom="auto"
}

el.onmousedown=el.ontouchstart=function(e){
isDragging=true
let rect=el.getBoundingClientRect()
let clientX=e.touches?e.touches.clientX:e.clientX
let clientY=e.touches?e.touches.clientY:e.clientY
offsetX=clientX-rect.left
offsetY=clientY-rect.top
}

document.onmousemove=document.ontouchmove=function(e){
if(!isDragging) return
let clientX=e.touches?e.touches.clientX:e.clientX
let clientY=e.touches?e.touches.clientY:e.clientY

el.style.left=(clientX-offsetX)+"px"
el.style.top=(clientY-offsetY)+"px"
el.style.right="auto"
el.style.bottom="auto"
}

document.onmouseup=document.ontouchend=function(){
if(isDragging){
localStorage.setItem(key,JSON.stringify({
left:el.style.left,
top:el.style.top
}))
}
isDragging=false
}
}

document.querySelectorAll(".fab").forEach((b,i)=>makeDraggable(b,"fab"+i))
makeDraggable(document.querySelector(".ads-panel"),"adsPanel")

</script>

</body>
</html>
