<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Screen</title>

    <style>
        body{
            font-family:Arial, sans-serif;
            background:#f4f6f9;
            padding:20px;
            margin:0;
        }

        .container{
            max-width:1200px;
            margin:auto;
            background:white;
            padding:25px;
            border-radius:15px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        h1,h2{
            color:#1e293b;
            margin-bottom:20px;
        }

        input,button{
            width:100%;
            padding:12px;
            margin-top:12px;
            border-radius:8px;
            border:1px solid #ddd;
            box-sizing:border-box;
            font-size:16px;
        }

        button{
            background:#0a7cff;
            color:white;
            border:none;
            font-weight:bold;
            cursor:pointer;
        }

        table{
            width:100%;
            border-collapse:collapse;
            margin-top:20px;
        }

        th,td{
            padding:12px;
            border:1px solid #ddd;
            text-align:left;
        }

        th{
            background:#0a7cff;
            color:white;
        }

        .total{
            margin-top:15px;
            font-weight:bold;
            color:#0a7cff;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📋 Student Screen</h1>

    <form method="GET">
        <input type="text" name="student_id" placeholder="Search Student ID">
        <button type="submit">Search</button>
    </form>

    <h2>📑 All Registered Students</h2>

    <table>
        <tr>
            <th>#</th>
            <th>Student ID</th>
            <th>Full Name</th>
            <th>Phone Number</th>
            <th>Department</th>
            <th>Class</th>
        </tr>

        {% for s in students %}
        <tr>
            <td>{{ loop.index }}</td>
            <td>{{ s.student_id }}</td>
            <td>{{ s.full_name }}</td>
            <td>{{ s.phone_number }}</td>
            <td>{{ s.department }}</td>
            <td>{{ s.student_class }}</td>
        </tr>
        {% endfor %}
    </table>

    <div class="total">
        Total Students: {{ students|length }}
    </div>
</div>

</body>
</html>
