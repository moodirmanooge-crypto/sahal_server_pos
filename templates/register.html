<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register Restaurant</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
    font-family: Arial;
    background: #f4f6f9;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    padding:20px;
}

.card{
    background: white;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 0 10px rgba(0,0,0,0.15);
    width: 450px;
    max-width: 100%;
}

h2, h3{
    margin-bottom: 10px;
}

input, select{
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border: 1px solid #ddd;
    border-radius: 5px;
    box-sizing:border-box;
}

button{
    width: 100%;
    padding: 12px;
    background: #0a7cff;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-size: 16px;
}

button:hover{
    background: #095fcc;
}
</style>
</head>

<body>

<div class="card">

<h2>🍽 Register Restaurant</h2>

<form method="POST">

    <input name="name" placeholder="Restaurant Name" required>
    <input name="phone" placeholder="Phone Number">

    <input name="username" placeholder="Username" required>
    <input name="password" type="password" placeholder="Restaurant Login Password" required>
    <input name="kitchen_password" type="password" placeholder="Kitchen Password" required>

    <h3>🔐 Restaurant Admin Password</h3>
    <input name="restaurant_admin_password"
           type="password"
           placeholder="Restaurant Admin Password"
           required>

    <h3>👤 Restaurant Admin Info</h3>
    <input name="admin_name" placeholder="Admin Name">
    <input name="admin_email" placeholder="Admin Email">

    <h3>💵 Subscription Price</h3>
    <input name="price" placeholder="Example: 20" required>

    <h3>📅 Subscription Period</h3>
    <select name="months" required>
        <option value="3">3 Months</option>
        <option value="6">6 Months</option>
        <option value="12">1 Year</option>
    </select>

    <h3>📲 Payment USSD Code</h3>
    <input name="payment" placeholder="Example: *789*657090*$#" required>

    <button type="submit">Create Restaurant</button>

</form>

</div>

</body>
</html>
