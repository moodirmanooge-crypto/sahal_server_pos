<!DOCTYPE html>

<html>

<head>

<title>Staff News</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#f5f5f5;
padding:20px;
}

.card{
background:white;
padding:15px;
margin-bottom:10px;
border-radius:10px;
box-shadow:0 0 5px rgba(0,0,0,0.2);
}

h2{
margin-bottom:20px;
}

</style>

</head>

<body>

<h2>Restaurant Staff News</h2>

{% for n in news %}

<div class="card">

<h3>{{n[0]}}</h3>

<p>{{n[1]}}</p>

</div>

{% endfor %}

</body>

</html>
