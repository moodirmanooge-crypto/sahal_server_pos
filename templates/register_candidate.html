<!DOCTYPE html>
<html>
<head>
    <title>Candidate Register</title>
    <style>
        body{
            font-family:Arial;
            background:#f4f6f9;
            padding:30px;
        }

        .box{
            max-width:700px;
            margin:auto;
            background:white;
            padding:25px;
            border-radius:15px;
            box-shadow:0 0 10px rgba(0,0,0,0.15);
        }

        input{
            width:100%;
            padding:12px;
            margin:10px 0;
            border:1px solid #ddd;
            border-radius:8px;
        }

        button{
            width:100%;
            padding:14px;
            background:#0a7cff;
            color:white;
            border:none;
            border-radius:8px;
            font-size:18px;
        }

        .candidate{
            margin-top:20px;
            padding:15px;
            border:1px solid #ddd;
            border-radius:10px;
        }

        img{
            width:100px;
            height:100px;
            object-fit:cover;
            border-radius:50%;
        }
    </style>
</head>
<body>

<div class="box">
    <h1>🧑‍💼 Register Candidate</h1>

    <form method="POST" enctype="multipart/form-data">
        <input type="text" name="full_name" placeholder="Candidate Name" required>
        <input type="text" name="department" placeholder="Department / Faculty" required>
        <input type="file" name="image" required>
        <button type="submit">➕ Register Candidate</button>
    </form>

    <hr>

    <h2>Registered Candidates</h2>

    {% for c in candidates %}
    <div class="candidate">
        <img src="{{ url_for('static', filename='uploads/' + c[3]) }}">
        <h3>{{ c[1] }}</h3>
        <p>{{ c[2] }}</p>
    </div>
    {% endfor %}
</div>

</body>
</html>
