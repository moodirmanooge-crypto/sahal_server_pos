<!DOCTYPE html>
<html>
<head>
<title>Parent View</title>

<style>
body{
font-family:Segoe UI;
background:#1e3c72;
color:white;
text-align:center;
margin:0;
}

.box{
background:white;
color:black;
padding:20px;
margin:50px auto;
width:350px;
border-radius:10px;
}

input{
width:100%;
padding:10px;
margin:5px 0;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:100%;
padding:10px;
background:#3498db;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

.data{
background:white;
color:black;
padding:20px;
margin:20px auto;
width:90%;
max-width:600px;
border-radius:10px;
display:none;
text-align:left;
}

.badge{
padding:5px 10px;
border-radius:10px;
}
</style>
</head>

<body>

<h2>👨‍👩‍👧 Parent Portal</h2>

<div class="box">
<input id="student_id" placeholder="Student ID">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<p id="error" style="color:red;"></p>
</div>

<div class="data" id="dataBox">

<h3 id="school"></h3>
<p><b>Name:</b> <span id="name"></span></p>

<p><b>Fee:</b> $<span id="fee"></span></p>
<p><b>Paid:</b> $<span id="paid"></span></p>
<p><b>Remaining:</b> $<span id="remaining"></span></p>

<hr>

<h4>📊 Attendance</h4>
<p>Present: <span id="present"></span></p>
<p>Absent: <span id="absent"></span></p>

<hr>

<h4>📢 Reports</h4>
<ul id="reports"></ul>

</div>

<script>

async function login(){

let id = document.getElementById("student_id").value;
let pass = document.getElementById("password").value;

if(!id || !pass){
document.getElementById("error").innerText = "Fill all fields";
return;
}

let fd = new FormData();
fd.append("student_id", id);
fd.append("password", pass);

try{

let res = await fetch("/parent_login",{method:"POST",body:fd});
let data = await res.json();

if(data.error){
document.getElementById("error").innerText = data.error;
return;
}

loadData(id);

}catch(e){
document.getElementById("error").innerText = "Server error";
}
}

async function loadData(id){

try{

let res = await fetch("/parent_data?student_id="+id);
let d = await res.json();

if(d.error){
document.getElementById("error").innerText = d.error;
return;
}

document.getElementById("dataBox").style.display="block";

document.getElementById("school").innerText = d.school_name || "-";
document.getElementById("name").innerText = d.name || "-";

document.getElementById("fee").innerText = d.fee || 0;
document.getElementById("paid").innerText = d.paid || 0;
document.getElementById("remaining").innerText = d.remaining || 0;

document.getElementById("present").innerText = d.attendance?.present || 0;
document.getElementById("absent").innerText = d.attendance?.absent || 0;

let rep = document.getElementById("reports");
rep.innerHTML="";

if(d.reports && d.reports.length > 0){
d.reports.forEach(r=>{
rep.innerHTML += `<li>${r}</li>`;
});
}else{
rep.innerHTML = "<li>No reports</li>";
}

}catch(e){
document.getElementById("error").innerText = "Failed to load data";
}

}

</script>

</body>
</html>
