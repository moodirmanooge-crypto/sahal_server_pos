<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ school.school_name }}</title>

<style>
body {margin:0;font-family:'Segoe UI';background:#f5f6fa;}

.header{
background:#1e3c72;
color:white;
padding:15px;
text-align:center;
position:relative;
}

.admin-btn{
position:absolute;
top:15px;
right:15px;
background:#ff9800;
color:white;
border:none;
padding:8px 14px;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

/* MAIN */
.container{
padding:20px;
}

/* FORM SECTION */
.card{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.form-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

.form-full{
grid-column:span 2;
}

input,select{
width:100%;
padding:10px;
border:1px solid #ddd;
border-radius:6px;
}

.btn-save{
background:#28a745;
color:white;
padding:12px;
border:none;
width:100%;
margin-top:15px;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

/* TABLE */
.table{
width:100%;
border-collapse:collapse;
}

.table td, .table th{
padding:10px;
border-bottom:1px solid #eee;
}

.std-img{
width:45px;height:45px;border-radius:50%;
object-fit:cover;
}

.badge{
background:#e3f2fd;
padding:4px 8px;
border-radius:5px;
font-size:12px;
}
</style>
</head>

<body>

<div class="header">
<h2>🎓 {{ school.school_name }}</h2>
<small>ID: {{ school.school_code }}</small>

<button class="admin-btn" onclick="goAdmin()">⚙ Admin Management</button>
</div>

<div class="container">

<!-- ✅ STUDENT REGISTER -->
<div class="card">

<h3>📋 Student Registration</h3>

<div class="form-grid">

<input id="student_id" placeholder="Student ID">
<input id="full_name" placeholder="Full Name">

<select id="class_name">
<option value="">Select Class</option>
<option>G1</option><option>G2</option><option>G3</option>
<option>G4</option><option>G5</option><option>G6</option>
<option>G7</option><option>G8</option><option>G9</option>
<option>F1</option><option>F2</option><option>F3</option><option>F4</option>
</select>

<input id="fee" placeholder="Monthly Fee ($)">

<input id="mother_name" placeholder="Mother Name">
<input id="mother_phone" placeholder="Mother Phone">

<input id="student_phone" placeholder="Student Phone">

<!-- ✅ NEW FIELDS -->
<input id="previous_school" placeholder="Previous School (if any)">
<input id="district" placeholder="District">

<div class="form-full">
<input id="address" placeholder="Full Address">
</div>

<div class="form-full">
<input type="file" id="photo">
</div>

</div>

<button onclick="saveStudent()" class="btn-save">💾 Register Student</button>

</div>

<!-- ✅ STUDENT LIST -->
<div class="card">

<h3>📊 Students List</h3>

<table class="table">
<thead>
<tr>
<th>Info</th>
<th>Class</th>
<th>Fee</th>
<th>Location</th>
<th>Action</th>
</tr>
</thead>

<tbody id="studentsTable"></tbody>

</table>

</div>

</div>

<script>

let allStudents=[];

function goAdmin(){
window.location.href = "/admin_dashboard_school";
}

window.onload = loadStudents;

async function loadStudents(){
let res = await fetch("/get_students");
allStudents = await res.json();
renderTable();
}

function renderTable(){
let box=document.getElementById("studentsTable");
box.innerHTML="";

allStudents.forEach(s=>{
let img = s.photo ? `/static/uploads/${s.photo}` : `https://ui-avatars.com/api/?name=${s.full_name}`;

box.innerHTML+=`
<tr>
<td>
<img src="${img}" class="std-img">
<br><b>${s.full_name}</b>
<br><small>ID: ${s.student_id}</small>
</td>

<td><span class="badge">${s.class_name}</span></td>
<td>$${s.fee || 0}</td>

<td>
${s.district || "-"} <br>
<small>${s.previous_school || ""}</small>
</td>

<td>
<button onclick="del('${s.student_id}')" style="background:red;color:white;border:none;padding:6px;border-radius:5px;">🗑</button>
</td>
</tr>
`;
});
}

async function saveStudent(){
let fd=new FormData();

fd.append("student_id",student_id.value);
fd.append("full_name",full_name.value);
fd.append("class_name",class_name.value);
fd.append("mother_name",mother_name.value);
fd.append("mother_phone",mother_phone.value);
fd.append("student_phone",student_phone.value);
fd.append("fee",fee.value);

/* NEW */
fd.append("previous_school",previous_school.value);
fd.append("district",district.value);
fd.append("address",address.value);

let file=document.getElementById("photo").files[0];
if(file) fd.append("photo",file);

let res=await fetch("/add_student",{method:"POST",body:fd});
let data=await res.json();

if(data.success){
alert("✅ Student Registered");
location.reload();
}else alert(data.error);
}

async function del(id){
if(confirm("Delete student?")){
let fd=new FormData();
fd.append("student_id",id);
await fetch("/delete_student_api",{method:"POST",body:fd});
loadStudents();
}
}

</script>

</body>
</html>
