<!DOCTYPE html>
<html>
<head>
<title>Supermarket Login</title>
<style>
body{font-family:Arial;background:#f4f6f9;padding:20px;}
.container{
    max-width:500px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:15px;
}
input,button{
    width:100%;
    padding:12px;
    margin-top:12px;
}
button{
    background:#007bff;
    color:white;
    border:none;
}
</style>
</head>
<body>
<div class="container">
    <h1>🏪 Supermarket Login</h1>

    <form method="POST">
        <input name="username" placeholder="Username" required>
        <input name="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>
</div>
</body>
</html>
