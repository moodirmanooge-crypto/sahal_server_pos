.box{

.portal-title{

    margin-bottom:14px;
    color:#94a3b8;

    font-weight:bold;

    display:block;
    padding:16px;
    margin:14px 0;
    border-radius:14px;
    text-decoration:none;
    color:white;
    font-weight:bold;
    font-size:17px;

}

a:hover{
