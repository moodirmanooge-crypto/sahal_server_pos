<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Login</title>

<style>
body{
font-family: Arial;
background: #f4f6f9;
display: flex;
justify-content: center;
align-items: center;
height: 100vh;
margin: 0;
}

.card{
background: white;
padding: 30px;
border-radius: 10px;
box-shadow: 0 0 10px rgba(0,0,0,0.2);
width: 350px;
text-align: center;
}

h2{
margin-bottom: 20px;
}

input{
width: 100%;
padding: 10px;
margin: 10px 0;
border: 1px solid #ddd;
border-radius: 5px;
}

button{
width: 100%;
padding: 12px;
background: #0a7cff;
color: white;
border: none;
border-radius: 5px;
cursor: pointer;
font-size: 16px;
}

button:hover{
background: #095fcc;
}

.error{
color: red;
margin-bottom: 10px;
font-weight: bold;
}
</style>
</head>

<body>

<div class="card">

<h2>🔐 Admin Login</h2>

<!-- ❌ ERROR MESSAGE -->
{% if error %}
<div class="error">{{error}}</div>
{% endif %}

<!-- ✅ FORM -->
<form method="POST">

<input 
name="password" 
type="password" 
placeholder="Enter Admin Password" 
required>

<button type="submit">Login</button>

</form>

</div>

</body>
</html>
