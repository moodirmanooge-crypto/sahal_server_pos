<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - eVote</title>

    <style>
        body{
            font-family:Arial;
            background:#f4f6f9;
            padding:20px;
            margin:0;
        }

        .card{
            background:white;
            padding:20px;
            border-radius:12px;
            margin-bottom:15px;
            box-shadow:0 0 8px rgba(0,0,0,0.08);
        }

        button{
            background:#0a7cff;
            color:white;
            border:none;
            padding:10px 16px;
            border-radius:8px;
            cursor:pointer;
            font-weight:bold;
        }
    </style>
</head>
<body>

<h1>⚙️ Admin Dashboard</h1>

<div class="card">
    <h2>Current Round: {{ round_no }}</h2>
</div>

<div class="card">
    <form action="/next_round" method="POST">
        <button type="submit">➡️ Move To Next Round</button>
    </form>
</div>

<div class="card">
    <a href="/live_results">
        <button>📊 View Live Results</button>
    </a>
</div>

</body>
</html>
