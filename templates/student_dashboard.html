<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ school.school_name }}</title>

<style>
body {margin:0;font-family:'Segoe UI';background:#f5f6fa;}

.header{
background:#1e3c72;
color:white;
padding:15px;
text-align:center;
position:relative;
}

.top-actions{
position:absolute;
right:15px;
top:10px;
display:flex;
gap:10px;
}

.btn{
border:none;
padding:8px 12px;
border-radius:6px;
cursor:pointer;
color:white;
font-weight:bold;
}

.admin-btn{background:#ff9800;}
.teacher-btn{background:#6f42c1;}

.container{padding:20px;}

.card{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.form-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.form-full{grid-column:span 2;}

input,select{
width:100%;
padding:8px;
border:1px solid #ddd;
border-radius:6px;
font-size:13px;
}

.btn-save{
background:#28a745;
color:white;
padding:10px;
border:none;
width:100%;
margin-top:10px;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

.table{
width:100%;
border-collapse:collapse;
}

.table th{
background:#2f4f6f;
color:white;
}

.table td, .table th{
padding:10px;
border-bottom:1px solid #eee;
text-align:center;
}

.std-img{
width:50px;
height:50px;
border-radius:50%;
object-fit:cover;
}

/* MODAL FIX */
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
z-index:999;
}

.popup{
background:white;
width:90%;
max-width:400px;
margin:10% auto;
padding:20px;
border-radius:10px;
position:relative;
}

.close{
position:absolute;
right:10px;
top:10px;
cursor:pointer;
color:red;
font-size:18px;
}
</style>
</head>

<body>

<div class="header">
<h2>🎓 {{ school.school_name }}</h2>
<small>ID: {{ school.school_code }}</small>

<div class="top-actions">
<button class="btn teacher-btn" onclick="openTeacher()">👨‍🏫 Add Teacher</button>
<button class="btn admin-btn" onclick="goAdmin()">⚙ Admin Management</button>
</div>
</div>

<div class="container">

<!-- STUDENT FORM -->
<div class="card">
<h3>📋 Student Registration</h3>

<div class="form-grid">
<input id="student_id" placeholder="Student ID">
<input id="full_name" placeholder="Full Name">

<select id="class_name">
<option value="">Class</option>
<option>G1</option><option>G2</option><option>G3</option>
<option>G4</option><option>G5</option><option>G6</option>
<option>G7</option><option>G8</option><option>G9</option>
<option>F1</option><option>F2</option><option>F3</option><option>F4</option>
</select>

<input id="fee" placeholder="Fee">

<input id="mother_name" placeholder="Mother Name">
<input id="mother_phone" placeholder="Mother Phone">

<input id="student_phone" placeholder="Student Phone">
<input id="previous_school" placeholder="Prev School">

<input id="district" placeholder="District">

<div class="form-full">
<input id="address" placeholder="Address">
</div>

<div class="form-full">
<input type="file" id="photo">
</div>
</div>

<button onclick="saveStudent()" class="btn-save">💾 Register Student</button>
</div>

<!-- STUDENTS TABLE -->
<div class="card">
<h3>📊 Students</h3>

<table class="table">
<thead>
<tr>
<th>Photo</th>
<th>Name</th>
<th>ID</th>
<th>Class</th>
<th>Fee</th>
<th>Action</th>
</tr>
</thead>
<tbody id="studentsTable"></tbody>
</table>

</div>

</div>

<!-- TEACHER MODAL -->
<div class="modal" id="teacherModal">
<div class="popup">

<span class="close" onclick="closeAll()">✖</span>

<h3>👨‍🏫 Add Teacher</h3>

<input id="t_full_name" placeholder="Full Name">
<input id="t_username" placeholder="Username">
<input id="t_password" placeholder="Password">
<input id="t_subject" placeholder="Subject">

<button onclick="saveTeacher()" class="btn-save" style="background:#6f42c1">
Create Teacher
</button>

</div>
</div>

<script>

function goAdmin(){
window.location.href="/admin_dashboard_school";
}

function openTeacher(){
document.getElementById("teacherModal").style.display="block";
}

function closeAll(){
document.getElementById("teacherModal").style.display="none";

/* RESET FORM */
t_full_name.value="";
t_username.value="";
t_password.value="";
t_subject.value="";
}

window.onload = loadStudents;

// LOAD STUDENTS
async function loadStudents(){
let res = await fetch("/get_students");
let data = await res.json();

let box = document.getElementById("studentsTable");
box.innerHTML="";

data.forEach(s=>{
let img = s.photo ? `/static/uploads/${s.photo}` : `https://ui-avatars.com/api/?name=${s.full_name}`;

box.innerHTML+=`
<tr>
<td><img src="${img}" class="std-img"></td>
<td>${s.full_name}</td>
<td>${s.student_id}</td>
<td>${s.class_name || '-'}</td>
<td>$${s.fee || 0}</td>
<td>
<button onclick="del('${s.student_id}')" style="background:red;color:white;border:none;padding:5px;border-radius:5px;">🗑</button>
</td>
</tr>
`;
});
}

// SAVE STUDENT
async function saveStudent(){

if(!student_id.value || !full_name.value){
alert("Fill required fields");
return;
}

let fd=new FormData();
fd.append("student_id",student_id.value);
fd.append("full_name",full_name.value);
fd.append("class_name",class_name.value);
fd.append("mother_name",mother_name.value);
fd.append("mother_phone",mother_phone.value);
fd.append("student_phone",student_phone.value);
fd.append("fee",fee.value);
fd.append("previous_school",previous_school.value);
fd.append("district",district.value);
fd.append("address",address.value);

let file=document.getElementById("photo").files[0];
if(file) fd.append("photo",file);

let res=await fetch("/add_student",{method:"POST",body:fd});
let data=await res.json();

if(data.success){
alert("✅ Student Saved");
location.reload();
}else alert(data.error);
}

// SAVE TEACHER (FIXED 🔥)
async function saveTeacher(){

if(!t_full_name.value || !t_username.value || !t_password.value){
alert("Fill all fields");
return;
}

let fd=new FormData();
fd.append("full_name",t_full_name.value);
fd.append("username",t_username.value);
fd.append("password",t_password.value);
fd.append("subject",t_subject.value);

let res=await fetch("/add_teacher",{method:"POST",body:fd});
let data=await res.json();

if(data.success){
alert("✅ Teacher Added Successfully");
closeAll();
}else{
alert(data.error);
}
}

// DELETE
async function del(id){
if(confirm("Delete?")){
let fd=new FormData();
fd.append("student_id",id);
await fetch("/delete_student_api",{method:"POST",body:fd});
loadStudents();
}
}

</script>

</body>
</html>
