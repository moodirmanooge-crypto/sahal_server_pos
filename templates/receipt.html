<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Receipt</title>
<style>
body{
    font-family: monospace;
    text-align: center;
    padding: 20px;
}
.receipt{
    max-width: 300px;
    margin: auto;
    border:1px dashed #000;
    padding:15px;
}
hr{border:dashed 1px #000;}
</style>
</head>

<body>

<div class="receipt" id="printArea">
    <h3 id="name"></h3>
    <p id="phone"></p>
    <p>Table: <span id="table"></span></p>
    <p id="time"></p>

    <hr>

    <div id="items"></div>

    <hr>

    <h3>Total: $<span id="total"></span></h3>
</div>

<br>
<button onclick="window.print()">🖨 Print</button>

<script>
async function loadReceipt(){

    let rid = "{{ rid }}";
    let table = "{{ table }}";

    let res = await fetch(`/receipt/${rid}/${table}`);
    let data = await res.json();

    document.getElementById("name").innerText = data.restaurant_name;
    document.getElementById("phone").innerText = data.phone;
    document.getElementById("table").innerText = data.table;
    document.getElementById("time").innerText = data.time;

    let itemsHTML = "";

    data.items.forEach(i=>{
        itemsHTML += `
        <div>
            ${i.food} <br>
            ${i.qty} x ${i.price} = ${i.total}
        </div>
        `;
    });

    document.getElementById("items").innerHTML = itemsHTML;
    document.getElementById("total").innerText = data.total;
}

loadReceipt();
</script>

</body>
</html>
