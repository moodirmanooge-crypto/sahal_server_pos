<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ school.school_name }}</title>

<style>
body {margin:0;font-family:'Segoe UI';background:#f5f6fa;}

.header{
background:#1e3c72;
color:white;
padding:15px;
text-align:center;
position:relative;
}

.top-actions{
position:absolute;
right:15px;
top:10px;
display:flex;
gap:10px;
}

.btn{
border:none;
padding:8px 12px;
border-radius:6px;
cursor:pointer;
color:white;
font-weight:bold;
}

.admin-btn{background:#ff9800;}
.cashier-btn{background:#00b894;}
.register-btn{background:#28a745;}
.teacher-btn{background:#6f42c1;}

.container{padding:20px;}

.card{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.search-box{
margin-bottom:10px;
display:flex;
gap:10px;
}

.table-container{
overflow:auto;
max-height:400px;
}

.table{
min-width:900px;
width:100%;
border-collapse:collapse;
}

.table th{
background:#2f4f6f;
color:white;
}

.table td, .table th{
padding:10px;
border-bottom:1px solid #eee;
text-align:center;
}

.badge{
padding:5px 10px;
border-radius:10px;
font-size:12px;
}

.paid{background:#d4edda;color:#155724;}
.unpaid{background:#f8d7da;color:#721c24;}

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
z-index:999;
}

.popup{
background:white;
width:95%;
max-width:900px;
margin:5% auto;
padding:20px;
border-radius:10px;
position:relative;
}

.close{
position:absolute;
right:10px;
top:10px;
cursor:pointer;
color:red;
}

/* Form Styles for Grid */
.form-grid {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 10px;
}
.form-grid input, .form-grid select {
padding: 10px;
border: 1px solid #ddd;
border-radius: 5px;
}
.form-full {
grid-column: span 2;
}
.btn-save {
background: #28a745;
color: white;
padding: 10px 20px;
border: none;
border-radius: 5px;
margin-top: 15px;
cursor: pointer;
width: 100%;
font-weight: bold;
}

/* Multi-class selection styles */
.class-selector {
display: flex;
flex-wrap: wrap;
gap: 8px;
margin-top: 10px;
padding: 10px;
background: #f9f9f9;
border-radius: 5px;
}
.class-item {
display: flex;
align-items: center;
gap: 5px;
background: #fff;
padding: 5px 10px;
border: 1px solid #ddd;
border-radius: 4px;
font-size: 13px;
cursor: pointer;
}
.class-item input {
cursor: pointer;
}
</style>
</head>

<body>

<div class="header">
<h2>🎓 {{ school.school_name }}</h2>
<small>ID: {{ school.school_code }}</small>

<div class="top-actions">
<button class="btn register-btn" onclick="openRegister()">➕ Register</button>
<button class="btn teacher-btn" onclick="openTeacher()">👨‍🏫 Teacher</button>
<button class="btn cashier-btn" onclick="openCashier()">💰 Cashier</button>
<button class="btn admin-btn" onclick="goAdmin()">⚙ Admin</button>
</div>
</div>

<div class="container">

<div class="card">
<h3>📊 Students</h3>

<div class="search-box">
<input id="searchStudent" placeholder="Search by ID or Name">
<button onclick="searchStudents()">Search</button>
<button onclick="loadStudents()">Reset</button>
</div>

<div class="table-container">
<table class="table">
<thead>
<tr>
<th>Name</th>
<th>ID</th>
<th>Fee</th>
<th>Paid</th>
<th>Remaining</th>
<th>Status</th>
<th>Last Paid</th>
</tr>
</thead>
<tbody id="studentsTable"></tbody>
</table>
</div>

</div>

</div>

<div class="modal" id="teacherModal">
<div class="popup">
<span class="close" onclick="closeAll()">✖</span>

<h3>👨‍🏫 Add Teacher</h3>

<input id="teacher_name" placeholder="Teacher Name" style="display:block; width:90%; margin-bottom:10px; padding:10px;">
<input id="teacher_phone" placeholder="Phone" style="display:block; width:90%; margin-bottom:10px; padding:10px;">
<input id="teacher_username" placeholder="Username" style="display:block; width:90%; margin-bottom:10px; padding:10px;">
<input id="teacher_password" placeholder="Password" style="display:block; width:90%; margin-bottom:10px; padding:10px;">

<label style="font-weight: bold; margin-left: 5px;">Select Classes:</label>
<div class="class-selector" id="teacher_classes_list">
    <label class="class-item"><input type="checkbox" value="G1"> G1</label>
    <label class="class-item"><input type="checkbox" value="G2"> G2</label>
    <label class="class-item"><input type="checkbox" value="G3"> G3</label>
    <label class="class-item"><input type="checkbox" value="G4"> G4</label>
    <label class="class-item"><input type="checkbox" value="G5"> G5</label>
    <label class="class-item"><input type="checkbox" value="G6"> G6</label>
    <label class="class-item"><input type="checkbox" value="G7"> G7</label>
    <label class="class-item"><input type="checkbox" value="G8"> G8</label>
    <label class="class-item"><input type="checkbox" value="F1"> F1</label>
    <label class="class-item"><input type="checkbox" value="F2"> F2</label>
    <label class="class-item"><input type="checkbox" value="F3"> F3</label>
    <label class="class-item"><input type="checkbox" value="F4"> F4</label>
</div>

<button onclick="saveTeacher()" class="btn-save">💾 Save Teacher</button>

</div>
</div>

<div class="modal" id="registerModal">
<div class="popup">
<span class="close" onclick="closeAll()">✖</span>

<h3>📋 Student Registration</h3>

<div class="form-grid">

<input id="student_id" placeholder="Student ID">
<input id="full_name" placeholder="Full Name">

<select id="class_name">
<option value="">Select Class</option>
<option>G1</option><option>G2</option><option>G3</option>
<option>G4</option><option>G5</option><option>G6</option>
<option>G7</option><option>G8</option>
<option>F1</option><option>F2</option><option>F3</option><option>F4</option>
</select>

<input id="fee" placeholder="Monthly Fee">

<input id="mother_phone" placeholder="Parent Phone">
<input id="student_phone" placeholder="Student Phone">

<select id="orphan">
<option value="no">Not Orphan</option>
<option value="yes">Orphan</option>
</select>

<input id="previous_school" placeholder="Previous School">
<input id="district" placeholder="District">

<input id="parent_password" placeholder="Parent Password (default 1234)">

<div class="form-full">
<input type="file" id="photo">
</div>

</div>

<button onclick="saveStudent()" class="btn-save">💾 Register Student</button>

</div>
</div>

<div class="modal" id="cashierModal">
<div class="popup">
<span class="close" onclick="closeAll()">✖</span>

<h3>💰 Cashier Panel</h3>

<div class="search-box">
<input id="searchInput" placeholder="Search Student ID">
<button onclick="searchCashier()">Search</button>
<button onclick="loadCashier()">Reset</button>
</div>

<div class="table-container">
<table class="table">
<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Fee</th>
<th>Pay</th>
<th>Save</th>
<th>Remaining</th>
<th>Status</th>
<th>Last Paid</th>
</tr>
</thead>
<tbody id="cashierTable"></tbody>
</table>
</div>

</div>
</div>

<script>

function goAdmin(){window.location.href="/admin_dashboard_school";}

function openRegister(){document.getElementById("registerModal").style.display="block";}
function openTeacher(){document.getElementById("teacherModal").style.display="block";}
function openCashier(){
document.getElementById("cashierModal").style.display="block";
loadCashier();
}

function closeAll(){
document.getElementById("registerModal").style.display="none";
document.getElementById("teacherModal").style.display="none";
document.getElementById("cashierModal").style.display="none";
}

window.onload = loadStudents;

// STUDENTS
let allStudents=[];

async function loadStudents(){
let res=await fetch("/get_students");
let data=await res.json();
allStudents=data;
renderStudents(data);
}

function renderStudents(data){
let box=document.getElementById("studentsTable");
box.innerHTML="";

data.forEach(s=>{
let fee=s.fee||0;
let paid=s.paid||0;
let remaining=s.remaining ?? (fee-paid);
let status=remaining<=0?"paid":"unpaid";

box.innerHTML+=`
<tr>
<td>${s.full_name}</td>
<td>${s.student_id}</td>
<td>$${fee}</td>
<td>$${paid}</td>
<td>$${remaining}</td>
<td><span class="badge ${status}">${status}</span></td>
<td>${s.last_paid||'-'}</td>
</tr>`;
});
}

// SEARCH
function searchStudents(){
let q=document.getElementById("searchStudent").value.toLowerCase();
renderStudents(allStudents.filter(s=>s.student_id.includes(q)||s.full_name.toLowerCase().includes(q)));
}

// CASHIER
async function loadCashier(){
let res=await fetch("/get_students");
let data=await res.json();
renderCashier(data);
}

function renderCashier(data){
let box=document.getElementById("cashierTable");
box.innerHTML="";

data.forEach(s=>{
let fee=s.fee||0;
let paid=s.paid||0;
let remaining=s.remaining ?? (fee-paid);
let status=remaining<=0?"paid":"unpaid";

box.innerHTML+=`
<tr>
<td>${s.student_id}</td>
<td>${s.full_name}</td>
<td>$${fee}</td>
<td><input type="number" id="pay_${s.student_id}"></td>
<td><button onclick="pay('${s.student_id}')">Save</button></td>
<td id="rem_${s.student_id}">$${remaining}</td>
<td id="stat_${s.student_id}"><span class="badge ${status}">${status}</span></td>
<td id="date_${s.student_id}">${s.last_paid||'-'}</td>
</tr>`;
});
}

// PAY
async function pay(id){
let amount=document.getElementById("pay_"+id).value;

let fd=new FormData();
fd.append("student_id",id);
fd.append("amount",amount);

let res=await fetch("/pay_fee",{method:"POST",body:fd});
let data=await res.json();

if(data.success){
document.getElementById("rem_"+id).innerText="$"+data.remaining;
document.getElementById("stat_"+id).innerHTML=`<span class="badge ${data.status}">${data.status}</span>`;
document.getElementById("date_"+id).innerText=data.date;
loadStudents();
}
}

// ✅ 3. FIX SAVE STUDENT (UPDATED)
async function saveStudent(){
let fd=new FormData();

fd.append("student_id",student_id.value);
fd.append("full_name",full_name.value);
fd.append("class_name",class_name.value);
fd.append("fee",fee.value);
fd.append("mother_phone",mother_phone.value);
fd.append("student_phone",student_phone.value);
fd.append("orphan",orphan.value);
fd.append("previous_school",previous_school.value);
fd.append("district",district.value);
fd.append("parent_password",parent_password.value);

let file = photo.files;
if(file) fd.append("photo",file);

let res=await fetch("/add_student",{method:"POST",body:fd});
let data=await res.json();

if(data.success){
alert("✅ Student Registered");
closeAll();
loadStudents();
}else{
alert(data.error);
}
}

// ✅ 4. SAVE TEACHER (UPDATED FOR MULTIPLE CLASSES)
async function saveTeacher(){
let fd=new FormData();

fd.append("name",teacher_name.value);
fd.append("phone",teacher_phone.value);
fd.append("username",teacher_username.value);
fd.append("password",teacher_password.value);

// Ururi fasalada la doortay
let selectedClasses = [];
let checkboxes = document.querySelectorAll('#teacher_classes_list input[type="checkbox"]:checked');
checkboxes.forEach((checkbox) => {
    selectedClasses.push(checkbox.value);
});

// Ku dar fasalada (Sida string comma-separated ah ama json)
fd.append("assigned_classes", JSON.stringify(selectedClasses));

let res=await fetch("/add_teacher",{method:"POST",body:fd});
let data=await res.json();

if(data.success){
alert("✅ Teacher Added with classes: " + selectedClasses.join(", "));
closeAll();
}else{
alert(data.error);
}
}

</script>

</body>
</html>
