<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Students Dashboard</title>

<style>
body { margin:0; font-family:Arial; background:#f5f6fa; }

.header {
    background:#1e3c72;
    color:white;
    padding:15px;
    text-align:center;
}

/* BUTTONS */
.fab, .fab2 {
    position:fixed;
    bottom:20px;
    width:60px;
    height:60px;
    border-radius:50%;
    border:none;
    color:white;
    font-size:22px;
}
.fab { right:20px; background:#28a745; }
.fab2 { right:90px; background:#007bff; }

/* ADD POPUP */
.modal {
    display:none;
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
}

.popup {
    background:white;
    width:90%;
    max-width:400px;
    margin:5% auto;
    padding:20px;
    border-radius:10px;
    position:relative;
}

.close {
    position:absolute;
    top:10px;
    right:15px;
    cursor:pointer;
}

/* BOTTOM SHEET */
.sheet {
    position:fixed;
    bottom:-100%;
    left:0;
    width:100%;
    height:80%;
    background:white;
    border-radius:20px 20px 0 0;
    transition:0.3s;
    overflow:auto;
}

.sheet.active {
    bottom:0;
}

.drag {
    width:50px;
    height:5px;
    background:#ccc;
    margin:10px auto;
    border-radius:5px;
}

/* CARD */
.card {
    background:#f9f9f9;
    margin:10px;
    padding:10px;
    border-radius:10px;
}

/* INPUT */
input, select {
    width:100%;
    padding:10px;
    margin-top:10px;
}

button {
    width:100%;
    padding:10px;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="header">
<h2>🎓 Students Dashboard</h2>
</div>

<!-- BUTTONS -->
<button class="fab" onclick="openAdd()">+</button>
<button class="fab2" onclick="openSheet()">📋</button>

<!-- ADD POPUP -->
<div class="modal" id="addModal">
<div class="popup">

<div class="close" onclick="closeAll()">✖</div>

<h3>Add Student</h3>

<input id="student_id" placeholder="ID">
<input id="full_name" placeholder="Name">

<select id="gender">
<option>Male</option>
<option>Female</option>
</select>

<input id="mother_name" placeholder="Mother">
<input id="student_phone" placeholder="Phone">
<input type="file" id="photo">
<input id="mother_phone" placeholder="Mother Phone">
<input id="fee" placeholder="Fee">

<button onclick="saveStudent()">Save</button>

</div>
</div>

<!-- BOTTOM SHEET -->
<div class="sheet" id="sheet">

<div class="drag"></div>

<div id="studentsBox"></div>

</div>

<script>

let startY = 0;

// OPEN ADD
function openAdd(){
    addModal.style.display="block";
}

// OPEN SHEET
async function openSheet(){
    let sheet = document.getElementById("sheet");
    sheet.classList.add("active");

    let res = await fetch("/get_students");
    let data = await res.json();

    let box = document.getElementById("studentsBox");
    box.innerHTML="";

    data.forEach(s=>{
        box.innerHTML += `
        <div class="card">
            <h3>${s.full_name}</h3>
            <p>ID: ${s.student_id}</p>
            <p>${s.gender}</p>
            <p>$${s.fee}</p>

            <button onclick="edit('${s.student_id}')">Edit</button>
            <button onclick="del('${s.student_id}')" style="background:red;color:white;">Delete</button>
        </div>`;
    });
}

// CLOSE
function closeAll(){
    addModal.style.display="none";
    document.getElementById("sheet").classList.remove("active");
}

// SAVE
async function saveStudent(){
    let fd = new FormData();

    fd.append("student_id", student_id.value);
    fd.append("full_name", full_name.value);
    fd.append("gender", gender.value);
    fd.append("mother_name", mother_name.value);
    fd.append("student_phone", student_phone.value);
    fd.append("mother_phone", mother_phone.value);
    fd.append("fee", fee.value);
    fd.append("photo", photo.files[0]);

    await fetch("/add_student",{method:"POST", body:fd});

    closeAll();
}

// DELETE
async function del(id){
    let fd = new FormData();
    fd.append("student_id", id);

    await fetch("/delete_student",{method:"POST", body:fd});
    openSheet();
}

// EDIT (auto fill)
async function edit(id){
    let res = await fetch("/get_students");
    let data = await res.json();

    let s = data.find(x=>x.student_id==id);

    openAdd();

    student_id.value = s.student_id;
    full_name.value = s.full_name;
    gender.value = s.gender;
    mother_name.value = s.mother_name;
    student_phone.value = s.student_phone;
    mother_phone.value = s.mother_phone;
    fee.value = s.fee;
}

// DRAG CLOSE (MOBILE STYLE)
let sheet = document.getElementById("sheet");

sheet.addEventListener("touchstart", e=>{
    startY = e.touches[0].clientY;
});

sheet.addEventListener("touchmove", e=>{
    let move = e.touches[0].clientY;
    if(move - startY > 100){
        sheet.classList.remove("active");
    }
});

</script>

</body>
</html>
