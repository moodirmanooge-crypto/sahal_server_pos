<!DOCTYPE html>
<html>
<head>
    <title>Student Screen</title>
    <style>
        body{
            font-family:Arial;
            background:#eef3f8;
            padding:20px;
        }

        .box{
            max-width:600px;
            margin:auto;
            background:white;
            padding:25px;
            border-radius:15px;
        }

        input,button{
            width:100%;
            padding:12px;
            margin-top:10px;
        }

        .student-card{
            margin-top:20px;
            background:#f5f5f5;
            padding:20px;
            border-radius:10px;
        }
    </style>
</head>
<body>

<div class="box">
    <h1>📋 Student Screen</h1>

    <form method="POST">
        <input name="student_id" placeholder="Search Student ID" required>
        <button>Search</button>
    </form>

    {% if student %}
    <div class="student-card">
        <h2>{{ student[1] }}</h2>
        <p>ID: {{ student[0] }}</p>
        <p>Phone: {{ student[2] }}</p>
        <p>Department: {{ student[3] }}</p>
        <p>Semester: {{ student[4] }}</p>
    </div>
    {% endif %}
</div>

</body>
</html>
