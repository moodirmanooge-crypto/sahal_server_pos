<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sahal POS</title>

<style>
body{font-family:Arial;margin:10px;background:#f5f5f5;}
h1{text-align:center;}

.menu-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
gap:15px;
}

.card{
background:white;
border-radius:10px;
padding:10px;
box-shadow:0 0 5px rgba(0,0,0,0.2);
text-align:center;
}

.card img{
width:100%;
height:120px;
object-fit:cover;
border-radius:8px;
}

button{
padding:7px;
border:none;
background:#0a7cff;
color:white;
border-radius:6px;
cursor:pointer;
margin:2px;
}

.cart{
margin-top:25px;
background:white;
padding:10px;
border-radius:10px;
box-shadow:0 0 5px rgba(0,0,0,0.2);
}

.select-box{
margin-top:8px;
padding:6px;
width:100%;
}

.qty-btn{background:green;}
.qty-btn.minus{background:orange;}
.remove-btn{background:red;}
</style>
</head>

<body>

<h2 style="text-align:center;color:#555;">SAHAL SERVER POS</h2>
<h1>{{name}}</h1>
<h3 style="text-align:center">Table {{table}}</h3>

<!-- MENU -->
<div class="menu-grid">
{% for f in food %}
<div class="card">

<img src="/static/uploads/{{f[4]}}">
<h3 class="food-name">{{f[2]}}</h3>
<p>$ {{f[3]}}</p>

<select class="select-box" id="opt{{loop.index}}">
<option value="">-- Option --</option>
</select>

<button onclick="addItem('{{f[2]}}','{{f[3]}}','opt{{loop.index}}')">Add</button>

</div>
{% endfor %}
</div>

<!-- CART -->
<div class="cart">
<h2>Cart</h2>
<ul id="cartList"></ul>
<h3>Total: $<span id="total">0.00</span></h3>

<h3>Payment:</h3>
<p>{{payment}}</p>

<button onclick="sendOrder()">Send Order</button>
</div>

<!-- STATUS -->
<div class="cart">
<h2>Status</h2>
<p id="status">Waiting...</p>
</div>

<script>
const RID="{{rid}}";
const TABLE="{{table}}";

let cart=[];
let total=0;

const cartList=document.getElementById("cartList");
const totalEl=document.getElementById("total");

/* OPTIONS AUTO */
window.onload=function(){
document.querySelectorAll(".card").forEach(card=>{
let name=card.querySelector(".food-name").innerText.toLowerCase();
let select=card.querySelector("select");

if(name.includes("tea")||name.includes("coffee")){
select.innerHTML+=`<option>Sugar</option><option>No Sugar</option>`;
}
else if(name.includes("juice")||name.includes("cola")){
select.innerHTML+=`<option>Ice</option><option>No Ice</option>`;
}
else{
select.innerHTML+=`<option>Spicy</option><option>No Spicy</option>`;
}
});
};

/* ADD ITEM */
function addItem(name,price,optId){
price=parseFloat(price) || 0;

let opt=document.getElementById(optId).value;
let finalName=opt?name+" ("+opt+")":name;

let existing=cart.find(i=>i.name===finalName);

if(existing){
existing.qty+=1;
}else{
cart.push({
name:finalName,
price:price,
qty:1
});
}

total+=price;
renderCart();
}

/* RENDER CART */
function renderCart(){
let html="";

cart.forEach((item,i)=>{
html+=`
<li>
${item.qty}x ${item.name} - $${(item.price*item.qty).toFixed(2)}
<button class="qty-btn" onclick="increase(${i})">+</button>
<button class="qty-btn minus" onclick="decrease(${i})">-</button>
<button class="remove-btn" onclick="removeItem(${i})">X</button>
</li>`;
});

cartList.innerHTML=html;
totalEl.innerText=total.toFixed(2);
}

/* INCREASE */
function increase(i){
cart[i].qty++;
total+=cart[i].price;
renderCart();
}

/* DECREASE */
function decrease(i){
if(cart[i].qty>1){
cart[i].qty--;
total-=cart[i].price;
}else{
total-=cart[i].price;
cart.splice(i,1);
}
renderCart();
}

/* REMOVE */
function removeItem(i){
total-=cart[i].price*cart[i].qty;
cart.splice(i,1);
renderCart();
}

/* SEND ORDER + AUTO RECEIPT */
async function sendOrder(){

if(cart.length==0){
alert("Cart empty");
return;
}

try{
let res = await fetch("/order/"+RID,{
method:"POST",
headers:{"Content-Type":"application/json"},
body: JSON.stringify({
table: TABLE,
cart: cart
})
});

let data = await res.json();

if(data.error){
alert("Error: " + data.error);
return;
}

document.getElementById("status").innerHTML="⏳ Pending...";

cart=[];
total=0;
renderCart();

/* 🔥 AUTO OPEN RECEIPT */
setTimeout(()=>{
window.location.href=`/receipt_view/${RID}/${TABLE}`;
},800);

}catch(err){
alert("Network error ❌");
console.log(err);
}

}
</script>

</body>
</html>
