<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ school.school_name }}</title>

<style>
body {margin:0;font-family:'Segoe UI';background:#f5f6fa;}

.header{
background:#1e3c72;
color:white;
padding:15px;
text-align:center;
position:relative;
}

.top-actions{
position:absolute;
right:15px;
top:10px;
display:flex;
gap:10px;
}

.btn{
border:none;
padding:8px 12px;
border-radius:6px;
cursor:pointer;
color:white;
font-weight:bold;
}

.admin-btn{background:#ff9800;}
.teacher-btn{background:#6f42c1;}
.cashier-btn{background:#00b894;}

.container{padding:20px;}

.card{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

input,select{
width:100%;
padding:8px;
border:1px solid #ddd;
border-radius:6px;
font-size:13px;
}

.btn-save{
background:#28a745;
color:white;
padding:10px;
border:none;
width:100%;
margin-top:10px;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

.table{
width:100%;
border-collapse:collapse;
}

.table th{
background:#2f4f6f;
color:white;
}

.table td, .table th{
padding:10px;
border-bottom:1px solid #eee;
text-align:center;
}

.std-img{
width:50px;
height:50px;
border-radius:50%;
object-fit:cover;
}

.badge{
padding:5px 10px;
border-radius:10px;
font-size:12px;
}

.paid{background:#d4edda;color:#155724;}
.unpaid{background:#f8d7da;color:#721c24;}

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
z-index:999;
}

.popup{
background:white;
width:95%;
max-width:700px;
margin:5% auto;
padding:20px;
border-radius:10px;
position:relative;
}

.close{
position:absolute;
right:10px;
top:10px;
cursor:pointer;
color:red;
}
</style>
</head>

<body>

<div class="header">
<h2>🎓 {{ school.school_name }}</h2>
<small>ID: {{ school.school_code }}</small>

<div class="top-actions">
<button class="btn teacher-btn">👨‍🏫 Teacher</button>
<button class="btn cashier-btn" onclick="openCashier()">💰 Cashier</button>
<button class="btn admin-btn" onclick="goAdmin()">⚙ Admin</button>
</div>
</div>

<div class="container">

<div class="card">
<h3>📊 Students</h3>

<table class="table">
<thead>
<tr>
<th>Name</th>
<th>ID</th>
<th>Fee</th>
<th>Status</th>
</tr>
</thead>
<tbody id="studentsTable"></tbody>
</table>

</div>

</div>

<!-- CASHIER MODAL -->
<div class="modal" id="cashierModal">
<div class="popup">
<span class="close" onclick="closeAll()">✖</span>
<h3>💰 Cashier Panel</h3>

<!-- 🔍 CASHIER SEARCH -->
<div style="margin-bottom:10px;">
<input id="cashierSearch" placeholder="🔍 Search Student ID">
<button onclick="searchCashier()" style="padding:8px;background:#3498db;color:white;border:none;border-radius:6px;">Search</button>
<button onclick="loadCashier()" style="padding:8px;background:#777;color:white;border:none;border-radius:6px;">Reset</button>
</div>

<table class="table">
<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Fee</th>
<th>Status</th>
</tr>
</thead>
<tbody id="cashierTable"></tbody>
</table>

</div>
</div>

<script>

function goAdmin(){
window.location.href="/admin_dashboard_school";
}

function openCashier(){
document.getElementById("cashierModal").style.display="block";
loadCashier();
}

function closeAll(){
document.getElementById("cashierModal").style.display="none";
}

window.onload = loadStudents;

// LOAD STUDENTS
async function loadStudents(){
let res = await fetch("/get_students");
let data = await res.json();

let box = document.getElementById("studentsTable");
box.innerHTML="";

data.forEach(s=>{
box.innerHTML+=`
<tr>
<td>${s.full_name}</td>
<td>${s.student_id}</td>
<td>$${s.fee || 0}</td>
<td><span class="badge ${s.status=='paid'?'paid':'unpaid'}">${s.status || 'unpaid'}</span></td>
</tr>
`;
});
}

// CASHIER LOAD
async function loadCashier(){
let res = await fetch("/get_students");
let data = await res.json();
renderCashier(data);
}

// 🔥 RENDER CASHIER
function renderCashier(data){
let box = document.getElementById("cashierTable");
box.innerHTML="";

data.forEach(s=>{
box.innerHTML+=`
<tr>
<td>${s.student_id}</td>
<td>${s.full_name}</td>
<td>$${s.fee || 0}</td>
<td>
<select onchange="updateStatus('${s.student_id}', this.value)">
<option value="unpaid" ${s.status!='paid'?'selected':''}>Unpaid</option>
<option value="paid" ${s.status=='paid'?'selected':''}>Paid</option>
</select>
</td>
</tr>
`;
});
}

// 🔍 CASHIER SEARCH
async function searchCashier(){

let id = document.getElementById("cashierSearch").value.trim();

if(!id){
loadCashier();
return;
}

let res = await fetch("/get_students");
let data = await res.json();

let filtered = data.filter(s => s.student_id == id);

if(filtered.length === 0){
alert("❌ Student not found");
return;
}

renderCashier(filtered);
}

// UPDATE STATUS
async function updateStatus(id,status){
let fd=new FormData();
fd.append("student_id",id);
fd.append("status",status);

await fetch("/update_fee_status",{method:"POST",body:fd});
loadStudents();
}

// DELETE
async function del(id){
if(confirm("Delete?")){
let fd=new FormData();
fd.append("student_id",id);
await fetch("/delete_student_api",{method:"POST",body:fd});
loadStudents();
}
}

</script>

</body>
</html>
