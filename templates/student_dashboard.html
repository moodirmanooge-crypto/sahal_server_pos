<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ school.school_name }}</title>

<style>
body {margin:0;font-family:'Segoe UI';background:#f5f6fa;}

.header{
background:#1e3c72;
color:white;
padding:15px;
text-align:center;
position:relative;
}

.top-actions{
position:absolute;
right:15px;
top:10px;
display:flex;
gap:10px;
}

.btn{
border:none;
padding:8px 12px;
border-radius:6px;
cursor:pointer;
color:white;
font-weight:bold;
}

.admin-btn{background:#ff9800;}
.cashier-btn{background:#00b894;}
.register-btn{background:#28a745;}
.teacher-btn{background:#6f42c1;}

.container{padding:20px;}

.card{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.search-box{
margin-bottom:10px;
display:flex; gap:10px;
}

.table-container{
overflow:auto;
max-height:500px;
}

.table{
min-width:900px;
width:100%;
border-collapse:collapse;
}

.table th{
background:#2f4f6f;
color:white;
position: sticky;
top: 0;
}

.table td, .table th{
padding:10px;
border-bottom:1px solid #eee;
text-align:center;
}

.badge{
padding:5px 10px;
border-radius:10px;
font-size:12px;
}

.paid{background:#d4edda;color:#155724;}
.unpaid{background:#f8d7da;color:#721c24;}

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
z-index:999;
}

.popup{
background:white;
width:98%;
max-width:1100px;
margin:2% auto;
padding:20px;
border-radius:10px;
position:relative;
max-height: 90vh;
overflow-y: auto;
}

.close{
position:absolute;
right:10px;
top:10px;
cursor:pointer;
color:red;
font-size: 20px;
}

.form-grid {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 10px;
}
.form-grid input, .form-grid select {
padding: 10px;
border: 1px solid #ddd;
border-radius: 5px;
}
.form-full { grid-column: span 2; }

.btn-save {
background: #28a745;
color: white;
padding: 12px;
border: none;
border-radius: 5px;
margin-top: 15px;
cursor: pointer;
width: 100%;
font-weight: bold;
font-size: 16px;
}

.class-selector {
display: flex;
flex-wrap: wrap;
gap: 8px;
margin-top: 10px;
padding: 10px;
background: #f9f9f9;
border-radius: 5px;
border: 1px solid #eee;
}
.class-item {
display: flex;
align-items: center;
gap: 5px;
background: #fff;
padding: 5px 10px;
border: 1px solid #ddd;
border-radius: 4px;
font-size: 13px;
cursor: pointer;
}

.student-img {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    object-fit: cover;
    border: 1px solid #1e3c72;
}
</style>
</head>

<body>

<div class="header">
    <h2>🎓 {{ school.school_name }}</h2>
    <p id="todayDate"></p>
    <small>School Code: {{ school.school_code }}</small>

    <div class="top-actions">
        <button class="btn register-btn" onclick="openRegister()">➕ Register</button>
        <button class="btn teacher-btn" onclick="openTeacher()">👨‍🏫 Teacher</button>
        <button class="btn cashier-btn" onclick="openCashier()">💰 Cashier</button>
        <button class="btn admin-btn" onclick="goAdmin()">⚙ Admin</button>
    </div>
</div>

<div class="container">
<div class="card">
<h3>📊 Students List</h3>

<div class="search-box">
<input type="text" id="searchStudent" placeholder="Search by ID or Name" style="flex:1;padding:10px;">
<button class="btn" style="background:#1e3c72;" onclick="searchStudents()">Search</button>
<button class="btn" style="background:#6c757d;" onclick="loadStudents()">Reset</button>
</div>

<div class="table-container">
<table class="table">
<thead>
<tr>
<th>Photo</th>
<th>Name</th>
<th>ID</th>
<th>Class</th>
<th>Monthly Fee</th>
<th>Remaining</th>
<th>Status</th>
<th>Last Paid</th>
</tr>
</thead>
<tbody id="studentsTable"></tbody>
</table>
</div>

</div>
</div>

<script>
document.getElementById('todayDate').innerText = new Date().toLocaleDateString();

let allStudents=[];

window.onload=loadStudents;

async function loadStudents(){
let res=await fetch("/get_students");
allStudents=await res.json();
renderStudents(allStudents);
}

function renderStudents(data){
let box=document.getElementById("studentsTable");
box.innerHTML="";

data.forEach(s=>{
let fee=parseFloat(s.fee)||0;
let paid=parseFloat(s.paid)||0;
let remaining=fee-paid;
let status=remaining<=0?"paid":"unpaid";

let photo=s.photo?'/static/uploads/'+s.photo:'https://ui-avatars.com/api/?name='+s.full_name;

box.innerHTML+=`
<tr>
<td><img src="${photo}" class="student-img"></td>
<td>${s.full_name}</td>
<td>${s.student_id}</td>
<td>${s.class_name}</td>
<td>$${fee}</td>
<td>$${remaining}</td>
<td><span class="badge ${status}">${status}</span></td>
<td>${s.last_paid||'-'}</td>
</tr>`;
});
}

/* 🔐 PASSWORD PROTECTION */
async function checkPass(type){
let pass=prompt("Enter "+type+" password");
let res=await fetch(`/check_panel_password?type=${type}&pass=${pass}`);
let data=await res.json();
return data.success;
}

async function openTeacher(){
if(await checkPass("teacher")){
alert("Teacher Access Granted");
}else{alert("Wrong Password");}
}

async function openCashier(){
if(await checkPass("cashier")){
alert("Cashier Access Granted");
}else{alert("Wrong Password");}
}

async function goAdmin(){
if(await checkPass("admin")){
window.location="/admin_dashboard_school";
}else{alert("Wrong Password");}
}

function openRegister(){
document.getElementById("registerModal").style.display="block";
}

function searchStudents(){
let q=document.getElementById("searchStudent").value.toLowerCase();
renderStudents(allStudents.filter(s=>s.full_name.toLowerCase().includes(q)||s.student_id.toString().includes(q)));
}
</script>

</body>
</html>
