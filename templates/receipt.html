<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Receipt</title>

<style>
body{
    font-family: monospace;
    text-align:center;
    padding:20px;
}

.receipt{
    width:300px;
    margin:auto;
    border:1px dashed #000;
    padding:15px;
}

hr{border:dashed 1px #000;}

.row{
    display:flex;
    justify-content:space-between;
    font-size:13px;
}

.center{text-align:center;}
.bold{font-weight:bold;}
</style>
</head>

<body>

<div class="receipt" id="printArea">

    <h3 id="name">Restaurant</h3>
    <p id="phone"></p>

    <p id="ref"></p>

    <p class="center bold">SALES INVOICE</p>
    <p>Table: <span id="table"></span></p>
    <p id="time"></p>

    <hr>

    <div class="row bold">
        <span>Item</span>
        <span>Qty</span>
        <span>Rate</span>
        <span>Amount</span>
    </div>

    <hr>

    <div id="items"></div>

    <hr>

    <div class="row">
        <span>Subtotal</span>
        <span id="subtotal"></span>
    </div>

    <div class="row">
        <span>VAT</span>
        <span id="vat"></span>
    </div>

    <div class="row bold">
        <span>Grand Total</span>
        <span id="total"></span>
    </div>

    <hr>

    <p id="payment"></p>

    <p style="font-size:11px;">Powered by Sahal Server</p>

</div>

<br>
<button onclick="window.print()">🖨 Print</button>

<script>
async function loadReceipt(){

    let rid = "{{ rid }}";
    let table = "{{ table }}";

    let res = await fetch(`/receipt/${rid}/${table}`);
    let data = await res.json();

    document.getElementById("name").innerText = data.restaurant_name || "Restaurant";
    document.getElementById("phone").innerText = data.phone || "";
    document.getElementById("table").innerText = data.table || "";
    document.getElementById("time").innerText = data.time || "";
    document.getElementById("payment").innerText = data.payment || "";
    document.getElementById("ref").innerText = "Ref: " + (data.ref || "");

    let itemsHTML = "";

    data.items.forEach(i=>{
        itemsHTML += `
        <div class="row">
            <span>${i.food}</span>
            <span>${i.qty}</span>
            <span>$${i.price}</span>
            <span>$${i.total}</span>
        </div>`;
    });

    document.getElementById("items").innerHTML = itemsHTML;
    document.getElementById("subtotal").innerText = "$" + (data.subtotal || 0);
    document.getElementById("vat").innerText = "$" + (data.vat || 0);
    document.getElementById("total").innerText = "$" + (data.total || 0);

    // 🔥 AUTO PRINT
    setTimeout(()=>{
        window.print();
    },1000);
}

loadReceipt();
</script>>

</body>
</html>
