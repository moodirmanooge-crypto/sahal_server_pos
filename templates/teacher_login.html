<!DOCTYPE html>
<html>
<head>
<title>Teacher Login</title>

<style>
body{
font-family:Segoe UI;
background:#1e3c72;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.box{
background:white;
padding:25px;
border-radius:12px;
width:320px;
text-align:center;
}

input{
width:100%;
padding:10px;
margin:6px 0;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:100%;
padding:10px;
background:#6f42c1;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

.error{
color:red;
margin-top:10px;
}
</style>
</head>

<body>

<div class="box">

<h3>👨‍🏫 Teacher Login</h3>

<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<p class="error" id="err"></p>

</div>

<script>

async function login(){

let fd=new FormData();
fd.append("username",username.value);
fd.append("password",password.value);

try{

let res=await fetch("/teacher_login",{method:"POST",body:fd});
let data=await res.json();

if(data.success){
window.location="/teacher_dashboard";
}else{
err.innerText=data.error;
}

}catch(e){
err.innerText="Server error";
}

}

</script>

</body>
</html>
