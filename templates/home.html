<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sahal Server POS</title>

    <style>
        body{
            margin:0;
            font-family:Arial, sans-serif;
            background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
            color:white;
            min-height:100vh;
        }

        .container{
            max-width:900px;
            margin:40px auto;
            padding:20px;
        }

        .logo{
            width:130px;
            display:block;
            margin:0 auto 15px;
        }

        h1{
            text-align:center;
            margin-bottom:30px;
            font-size:34px;
        }

        .card{
            background:white;
            color:black;
            padding:25px;
            border-radius:18px;
            box-shadow:0 0 15px rgba(0,0,0,0.25);
        }

        .links a{
            display:block;
            padding:16px;
            margin:12px 0;
            text-decoration:none;
            border-radius:10px;
            text-align:center;
            font-weight:bold;
            color:white;
            font-size:17px;
        }

        .login{ background:#007bff; }
        .admin{ background:#dc3545; }
        .kitchen{ background:#6f42c1; }
    </style>
</head>
<body>

<div class="container">
    <img src="{{ url_for('static', filename='logo.png') }}" class="logo">

    <h1>🍽️ Sahal Server POS</h1>

    <div class="card links">
        <a href="/login" class="login">🔐 Restaurant Login</a>
        <a href="/supermarket_login" class="login">🏪 Supermarket Login</a>
        <a href="/admin" class="admin">🛠️ System Admin</a>
        <a href="/kitchen/1" class="kitchen">👨‍🍳 Kitchen Screen</a>
    </div>
</div>

</body>
</html>
