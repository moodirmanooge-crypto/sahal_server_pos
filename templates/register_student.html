<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Future Leader Academy (Registration)</title>

    <style>
        body{
            font-family:Arial, sans-serif;
            background:#f4f6f9;
            padding:20px;
            margin:0;
        }

        .container{
            max-width:500px;
            margin:auto;
            background:white;
            padding:25px;
            border-radius:15px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
            margin-top:40px;
        }

        h1{
            text-align:center;
            color:#0a7cff;
            margin-bottom:25px;
            font-size:34px;
        }

        input, button{
            width:100%;
            padding:12px;
            margin-top:12px;
            border-radius:8px;
            border:1px solid #ddd;
            box-sizing:border-box;
            font-size:16px;
        }

        input[readonly]{
            background:#f1f1f1;
        }

        button{
            background:#0a7cff;
            color:white;
            border:none;
            font-weight:bold;
            cursor:pointer;
        }

        button:hover{
            opacity:0.95;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🎓 Future Leader Academy (Registration)</h1>

    <form method="POST">
        <input name="student_id" placeholder="Student ID" required>
        <input name="full_name" placeholder="Full Name" required>
        <input name="phone_number" placeholder="Phone Number" required>

        <input name="department" value="SNTVITY-SUPLEMMENT" readonly>

        <input name="student_class" placeholder="Class (Example F4)" required>

        <button type="submit">Register Student</button>
    </form>
</div>

</body>
</html>
