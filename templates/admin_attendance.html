<!DOCTYPE html>
<html>
<head>
<title>Attendance PRO</title>

<style>
body{font-family:Segoe UI;background:#f4f6f9;margin:0;}

.header{
background:#2c3e50;
color:white;
padding:15px;
text-align:center;
}

.container{padding:20px;}

.filters{
display:flex;
gap:10px;
margin-bottom:15px;
}

input,select{
padding:8px;
border-radius:6px;
border:1px solid #ddd;
}

.card{
background:white;
border-radius:10px;
margin-bottom:15px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
overflow:hidden;
}

.title{
background:#34495e;
color:white;
padding:10px;
}

.table{
width:100%;
border-collapse:collapse;
}

.table th{
background:#2c3e50;
color:white;
padding:10px;
}

.table td{
padding:10px;
border-bottom:1px solid #eee;
text-align:center;
}
</style>
</head>

<body>

<div class="header">
<h2>📊 Attendance PRO Dashboard</h2>
</div>

<div class="container">

<!-- FILTERS -->
<form method="get" class="filters">

<input type="text" name="subject" placeholder="Search Subject"
value="{{ selected_subject or '' }}">

<select name="class">
<option value="">All Classes</option>
<option>G1</option><option>G2</option><option>G3</option>
<option>G4</option><option>G5</option><option>G6</option>
<option>G7</option><option>G8</option><option>G9</option>
<option>F1</option><option>F2</option><option>F3</option><option>F4</option>
</select>

<button type="submit">🔍 Search</button>

</form>

<!-- GROUP BY SUBJECT -->
{% for a in data %}

<div class="card">

<div class="title">
{{ a.subject }} | {{ a.class }} | {{ a.teacher }}
</div>

<table class="table">

<tr>
<th>ID</th>
<th>Name</th>
<th>Date</th>
<th>Status</th>
</tr>

<tr>
<td>{{ a.student_id }}</td>
<td>{{ a.name }}</td>
<td>{{ a.date }}</td>
<td>{{ a.status }}</td>
</tr>

</table>

</div>

{% endfor %}

</div>

</body>
</html>
