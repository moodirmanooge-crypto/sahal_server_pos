<!DOCTYPE html>
<html>
<head>
<title>Edit Restaurant</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
font-family:Arial;
background:#f5f5f5;
display:flex;
flex-direction:column;
align-items:center;
padding:20px;
}

.card{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
width:400px;
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin:8px 0;
border:1px solid #ddd;
border-radius:5px;
box-sizing:border-box;
}

button{
width:100%;
padding:10px;
background:#0a7cff;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

.section{
background:white;
padding:15px;
border-radius:10px;
margin-top:20px;
box-shadow:0 0 5px rgba(0,0,0,0.2);
width:90%;
max-width:700px;
}

.item{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

img{
width:60px;
height:60px;
object-fit:cover;
border-radius:6px;
}

.delete-btn{
background:red;
padding:5px 10px;
border-radius:5px;
color:white;
text-decoration:none;
}
</style>

</head>

<body>

<div class="card">
<h2>Restaurant Settings</h2>

<form method="post">

<label>Restaurant Name</label>
<input name="name" value="{{r[1]}}" required>

<label>Username</label>
<input name="username" value="{{r[3]}}" required>

<label>Login Password</label>
<input name="password" value="{{r[4]}}" required>

<label>Kitchen Password</label>
<input name="kitchen_password" value="{{r[5]}}" required>

<button type="submit">Update</button>

</form>
</div>

<div class="section">
<h3>📅 Expiry Date</h3>
<p><b>Expires On:</b> {{ r[8] }}</p>
</div>

<div class="section">
<h3>🍽 Menu</h3>

{% for m in menu %}
<div class="item">
<div style="display:flex;gap:10px;align-items:center;">
<img src="/static/uploads/{{m[4]}}">
<div>
<b>{{m[2]}}</b><br>
$ {{m[3]}}
</div>
</div>

<a href="/delete_menu/{{m[0]}}" class="delete-btn">Delete</a>
</div>
{% endfor %}
</div>

<div class="section">
<h3>📦 Orders</h3>

{% for o in orders %}
<div class="item">
<div>
Table {{o[2]}} → {{o[1]}}
</div>

<div>
🕒 {{o[4]}}<br>
<small>Status: {{o[5]}}</small>
</div>
</div>
{% endfor %}
</div>

</body>
</html>
