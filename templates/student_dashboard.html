<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Students Dashboard</title>

<style>
body { font-family: Arial; background:#f5f6fa; margin:0; }

.header {
    background:#1e3c72;
    color:white;
    padding:15px;
    text-align:center;
}

/* GRID */
.grid {
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(230px,1fr));
    gap:15px;
    padding:15px;
}

/* CARD */
.card {
    background:white;
    padding:15px;
    border-radius:10px;
    text-align:center;
    cursor:pointer;
}

.card img {
    width:80px;
    height:80px;
    border-radius:50%;
}

/* FLOAT BUTTONS */
.fab, .fab2 {
    position:fixed;
    bottom:20px;
    width:55px;
    height:55px;
    border-radius:50%;
    border:none;
    color:white;
    font-size:22px;
}

.fab { right:20px; background:#28a745; }
.fab2 { right:80px; background:#007bff; }

/* MODAL */
.modal {
    display:none;
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
}

.modal-content {
    background:white;
    margin:5% auto;
    padding:20px;
    width:90%;
    max-width:400px;
    border-radius:10px;
}

input, select {
    width:100%;
    padding:10px;
    margin-top:10px;
}

button {
    margin-top:10px;
    padding:10px;
    width:100%;
}
</style>
</head>

<body>

<div class="header">
<h2>🎓 Students Dashboard</h2>
</div>

<div class="grid" id="students"></div>

<button class="fab" onclick="openForm()">+</button>
<button class="fab2" onclick="loadStudents()">📋</button>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">

<h3>Student</h3>

<input id="student_id" placeholder="ID">
<input id="full_name" placeholder="Name">

<select id="gender">
<option>Male</option>
<option>Female</option>
</select>

<input id="mother_name" placeholder="Mother">
<input id="student_phone" placeholder="Phone">
<input type="file" id="photo">
<input id="mother_phone" placeholder="Mother Phone">
<input id="fee" placeholder="Fee">

<select id="status">
<option value="unpaid">Unpaid</option>
<option value="paid">Paid</option>
</select>

<button onclick="saveStudent()">Save</button>
<button onclick="updateStudent()">Update</button>
<button onclick="deleteStudent()" style="background:red;color:white;">Delete</button>
<button onclick="closeForm()">Close</button>

</div>
</div>

<script>

let currentID = "";

// LOAD
async function loadStudents(){
    let res = await fetch("/get_students");
    let data = await res.json();

    let box = document.getElementById("students");
    box.innerHTML = "";

    data.forEach(s=>{
        box.innerHTML += `
        <div class="card" onclick="openEdit('${s.student_id}')">
            <img src="/static/uploads/${s.photo || 'default.png'}">
            <h3>${s.full_name}</h3>
            <p>ID: ${s.student_id}</p>
            <p>${s.gender}</p>
            <p>$${s.fee}</p>
            <p>${s.status}</p>
        </div>`;
    });
}

// OPEN FORM
function openForm(){
    document.getElementById("modal").style.display="block";
}

// CLOSE
function closeForm(){
    document.getElementById("modal").style.display="none";
}

// SAVE
async function saveStudent(){
    let fd = new FormData();

    fd.append("student_id", student_id.value);
    fd.append("full_name", full_name.value);
    fd.append("gender", gender.value);
    fd.append("mother_name", mother_name.value);
    fd.append("student_phone", student_phone.value);
    fd.append("mother_phone", mother_phone.value);
    fd.append("fee", fee.value);
    fd.append("photo", photo.files[0]);

    await fetch("/add_student",{method:"POST", body:fd});

    loadStudents();
    closeForm();
}

// EDIT OPEN
async function openEdit(id){
    currentID = id;

    let res = await fetch("/get_students");
    let data = await res.json();

    let s = data.find(x => x.student_id == id);

    openForm();

    student_id.value = s.student_id;
    full_name.value = s.full_name;
    gender.value = s.gender;
    mother_name.value = s.mother_name;
    student_phone.value = s.student_phone;
    mother_phone.value = s.mother_phone;
    fee.value = s.fee;
    status.value = s.status;
}

// UPDATE
async function updateStudent(){
    let fd = new FormData();

    fd.append("student_id", student_id.value);
    fd.append("full_name", full_name.value);
    fd.append("gender", gender.value);
    fd.append("mother_name", mother_name.value);
    fd.append("student_phone", student_phone.value);
    fd.append("mother_phone", mother_phone.value);
    fd.append("fee", fee.value);
    fd.append("status", status.value);

    await fetch("/edit_student",{method:"POST", body:fd});

    loadStudents();
    closeForm();
}

// DELETE
async function deleteStudent(){
    let fd = new FormData();
    fd.append("student_id", student_id.value);

    await fetch("/delete_student",{method:"POST", body:fd});

    loadStudents();
    closeForm();
}

// AUTO LOAD
loadStudents();

</script>

</body>
</html>
