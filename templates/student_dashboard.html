<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>{{ school.school_name }}</title>

<style>
body{margin:0;font-family:'Segoe UI';background:#f5f6fa;}

.header{
background:#1e3c72;color:white;padding:20px;text-align:center;
}

.top-actions{
position:absolute;right:15px;top:20px;display:flex;gap:10px;
}

.btn{
padding:8px 12px;border:none;border-radius:6px;color:white;cursor:pointer;
}

.admin-btn{background:#ff9800;}
.cashier-btn{background:#00b894;}
.register-btn{background:#28a745;}
.teacher-btn{background:#6f42c1;}

.container{padding:20px;}

.table{width:100%;border-collapse:collapse;}
.table th{background:#2f4f6f;color:white;padding:10px;}
.table td{padding:10px;border-bottom:1px solid #eee;text-align:center;}

.badge{padding:5px 10px;border-radius:20px;font-size:12px;}
.paid{background:#d4edda;color:#155724;}
.unpaid{background:#f8d7da;color:#721c24;}
</style>
</head>

<body>

<div class="header">
<h2>{{ school.school_name }}</h2>

<div class="top-actions">
<button class="btn register-btn" onclick="goReg()">Register</button>
<button class="btn teacher-btn" onclick="goTeacher()">Teacher</button>
<button class="btn cashier-btn" onclick="goCashier()">Cashier</button>
<button class="btn admin-btn" onclick="goAdmin()">Admin</button>
</div>
</div>

<div class="container">

<table class="table">
<thead>
<tr>
<th>Name</th>
<th>ID</th>
<th>Class</th>
<th>Fee</th>
<th>Paid</th>
<th>Remaining</th>
<th>Status</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>
</table>

</div>

<script>

let students=[];

window.onload=load;

async function load(){
let res=await fetch("/get_students");
students=await res.json();
render(students);
}

function render(data){
let box=document.getElementById("tableBody");
box.innerHTML="";

data.forEach(s=>{
let fee=parseFloat(s.fee)||0;
let paid=parseFloat(s.paid)||0;
let remaining=fee-paid;

let status=remaining<=0?"paid":"unpaid";

box.innerHTML+=`
<tr>
<td>${s.full_name}</td>
<td>${s.student_id}</td>
<td>${s.class_name||'-'}</td>
<td>$${fee}</td>
<td>$${paid}</td>
<td>$${remaining}</td>
<td><span class="badge ${status}">${status}</span></td>
</tr>`;
});
}

async function checkPass(type){
let pass=prompt("Enter "+type+" password");
let res=await fetch(`/check_panel_password?type=${type}&pass=${pass}`);
let d=await res.json();
return d.success;
}

async function goReg(){
if(await checkPass("admin")) window.location="/school/student_register";
}

async function goTeacher(){
if(await checkPass("teacher")) window.location="/teacher_panel";
}

async function goCashier(){
if(await checkPass("cashier")) window.location="/cashier_panel";
}

async function goAdmin(){
if(await checkPass("admin")) window.location="/admin_dashboard_school";
}

</script>

</body>
</html>
