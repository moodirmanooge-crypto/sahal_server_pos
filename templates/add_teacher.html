<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add New Teacher</title>

<style>
body{
font-family:'Segoe UI',sans-serif;
background:#f5f6fa;
margin:0;
padding:20px;
display:flex;
justify-content:center;
}

.form-container{
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
width:100%;
max-width:700px;
}

.header{
border-bottom:2px solid #eee;
margin-bottom:20px;
padding-bottom:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

.form-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

input{
padding:12px;
border:1px solid #ddd;
border-radius:6px;
width:100%;
font-size:14px;
}

.full-width{grid-column:span 2;}

label{
display:block;
margin-bottom:5px;
font-weight:bold;
font-size:13px;
}

.class-selection{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
margin-top:10px;
background:#f9f9f9;
padding:15px;
border-radius:8px;
border:1px solid #eee;
}

.class-selection label{
font-weight:normal;
display:flex;
align-items:center;
gap:8px;
cursor:pointer;
background:white;
padding:5px 8px;
border-radius:4px;
border:1px solid #ddd;
}

.btn-save{
background:#6f42c1;
color:white;
border:none;
padding:15px;
border-radius:6px;
width:100%;
cursor:pointer;
font-size:16px;
font-weight:bold;
margin-top:20px;
}

.btn-save:hover{background:#5a32a3;}
.btn-save:disabled{background:#ccc;}

.back-link{
text-decoration:none;
color:#1e3c72;
font-weight:bold;
}

@media(max-width:600px){
.form-grid{grid-template-columns:1fr;}
.class-selection{grid-template-columns:repeat(2,1fr);}
}
</style>
</head>

<body>

<div class="form-container">

<div class="header">
<h2>🧑‍🏫 Add New Teacher</h2>
<a href="/" class="back-link">← Back</a>
</div>

<form id="teacherForm">

<div class="form-grid">

<div>
<label>Full Name</label>
<input type="text" id="t_full_name" required>
</div>

<div>
<label>Phone Number</label>
<input type="text" id="t_phone" required>
</div>

<div>
<label>Username</label>
<input type="text" id="t_username" required>
</div>

<div>
<label>Password</label>
<input type="password" id="t_password" required>
</div>

<div class="full-width">
<label>Teacher Subject</label>
<input type="text" id="t_subject" required>
</div>

</div>

<label style="margin-top:20px;">Assign Classes:</label>

<div class="class-selection" id="classBox">
<label><input type="checkbox" value="G1"> G1</label>
<label><input type="checkbox" value="G2"> G2</label>
<label><input type="checkbox" value="G3"> G3</label>
<label><input type="checkbox" value="G4"> G4</label>
<label><input type="checkbox" value="G5"> G5</label>
<label><input type="checkbox" value="G6"> G6</label>
<label><input type="checkbox" value="G7"> G7</label>
<label><input type="checkbox" value="G8"> G8</label>
<label><input type="checkbox" value="F1"> F1</label>
<label><input type="checkbox" value="F2"> F2</label>
<label><input type="checkbox" value="F3"> F3</label>
<label><input type="checkbox" value="F4"> F4</label>
</div>

<button type="submit" id="submitBtn" class="btn-save">
💾 Save Teacher & Create Account
</button>

</form>
</div>

<script>

document.getElementById('teacherForm').onsubmit = async (e)=>{
e.preventDefault();

const btn=document.getElementById('submitBtn');

let classes=[];
document.querySelectorAll('#classBox input:checked')
.forEach(cb=>classes.push(cb.value));

if(classes.length===0){
alert("⚠️ Dooro ugu yaraan hal class");
return;
}

btn.disabled=true;
btn.innerText="Saving...";

let fd=new FormData();

fd.append("full_name",t_full_name.value);
fd.append("phone",t_phone.value);
fd.append("username",t_username.value);
fd.append("password",t_password.value);
fd.append("subject",t_subject.value);
fd.append("assigned_classes",JSON.stringify(classes));

try{

let res=await fetch("/add_teacher",{  // ✅ FIXED ROUTE
method:"POST",
body:fd
});

let data=await res.json();

if(data.success){
alert("✅ Teacher Registered!\nUsername: "+t_username.value);
document.getElementById("teacherForm").reset();
}else{
alert("❌ "+data.error);
}

}catch(err){
console.error(err);
alert("❌ Server Error");
}

btn.disabled=false;
btn.innerText="💾 Save Teacher & Create Account";
}

</script>

</body>
</html>
