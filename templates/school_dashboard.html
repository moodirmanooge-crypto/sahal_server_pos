<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>{{ school_name if school_name else 'Students Dashboard' }}</title>

<style>
body { margin:0; font-family:Arial; background:#f5f6fa; }

.header {
    background:#1e3c72;
    color:white;
    padding:15px;
    text-align:center;
}

/* BUTTONS */
.fab, .fab2 {
    position:fixed;
    bottom:20px;
    width:60px;
    height:60px;
    border-radius:50%;
    border:none;
    color:white;
    font-size:22px;
    z-index: 999;
    cursor: pointer;
}
.fab { right:20px; background:#28a745; }
.fab2 { right:90px; background:#007bff; }

/* ADD POPUP */
.modal {
    display:none;
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    z-index: 1000;
}

.popup {
    background:white;
    width:90%;
    max-width:400px;
    margin:2% auto;
    padding:20px;
    border-radius:10px;
    position:relative;
    cursor:move; 
    max-height: 90vh;
    overflow-y: auto;
}

.close {
    position:absolute;
    top:10px;
    right:15px;
    cursor:pointer;
    font-weight: bold;
    color: red;
}

/* BOTTOM SHEET */
.sheet {
    position:fixed;
    bottom:-100%;
    left:0;
    width:100%;
    height:90%;
    background:white;
    border-radius:20px 20px 0 0;
    transition:0.3s;
    overflow:auto;
    z-index: 1001;
    box-shadow: 0 -5px 15px rgba(0,0,0,0.2);
}

.sheet.active {
    bottom:0;
}

.sheet-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 20px;
    border-bottom: 1px solid #eee;
}

.btn-close-sheet {
    background: #ff4757;
    color: white;
    border: none;
    padding: 8px 15px;
    border-radius: 5px;
    cursor: pointer;
}

.drag {
    width:50px;
    height:5px;
    background:#ccc;
    margin:10px auto;
    border-radius:5px;
}

/* SEARCH */
.searchBox {
    padding:10px;
    margin:10px;
    width:90%;
    border-radius:8px;
    border:1px solid #ccc;
    display: block;
    margin-left: auto;
    margin-right: auto;
}

/* TABLE STYLE */
.table {
    width:100%;
    border-collapse:collapse;
    margin-top: 10px;
}

.table th {
    background:#3498db;
    color:white;
    padding:10px;
    font-size: 13px;
    text-align: left;
}

.table td {
    padding:10px;
    border-bottom:1px solid #ddd;
    font-size: 13px;
}

.std-img {
    width: 45px;
    height: 45px;
    border-radius: 50%;
    object-fit: cover;
    border: 1px solid #ddd;
    background: #f1f1f1;
}

input, select {
    width:100%;
    padding:10px;
    margin-top:10px;
    box-sizing: border-box;
    border: 1px solid #ddd;
    border-radius: 5px;
}

.update-section {
    margin-top: 20px;
    padding-top: 15px;
    border-top: 2px dashed #eee;
}

.btn-save { background: #28a745; color: white; border: none; font-weight: bold; border-radius: 5px; width:100%; padding:10px; margin-top:10px; cursor:pointer;}
.btn-update { background: #6f42c1; color: white; border: none; font-weight: bold; border-radius: 5px; width:100%; padding:10px; margin-top:10px; cursor:pointer;}
</style>
</head>

<body>

<div class="header">
    <h2 id="schoolTitle">🎓 {{ school_name if school_name else 'School Dashboard' }}</h2>
</div>

<button class="fab" onclick="openAdd()">+</button>
<button class="fab2" onclick="openSheet()">📋</button>

<div class="modal" id="addModal">
    <div class="popup" id="draggablePopup">
        <div class="close" onclick="closeAll()">✖</div>
        <h3>Add / Edit Student</h3>

        <input id="student_id" placeholder="Student ID (Example: 8029)">
        <input id="full_name" placeholder="Student Name">

        <select id="gender">
            <option>Male</option>
            <option>Female</option>
        </select>

        <input id="mother_name" placeholder="Mother Name">
        <input id="student_phone" placeholder="Student Phone">
        <label style="font-size: 11px; color: #666; margin-top: 10px; display: block;">Student Photo:</label>
        <input type="file" id="photo" accept="image/*">
        <input id="mother_phone" placeholder="Mother Phone">
        <input id="fee" placeholder="Monthly Fee ($)">

        <button onclick="saveStudent()" class="btn-save">Save Student</button>

        <div class="update-section">
            <h4 style="margin:0; color:#1e3c72;">🔑 Parent View Security</h4>
            <p style="font-size: 11px; color: #777; margin: 5px 0;">Set password for Parent View in Home page</p>
            <input type="password" id="parent_password" placeholder="New Parent Password">
            <button onclick="updateParentPassword()" class="btn-update">Update Parent Password</button>
        </div>
    </div>
</div>

<div class="sheet" id="sheet">
    <div class="drag"></div>
    <div class="sheet-header">
        <h3 style="margin:0">Student List</h3>
        <button class="btn-close-sheet" onclick="closeAll()">Close ❌</button>
    </div>

    <input class="searchBox" id="searchID" placeholder="Search by ID or Name..." onkeyup="liveSearch()">

    <table class="table">
        <thead>
            <tr>
                <th>Photo</th>
                <th>ID</th>
                <th>Name</th>
                <th>Mother</th>
                <th>Phones</th>
                <th>Fee</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="studentsTable"></tbody>
    </table>
</div>

<script>
let startY = 0;
let allStudents = [];

function openAdd(){
    document.getElementById("addModal").style.display="block";
}

function closeAll(){
    document.getElementById("addModal").style.display="none";
    document.getElementById("sheet").classList.remove("active");
}

async function openSheet(){
    let sheet = document.getElementById("sheet");
    sheet.classList.add("active");

    try {
        let res = await fetch("/get_students");
        let data = await res.json();
        allStudents = data;
        renderTable(data);
    } catch (e) {
        console.log("Error fetching data");
    }
}

function renderTable(data){
    let box = document.getElementById("studentsTable");
    box.innerHTML="";

    data.forEach(s=>{
        let imgPath = s.photo ? `/static/uploads/${s.photo}` : "https://cdn-icons-png.flaticon.com/512/149/149071.png";
        
        box.innerHTML += `
        <tr>
            <td><img src="${imgPath}" class="std-img" onerror="this.src='https://cdn-icons-png.flaticon.com/512/149/149071.png'"></td>
            <td><b>${s.student_id}</b></td>
            <td>${s.full_name}</td>
            <td>${s.mother_name || '-'}</td>
            <td>
                <small>S: ${s.student_phone || '-'}</small><br>
                <small>M: ${s.mother_phone || '-'}</small>
            </td>
            <td>$${s.fee || '0'}</td>
            <td>
                <button onclick="edit('${s.student_id}')" style="width:auto; padding:5px 10px; background:#f1c40f; border:none; border-radius:4px; cursor:pointer;">Edit</button>
                <button onclick="del('${s.student_id}')" style="width:auto; padding:5px 10px; background:red; color:white; border:none; border-radius:4px; cursor:pointer;">Del</button>
            </td>
        </tr>`;
    });
}

function liveSearch(){
    let val = document.getElementById("searchID").value.toLowerCase();
    let filtered = allStudents.filter(s =>
        s.student_id.toString().includes(val) || 
        s.full_name.toLowerCase().includes(val)
    );
    renderTable(filtered);
}

async function saveStudent(){
    let fd = new FormData();
    fd.append("student_id", document.getElementById("student_id").value);
    fd.append("full_name", document.getElementById("full_name").value);
    fd.append("gender", document.getElementById("gender").value);
    fd.append("mother_name", document.getElementById("mother_name").value);
    fd.append("student_phone", document.getElementById("student_phone").value);
    fd.append("mother_phone", document.getElementById("mother_phone").value);
    fd.append("fee", document.getElementById("fee").value);
    
    let photoInput = document.getElementById("photo");
    if(photoInput.files) fd.append("photo", photoInput.files);

    try {
        let res = await fetch("/add_student",{method:"POST", body:fd});
        let result = await res.json();

        if(result.error) {
            alert("⚠️ " + result.error);
        } else {
            alert("✅ Student saved successfully!");
            location.reload();
        }
    } catch (e) {
        alert("Error saving student");
    }
}

// 🆕 FUNCTION TO UPDATE PARENT PASSWORD
async function updateParentPassword() {
    let pass = document.getElementById("parent_password").value;
    if(!pass) return alert("Fadlan gali password cusub!");

    let fd = new FormData();
    fd.append("parent_password", pass);

    try {
        let res = await fetch("/update_parent_password", {method:"POST", body:fd});
        let result = await res.json();
        
        if(result.success) {
            alert("✅ Parent View password updated!");
            document.getElementById("parent_password").value = "";
        } else {
            alert("❌ " + (result.error || "Update failed"));
        }
    } catch (e) {
        alert("Server error updating password");
    }
}

async function del(id){
    if(confirm("Ma hubtaa inaad tirtirto ardaygan?")){
        let fd = new FormData();
        fd.append("student_id", id);
        await fetch("/delete_student",{method:"POST", body:fd});
        openSheet();
    }
}

function edit(id){
    let s = allStudents.find(x=>x.student_id==id);
    if(!s) return;
    openAdd();
    document.getElementById("student_id").value = s.student_id;
    document.getElementById("full_name").value = s.full_name;
    document.getElementById("gender").value = s.gender;
    document.getElementById("mother_name").value = s.mother_name;
    document.getElementById("student_phone").value = s.student_phone;
    document.getElementById("mother_phone").value = s.mother_phone;
    document.getElementById("fee").value = s.fee;
}

// DRAGGABLE LOGIC
let popup = document.getElementById("draggablePopup");
let isDown = false, offsetX, offsetY;
popup.onmousedown = (e) => {
    if(e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT' || e.target.tagName === 'BUTTON') return;
    isDown = true;
    offsetX = e.clientX - popup.offsetLeft;
    offsetY = e.clientY - popup.offsetTop;
};
document.onmouseup = () => isDown = false;
document.onmousemove = (e) => {
    if(!isDown) return;
    popup.style.position = "absolute";
    popup.style.margin = "0";
    popup.style.left = (e.clientX - offsetX) + "px";
    popup.style.top = (e.clientY - offsetY) + "px";
};
</script>

</body>
</html>
