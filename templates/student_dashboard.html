<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ school.school_name }}</title>

<style>
body {margin:0;font-family:'Segoe UI';background:#f5f6fa;}

.header{
background:#1e3c72;
color:white;
padding:15px;
text-align:center;
}

.fab-container{
position:fixed;
bottom:20px;
right:20px;
display:flex;
flex-direction:column;
gap:10px;
}

.fab{
width:60px;height:60px;border-radius:50%;
border:none;color:white;font-size:22px;
cursor:pointer;
}

.btn-add{background:#28a745;}
.btn-list{background:#007bff;}
.btn-teacher{background:#6f42c1;}

.modal{
display:none;
position:fixed;
width:100%;height:100%;
background:rgba(0,0,0,0.6);
}

.popup{
background:white;
width:90%;
max-width:450px;
margin:5vh auto;
padding:20px;
border-radius:10px;
max-height:85vh;
overflow:auto;
}

.close{
position:absolute;
right:15px;
cursor:pointer;
}

input,select{
width:100%;
padding:10px;
margin-top:10px;
}

.btn-save{
background:#28a745;
color:white;
padding:10px;
border:none;
width:100%;
margin-top:10px;
}

.class-box{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:8px;
margin-top:10px;
}

.sheet{
position:fixed;
bottom:-100%;
width:100%;
height:85%;
background:white;
transition:.3s;
overflow:auto;
}

.sheet.active{bottom:0;}

.table{
width:100%;
border-collapse:collapse;
}

.table td, .table th{
padding:10px;
border-bottom:1px solid #eee;
}

.std-img{
width:45px;height:45px;border-radius:50%;
}
</style>
</head>

<body>

<div class="header">
<h2>{{ school.school_name }}</h2>
</div>

<!-- FLOAT BUTTONS -->
<div class="fab-container">
<button class="fab btn-teacher" onclick="openModal('teacherModal')">👨‍🏫</button>
<button class="fab btn-list" onclick="openSheet()">📋</button>
<button class="fab btn-add" onclick="openModal('addModal')">➕</button>
</div>

<!-- ADD STUDENT -->
<div class="modal" id="addModal">
<div class="popup">
<span class="close" onclick="closeAll()">✖</span>

<h3>Add Student</h3>

<input id="student_id" placeholder="ID">
<input id="full_name" placeholder="Name">

<select id="class_name">
<option value="">Select Class</option>

<option>G1</option>
<option>G2</option>
<option>G3</option>
<option>G4</option>
<option>G5</option>
<option>G6</option>
<option>G7</option>
<option>G8</option>
<option>G9</option>

<option>F1</option>
<option>F2</option>
<option>F3</option>
<option>F4</option>

</select>

<input type="file" id="photo">

<button onclick="saveStudent()" class="btn-save">Save</button>

</div>
</div>

<!-- ADD TEACHER -->
<div class="modal" id="teacherModal">
<div class="popup">
<span class="close" onclick="closeAll()">✖</span>

<h3>Register Teacher</h3>

<input id="t_username" placeholder="Username">
<input id="t_password" placeholder="Password">

<div class="class-box">

<label><input type="checkbox" name="class_name[]" value="G1">G1</label>
<label><input type="checkbox" name="class_name[]" value="G2">G2</label>
<label><input type="checkbox" name="class_name[]" value="G3">G3</label>
<label><input type="checkbox" name="class_name[]" value="G4">G4</label>
<label><input type="checkbox" name="class_name[]" value="G5">G5</label>
<label><input type="checkbox" name="class_name[]" value="G6">G6</label>
<label><input type="checkbox" name="class_name[]" value="G7">G7</label>
<label><input type="checkbox" name="class_name[]" value="G8">G8</label>
<label><input type="checkbox" name="class_name[]" value="G9">G9</label>

<label><input type="checkbox" name="class_name[]" value="F1">F1</label>
<label><input type="checkbox" name="class_name[]" value="F2">F2</label>
<label><input type="checkbox" name="class_name[]" value="F3">F3</label>
<label><input type="checkbox" name="class_name[]" value="F4">F4</label>

</div>

<button onclick="saveTeacher()" class="btn-save" style="background:#6f42c1">
Create Teacher
</button>

</div>
</div>

<!-- STUDENT LIST -->
<div class="sheet" id="sheet">
<div style="padding:20px">

<table class="table">
<thead>
<tr>
<th>Name</th>
<th>Class</th>
<th>Action</th>
</tr>
</thead>

<tbody id="studentsTable"></tbody>

</table>

</div>
</div>

<script>

let allStudents=[];

function openModal(id){document.getElementById(id).style.display="block";}
function closeAll(){
document.querySelectorAll('.modal').forEach(m=>m.style.display="none");
document.getElementById("sheet").classList.remove("active");
}

async function openSheet(){
document.getElementById("sheet").classList.add("active");

let res=await fetch("/get_students");
allStudents=await res.json();

renderTable();
}

function renderTable(){
let box=document.getElementById("studentsTable");
box.innerHTML="";

allStudents.forEach(s=>{
box.innerHTML+=`
<tr>
<td>${s.full_name}</td>
<td>${s.class_name}</td>
<td><button onclick="del('${s.student_id}')">Delete</button></td>
</tr>
`;
});
}

async function saveStudent(){
let fd=new FormData();

fd.append("student_id",student_id.value);
fd.append("full_name",full_name.value);
fd.append("class_name",class_name.value);

let file=document.getElementById("photo").files[0];
if(file) fd.append("photo",file);

let res=await fetch("/add_student",{method:"POST",body:fd});
let data=await res.json();

if(data.success){
alert("Saved");
location.reload();
}else alert(data.error);
}

async function saveTeacher(){
let fd=new FormData();

fd.append("username",t_username.value);
fd.append("password",t_password.value);

document.querySelectorAll("input[name='class_name[]']:checked")
.forEach(cb=>fd.append("class_name[]",cb.value));

let res=await fetch("/add_teacher",{method:"POST",body:fd});
let data=await res.json();

if(data.success){
alert("Teacher Added");
closeAll();
}else alert(data.error);
}

async function del(id){
if(confirm("Delete?")){
let fd=new FormData();
fd.append("student_id",id);
await fetch("/delete_student_api",{method:"POST",body:fd});
openSheet();
}
}

</script>

</body>
</html>
