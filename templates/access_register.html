<!DOCTYPE html>
<html>
<head>
<title>Access Register</title>
<style>
body{
    background:#2c5364;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    background:white;
    padding:30px;
    border-radius:10px;
    width:300px;
    text-align:center;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
}

button{
    background:#28a745;
    color:white;
    border:none;
    padding:10px;
    width:100%;
}
</style>
</head>

<body>

<div class="box">
<h2>Enter Access Password</h2>

<form method="POST">
<input type="password" name="access_password" placeholder="Password">
<button>Continue</button>
</form>

{% if error %}
<p style="color:red;">{{error}}</p>
{% endif %}

</div>

</body>
</html>
