<!DOCTYPE html>
<html>
<head>
<title>Attendance Admin</title>
<style>
body{font-family:Segoe UI;background:#f4f6f9;}

table{width:100%;border-collapse:collapse;background:white;}
th{background:#2c3e50;color:white;padding:10px;}
td{padding:10px;border-bottom:1px solid #eee;}

select{padding:5px;}
button{padding:5px 10px;background:#3498db;color:white;border:none;}
</style>
</head>

<body>

<h2>📊 Attendance Control</h2>

<table>
<tr>
<th>Name</th>
<th>Class</th>
<th>Teacher</th>
<th>Date</th>
<th>Status</th>
<th>Update</th>
</tr>

{% for a in data %}
<tr>

<td>{{ a.name }}</td>
<td>{{ a.class }}</td>
<td>{{ a.teacher }}</td>
<td>{{ a.date }}</td>

<td>
<select id="s-{{ a.student_id }}">
<option value="present">Present</option>
<option value="absent">Absent</option>
<option value="sick">Sick</option>
</select>
</td>

<td>
<button onclick="update('{{ a.student_id }}','{{ a.date }}')">Save</button>
</td>

</tr>
{% endfor %}

</table>

<script>

async function update(id,date){

let status=document.getElementById("s-"+id).value;

let fd=new FormData();
fd.append("student_id",id);
fd.append("date",date);
fd.append("status",status);

let res=await fetch("/admin_update_attendance",{method:"POST",body:fd});
let data=await res.json();

if(data.success){
alert("Updated");
}else{
alert(data.error);
}

}

</script>

</body>
</html>
