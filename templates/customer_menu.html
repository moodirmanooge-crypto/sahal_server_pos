<!DOCTYPE html>
<html>
<head>
    <title>{{ restaurant }} Menu</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body{
            font-family:Arial;
            padding:20px;
            background:#f4f4f4;
            margin:0;
        }

        h1{
            text-align:center;
            margin-top:15px;
        }

        .ads-box{
            margin-bottom:20px;
        }

        .ad-img{
            width:100%;
            height:180px;
            object-fit:cover;
            border-radius:12px;
            margin-bottom:10px;
            box-shadow:0 0 8px rgba(0,0,0,0.15);
        }

        .grid{
            display:grid;
            grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
            gap:20px;
        }

        .card,.cart-box,.status-box{
            background:white;
            border-radius:10px;
            padding:15px;
            box-shadow:0 0 8px rgba(0,0,0,0.1);
        }

        .card img{
            width:100%;
            height:150px;
            object-fit:cover;
            border-radius:8px;
        }

        button{
            padding:10px 14px;
            border:none;
            border-radius:6px;
            cursor:pointer;
            font-weight:bold;
        }

        .add-btn,.send-btn{
            background:#0a7cff;
            color:white;
        }

        .remove-btn{
            background:red;
            color:white;
        }

        .plus-btn{
            background:green;
            color:white;
            margin-left:5px;
        }

        .minus-btn{
            background:orange;
            color:white;
            margin-left:5px;
        }

        .call-btn{
            background:orange;
            color:white;
            margin-top:15px;
        }

        select{
            width:100%;
            padding:10px;
            margin-top:10px;
        }

        .modal{
            display:none;
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            background:rgba(0,0,0,0.5);
            z-index:999;
        }

        .modal-content{
            background:white;
            width:90%;
            max-width:400px;
            margin:60px auto;
            padding:20px;
            border-radius:12px;
        }

        .close-btn{
            background:#e91e63;
            color:white;
            margin-top:10px;
        }

        .hidden{
            display:none;
        }

        li{
            margin-bottom:10px;
        }
    </style>
</head>
<body>

{% if ads %}
<div class="ads-box">
    {% for ad in ads %}
        <img src="/static/uploads/{{ ad.image }}" class="ad-img">
    {% endfor %}
</div>
{% endif %}

<h1>🍽 {{ restaurant }}</h1>

<p><b>Table:</b> {{ table }}</p>

<div class="grid">
    {% for m in menu %}
    <div class="card">
        <img src="/static/uploads/{{ m.image }}" alt="{{ m.name }}">
        <h3>{{ m.name }}</h3>
        <p>$ {{ m.price }}</p>

        <button
            class="add-btn"
            data-name="{{ m.name }}"
            data-price="{{ m.price }}"
            onclick="openItemModal(this)">
            Add
        </button>
    </div>
    {% endfor %}
</div>

<hr>

<div class="cart-box">
    <h2>🛒 Cart</h2>
    <ul id="cart"></ul>
    <p><b>Total:</b> $<span id="total">0</span></p>

    <div class="status-box">
        <h2>💳 Payment Info</h2>
        <p><b>Pay To:</b> {{ payment_name }}</p>
        <p><b>Number:</b> {{ payment_number }}</p>
    </div>

    <form action="/customer_order/{{ rid }}" method="post" onsubmit="return sendOrderMessage()">
        <input type="hidden" name="items" id="items">
        <input type="hidden" name="price" id="price">
        <input type="hidden" name="table" value="{{ table }}">

        <button class="send-btn" type="submit">
            Send Order
        </button>
    </form>

    <button class="call-btn" onclick="callWaiter()">
        🔔 Call Waiter
    </button>
</div>

<div class="modal" id="optionModal">
    <div class="modal-content">
        <h3 id="modalTitle">Select Option</h3>

        <div id="foodBox" class="hidden">
            <label>🍝 Food Option</label>
            <select id="foodOption">
                <option value="">Choose</option>
                <option value="With Pepper 🌶️">With Pepper 🌶️</option>
                <option value="No Pepper">No Pepper</option>
            </select>
        </div>

        <div id="drinkBox" class="hidden">
            <label>🥤 Drink Option</label>
            <select id="drinkOption">
                <option value="">Choose</option>
                <option value="Iced 🧊">Iced 🧊</option>
                <option value="Sugar 🍬">Sugar 🍬</option>
                <option value="Iced + Sugar">Iced 🧊 + Sugar 🍬</option>
            </select>
        </div>

        <div id="hotBox" class="hidden">
            <label>☕ Hot Drink Option</label>
            <select id="hotOption">
                <option value="">Choose</option>
                <option value="Sugar 🍬">Sugar 🍬</option>
                <option value="No Sugar">No Sugar</option>
            </select>
        </div>

        <button class="send-btn" onclick="confirmAdd()">
            Add To Cart
        </button>

        <button class="close-btn" onclick="closeModal()">
            Close
        </button>
    </div>
</div>

<script>
let cart = []
let total = 0
let currentItem = ""
let currentPrice = 0

function openItemModal(btn){
    currentItem = btn.dataset.name
    currentPrice = parseFloat(btn.dataset.price)

    document.getElementById("modalTitle").innerText = currentItem

    document.getElementById("foodBox").classList.add("hidden")
    document.getElementById("drinkBox").classList.add("hidden")
    document.getElementById("hotBox").classList.add("hidden")

    let name = currentItem.toLowerCase()

    if(
        name.includes("food") ||
        name.includes("baasto") ||
        name.includes("burger") ||
        name.includes("rice") ||
        name.includes("pizza") ||
        name.includes("baryani")
    ){
        document.getElementById("foodBox").classList.remove("hidden")
    }

    if(
        name.includes("juice") ||
        name.includes("water") ||
        name.includes("cola") ||
        name.includes("drink")
    ){
        document.getElementById("drinkBox").classList.remove("hidden")
    }

    if(
        name.includes("tea") ||
        name.includes("coffee") ||
        name.includes("shaah")
    ){
        document.getElementById("hotBox").classList.remove("hidden")
    }

    document.getElementById("optionModal").style.display = "block"
}

function closeModal(){
    document.getElementById("optionModal").style.display = "none"
    document.getElementById("foodOption").value = ""
    document.getElementById("drinkOption").value = ""
    document.getElementById("hotOption").value = ""
}

function confirmAdd(){
    let item = currentItem

    let option =
        document.getElementById("foodOption").value ||
        document.getElementById("drinkOption").value ||
        document.getElementById("hotOption").value

    if(option){
        item += " | " + option
    }

    let found = cart.find(x => x.name === item)

    if(found){
        found.qty += 1
    }else{
        cart.push({
            name:item,
            price:currentPrice,
            qty:1
        })
    }

    total += currentPrice

    render()
    closeModal()
}

function increase(i){
    cart[i].qty += 1
    total += cart[i].price
    render()
}

function decrease(i){
    if(cart[i].qty > 1){
        cart[i].qty -= 1
        total -= cart[i].price
    }else{
        total -= cart[i].price
        cart.splice(i,1)
    }
    render()
}

function remove(i){
    total -= cart[i].price * cart[i].qty
    cart.splice(i,1)
    render()
}

function render(){
    let html = ""

    cart.forEach((item,i)=>{
        html += `
            <li>
                ${item.qty}x ${item.name} - $${(item.price * item.qty).toFixed(2)}
                <button class="plus-btn" onclick="increase(${i})">+</button>
                <button class="minus-btn" onclick="decrease(${i})">-</button>
                <button class="remove-btn" onclick="remove(${i})">X</button>
            </li>
        `
    })

    document.getElementById("cart").innerHTML = html
    document.getElementById("total").innerText = total.toFixed(2)

    document.getElementById("items").value =
        cart.map(x => x.qty + "x " + x.name).join(",")

    document.getElementById("price").value =
        total.toFixed(2)
}

function sendOrderMessage(){
    if(cart.length === 0){
        alert("Please add item first ❌")
        return false
    }

    alert("waan helnay dalabkaaga🎉 macaamiil wax yar sug in laguu adeegaayo😍")
    return true
}

function callWaiter(){
    fetch("/call_waiter/{{ rid }}",{
        method:"POST",
        headers:{
            "Content-Type":"application/x-www-form-urlencoded"
        },
        body:"table={{ table }}"
    }).then(()=>{
        alert("Waiter called ✅")
    })
}
</script>

</body>
</html>
