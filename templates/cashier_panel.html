<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cashier Panel | School Management</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f5f6fa; margin: 0; padding: 20px; }
        .cashier-box { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); max-width: 1100px; margin: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #f1f1f1; padding-bottom: 15px; margin-bottom: 20px; }
        
        .search-area { margin-bottom: 20px; }
        .search-input { padding: 12px 15px; border: 2px solid #ddd; border-radius: 8px; width: 100%; max-width: 400px; font-size: 14px; outline: none; transition: 0.3s; }
        .search-input:focus { border-color: #00b894; }

        .table-container { overflow-x: auto; }
        .table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .table th { background: #2d3436; color: white; padding: 15px; text-align: left; font-size: 14px; }
        .table td { padding: 12px 15px; border-bottom: 1px solid #eee; font-size: 14px; vertical-align: middle; }
        .table tr:hover { background-color: #fcfcfc; }

        .pay-input { width: 90px; padding: 8px; border: 1px solid #00b894; border-radius: 5px; outline: none; text-align: center; }
        .btn-pay { background: #00b894; color: white; border: none; padding: 8px 16px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-pay:hover { background: #00967a; transform: translateY(-1px); }
        .btn-pay:disabled { background: #ccc; cursor: not-allowed; }

        .btn-back { background: #636e72; color: white; text-decoration: none; padding: 8px 15px; border-radius: 6px; font-size: 14px; }
        .badge-paid { color: #2ecc71; font-weight: bold; }
        .badge-debt { color: #e74c3c; font-weight: bold; }
    </style>
</head>
<body>

<div class="cashier-box">
    <div class="header">
        <h2>💰 Cashier Payment Panel</h2>
        <a href="/" class="btn-back">← Dashboard</a>
    </div>

    <div class="search-area">
        <input type="text" id="cashierSearch" class="search-input" placeholder="🔍 Search Student ID or Name..." onkeyup="searchCashier()">
    </div>

    <div class="table-container">
        <table class="table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Student Name</th>
                    <th>Monthly Fee</th>
                    <th>Total Paid</th>
                    <th>Remaining</th>
                    <th>Enter Amount</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="cashierTableBody">
                <tr><td colspan="7" style="text-align:center;">Loading students...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    let students = [];

    // 1. Soo qaado xogta ardayda
    async function loadCashierData() {
        try {
            let res = await fetch("/get_students");
            students = await res.json();
            renderCashier(students);
        } catch (err) {
            document.getElementById("cashierTableBody").innerHTML = `<tr><td colspan="7" style="color:red; text-align:center;">Error loading data.</td></tr>`;
        }
    }

    // 2. Ku shub xogta Table-ka
    function renderCashier(data) {
        let tbody = document.getElementById("cashierTableBody");
        tbody.innerHTML = "";

        if (data.length === 0) {
            tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;">No students found.</td></tr>`;
            return;
        }

        data.forEach(s => {
            let fee = parseFloat(s.fee || 0);
            let paid = parseFloat(s.paid || 0);
            let remaining = fee - paid;

            tbody.innerHTML += `
                <tr>
                    <td><strong>#${s.student_id}</strong></td>
                    <td>${s.full_name}</td>
                    <td>$${fee.toFixed(2)}</td>
                    <td class="badge-paid">$${paid.toFixed(2)}</td>
                    <td class="badge-debt">$${remaining.toFixed(2)}</td>
                    <td>
                        <input type="number" class="pay-input" id="amt_${s.student_id}" placeholder="0.00" min="1" max="${remaining}">
                    </td>
                    <td>
                        <button class="btn-pay" onclick="processPayment('${s.student_id}')" ${remaining <= 0 ? 'disabled' : ''}>
                            ${remaining <= 0 ? 'Fully Paid' : 'Pay Now'}
                        </button>
                    </td>
                </tr>`;
        });
    }

    // 3. Toos u raadi ardayda (Search)
    function searchCashier() {
        let val = document.getElementById("cashierSearch").value.toLowerCase();
        let filtered = students.filter(s => 
            s.student_id.toLowerCase().includes(val) || 
            s.full_name.toLowerCase().includes(val)
        );
        renderCashier(filtered);
    }

    // 4. Socodsii bixinta lacagta
    async function processPayment(id) {
        let amountInput = document.getElementById("amt_" + id);
        let amount = amountInput.value;

        if(!amount || amount <= 0) {
            alert("⚠️ Fadlan geli cadadka lacagta la bixinayo.");
            return;
        }

        let fd = new FormData();
        fd.append("student_id", id);
        fd.append("amount", amount);

        try {
            let res = await fetch("/process_payment", { method: "POST", body: fd });
            let data = await res.json();
            
            if(data.success) {
                alert("✅ Lacagta waa laga qabtay ardayga #" + id);
                amountInput.value = ""; // Clear input
                loadCashierData(); // Refresh table
            } else {
                alert("❌ Error: " + data.error);
            }
        } catch (err) {
            alert("❌ Server Error, fadlan isku day markale.");
        }
    }

    // Markay bogga soo kacdo, billow soo xero-gelinta xogta
    window.onload = loadCashierData;
</script>

</body>
</html>
