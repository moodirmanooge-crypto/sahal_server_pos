<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register School</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(to right, #2193b0, #6dd5ed);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.box {
    background: white;
    padding: 30px;
    border-radius: 10px;
    width: 350px;
}
input, button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
}
button {
    background: #2193b0;
    color: white;
    border: none;
}
.msg {
    margin-top: 10px;
    text-align: center;
}
</style>
</head>

<body>

<div class="box">
<h2>Register School</h2>

<form id="form">
<input name="school_name" placeholder="School Name" required>
<input name="phone" placeholder="Phone" required>
<input type="password" name="password" placeholder="Password" required>
<input name="fee" placeholder="Fee" required>

<button type="submit">Register</button>
</form>

<div class="msg" id="msg"></div>
</div>

<script>
document.getElementById("form").onsubmit = async (e) => {
    e.preventDefault();

    let res = await fetch("/register_school", {
        method: "POST",
        body: new FormData(e.target)
    });

    let data = await res.json();

    if(data.error){
        document.getElementById("msg").innerHTML =
            "<span style='color:red'>" + data.error + "</span>";
    } else {
        document.getElementById("msg").innerHTML =
            "<span style='color:green'>Code: " + data.school_code + "</span>";
    }
}
</script>

</body>
</html>
